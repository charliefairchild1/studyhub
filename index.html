<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>The Study</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#14110c">
<style>
*{box-sizing:border-box}
html,body{margin:0;background:#14110c;color:#efe7d6;-webkit-text-size-adjust:100%}
body{font:16px/1.5 -apple-system,BlinkMacSystemFont,system-ui,Segoe UI,Roboto;
 padding:calc(env(safe-area-inset-top) + 8px) 14px calc(env(safe-area-inset-bottom) + 40px)}
.wrap{max-width:680px;margin:0 auto}
header{text-align:center;padding:14px 0 8px}
h1{margin:0;font-size:30px;font-family:"Iowan Old Style",Palatino,Georgia,serif;letter-spacing:-.5px}
h1 .a{color:#d9a441}
.tag{color:#9a8f78;font-size:13px;margin-top:2px}
.search{width:100%;background:#1c1712;border:1px solid #3a2f22;color:#efe7d6;border-radius:12px;
 padding:12px 14px;font:inherit;margin:12px 0 6px}
.sec{color:#d9a441;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;margin:20px 4px 8px;font-weight:700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:520px){.grid{grid-template-columns:1fr 1fr 1fr}}
a.tile{display:block;background:#1a1611;border:1px solid #322a1f;border-radius:14px;padding:14px;
 text-decoration:none;color:#efe7d6;-webkit-tap-highlight-color:transparent}
a.tile:active{background:#221c15;border-color:#4a3c28}
.tile .ic{font-size:24px;line-height:1}
.tile .nm{font-weight:700;margin-top:8px}
.tile .ds{color:#968a72;font-size:12.5px;margin-top:2px;line-height:1.35}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px}
a.mtile{display:flex;flex-direction:column;align-items:center;gap:5px;background:#1a1611;border:1px solid #322a1f;
 border-radius:12px;padding:12px 6px;text-decoration:none;color:#d8cdb4;font-size:12.5px;text-align:center;-webkit-tap-highlight-color:transparent}
a.mtile:active{background:#221c15}
a.mtile .ic{font-size:20px}
.foot{color:#6d6455;font-size:12px;text-align:center;margin-top:30px;line-height:1.6}
.foot a{color:#9a8f78}
.empty{color:#968a72;text-align:center;padding:30px 0}
</style></head>
<body>
<div class="wrap">
<header>
  <h1>The <span class="a">Study</span></h1>
  <div class="tag">everything we've built — one hub</div>
</header>
<input class="search" id="q" placeholder="search apps…" autocomplete="off" autocapitalize="off" spellcheck="false">
<div id="list">
  <noscript><p class="empty">Enable JavaScript to browse — or open any app directly under /apps/.</p></noscript>
</div>
<div class="foot">
  The Study · a Poietism / PEP project<br>
  Tip: Share → <b>Add to Home Screen</b> to keep it one tap away.
</div>
</div>

<script>
/* Kill any stuck service worker from older versions (the cause of the black screen),
   and clear its caches. This page is a plain, reliable website — no SW needed. */
try{
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(function(rs){ rs.forEach(function(r){ r.unregister(); }); }).catch(function(){});
  }
  if('caches' in window){ caches.keys().then(function(ks){ ks.forEach(function(k){ caches.delete(k); }); }).catch(function(){}); }
}catch(e){}

/* ---- app registry (static data → simple render, cannot blank the page) ---- */
var CATS=[
 ["Daily",[
   ["journal","📓","Journal","Reflect + a PTO check-in"],
   ["habits","✅","Habits","Build streaks that stick"]]],
 ["Language",[
   ["spanish","🇪🇸","Spanish","SRS, verbs, cognates, dictation"],
   ["tokipona","🟢","Toki Pona","The 120-word language of good"],
   ["vaya","🔡","Vaya","A constructed PEP-native language"]]],
 ["Games",[
   ["chess","♟️","Chess","Influence maps, PTO eval, play the engine"],
   ["poker","🂡","Poker","Equity, EV coach, range trainer, a bot"]]],
 ["Mind",[
   ["logic","⊢","Logic","Learn to reason — truth tables to proofs"],
   ["gauntlet","⚖️","The Gauntlet","An ethics game"],
   ["ethics","🎭","Ethics Arena","Moral dilemmas — find your framework"],
   ["religions","☸","Religions","What the faiths claim"],
   ["two-selves","🧠","Two Selves","Conscious vs. subconscious"],
   ["poietism","📚","Poietism","Study the philosophy"],
   ["doomsday","📅","Doomsday","Day-of-week mental math"]]],
 ["Science",[
   ["calculus","∂","Calculus","Limits → derivatives → integrals → series"],
   ["linalg","⧉","Linear Algebra","Vectors, matrices, transformations"],
   ["probability","🎲","Probability & Stats","Reasoning under uncertainty"],
   ["action","∫","Action","Lagrangian & Hamiltonian mechanics"],
   ["em","⚡","Electricity & Magnetism","Fields, circuits, and light"],
   ["thermo","🔥","Thermodynamics","Heat, energy, and entropy"],
   ["waves","〰️","Waves & Optics","Vibration, interference, light"],
   ["quantum","⚛","Quantum Mechanics","The physics of the very small"],
   ["chem","⚗","Chemistry","Atoms, bonds, and reactions"],
   ["bio","🧬","Biology","The logic of living things"],
   ["polymath","✦","Polymath","A tour of every science"],
   ["mathematics","📐","Mathematics","The full course — proof to calculus"]]],
 ["Economics",[
   ["koin","⚖️","Koin","Give-take economics"],
   ["koin-welcome","👋","Koin: Welcome","A gentle intro"],
   ["koin-essential","✦","Koin: Essentials","In brief"],
   ["koin-kids","🧒","Koin: For Kids","The friendliest"],
   ["koin-teaching","📖","Koin: Teaching","How to explain it"],
   ["koin-pamphlet","📜","Koin: Manifesto","Custody vs. contribution"]]],
 ["Investing",[
   ["transformation-map","🌐","Transformation Map","Invest by trajectory"],
   ["portfolio-planner","📊","Portfolio Planner","Core + satellite"],
   ["spacex-pto","🛰️","SpaceX · PTO","Valuation scenarios"],
   ["spacex-invest","🚀","SpaceX Plan","DCA projection"]]],
 ["Writing",[
   ["animal-book","📖","The Animal That Bets","The book"],
   ["animal-essay","📝","…the Essay","The short version"],
   ["poietism-pamphlet","📜","Poietism Field Guide","20+ pages"],
   ["poietism-paper","📄","Poietism Paper","The core essay"],
   ["poietism-naming","🔤","Naming Poietism","How the name was chosen"]]],
 ["Tools",[
   ["praxa","⌨️","Praxa","A local, keyless terminal AI coding agent"],
   ["cartographer","🧭","Cartographer","Map a decision"],
   ["highlights","✨","Highlights","A 2-minute tour"]]],
 ["Math playground",[
   ["life","◼︎","Life"],["evolution","🧬","Evolution"],["voronoi","🕸️","Voronoi"],
   ["math-neural","🔀","Neural"],["math-spreading","💫","Spreading"],["math-predictor","🎯","Predictor"],
   ["math-kuramoto","🌀","Kuramoto"],["math-reaction","🐆","Reaction"],["math-sandpile","⛰️","Sandpile"],
   ["math-percolation","💧","Percolation"],["math-galton","🔔","Galton"],["math-globe","🌍","Globe"],
   ["math-language-evolution","🗨️","Language"],["math-annealing","🔥","Annealing"],["math-bayes","📊","Bayes"],
   ["math-entropy","🌡️","Entropy"],["math-diffusion","🌫️","Diffusion"],["math-network","🔗","Network"],
   ["math-gradient","📉","Gradient"],["math-fourier","〰️","Fourier"],["math-epidemic","🦠","Epidemic"],
   ["math-pendulum","⚖️","Pendulum"],["math-attractor","🦋","Attractor"],["math-cycles","🔁","Cycles"],
   ["math-markov","⛓️","Markov"],["math-mcmc","🎲","MCMC"],["math-gp","📈","GP"],
   ["math-novelty","✨","Novelty"],["math-haze","🌁","Haze"],["math-modulation","🎚️","Modulation"],["hex","⬡","Hex"]]]
];

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function tile(a){ return '<a class="tile" href="apps/'+a[0]+'.html"><div class="ic">'+a[1]+'</div>'+
  '<div class="nm">'+esc(a[2])+'</div>'+(a[3]?'<div class="ds">'+esc(a[3])+'</div>':'')+'</a>'; }
function mtile(a){ return '<a class="mtile" href="apps/'+a[0]+'.html"><span class="ic">'+a[1]+'</span>'+esc(a[2])+'</a>'; }

function render(filter){
  filter=(filter||'').toLowerCase().trim();
  var html='', any=false;
  for(var i=0;i<CATS.length;i++){
    var name=CATS[i][0], items=CATS[i][1], isMath=(name==='Math playground');
    var shown=items.filter(function(a){ return !filter || (a[2]+' '+(a[3]||'')+' '+name).toLowerCase().indexOf(filter)>=0; });
    if(!shown.length) continue; any=true;
    html+='<div class="sec">'+esc(name)+'</div>';
    if(isMath){ html+='<div class="mgrid">'+shown.map(mtile).join('')+'</div>'; }
    else{ html+='<div class="grid">'+shown.map(tile).join('')+'</div>'; }
  }
  if(!any) html='<p class="empty">No matches for "'+esc(filter)+'".</p>';
  document.getElementById('list').innerHTML=html;
}

try{ render(''); }catch(err){
  document.getElementById('list').innerHTML='<p class="empty">Something went wrong: '+esc(err.message)+
    '<br><br>Open apps directly, e.g. <a href="apps/tokipona.html">Toki Pona</a>.</p>';
}
var q=document.getElementById('q');
if(q) q.addEventListener('input', function(){ try{ render(q.value); }catch(e){} });
</script>
</body></html>
