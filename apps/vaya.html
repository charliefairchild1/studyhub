body{margin:0;background:var(--bg);color:var(--txt);

header{padding:22px 26px 10px;border-bottom:1px solid var(--ln)}

nav{display:flex;gap:4px;padding:12px 26px 0;flex-wrap:wrap}
nav button{background:none;border:none;color:var(--dim);padding:9px 15px;border-radius:9px 9px 0 0;
  font:inherit;font-weight:600;cursor:pointer}
nav button.on{color:var(--neon);background:var(--pnl);border:1px solid var(--ln);border-bottom:none}
main{max-width:920px;margin:0 auto;padding:22px 26px 80px}
.panel{display:none} .panel.on{display:block;animation:f .2s}
@keyframes f{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
.card{background:var(--pnl);border:1px solid var(--ln);border-radius:12px;padding:18px 20px;margin:14px 0}
.ipa{font-family:"Gentium Plus","Doulos SIL","Charis SIL",Georgia,serif}
.big{font-size:2.2em;color:var(--neon2)}
h2{color:var(--neon);font-size:1.15em;margin:.2em 0 .6em}
h3{color:#ffc7f4;font-size:.9em;margin:1.1em 0 .3em;text-transform:uppercase;letter-spacing:.5px}
table{border-collapse:collapse;width:100%;margin:.4em 0}
th,td{border:1px solid var(--ln);padding:7px 11px;text-align:left;vertical-align:top}
th{background:#ff4aec18;color:#ffc7f4;font-size:.85em}
tr:nth-child(even) td{background:#ffffff07}
.tag{color:var(--neon2);font-weight:700}

button.grade{border:none;border-radius:9px;padding:11px 0;font:inherit;font-weight:700;cursor:pointer;flex:1;color:#111}
input,select,textarea{background:#0f0f16;color:var(--txt);border:1px solid var(--ln);border-radius:8px;
  padding:9px 11px;font:inherit}
textarea{width:100%;min-height:90px;resize:vertical}
input.ipa{font-size:1.5em;width:100%}
input.search{width:100%;font-size:1.05em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:6px}
.sym{background:#0f0f16;border:1px solid var(--ln);border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer}
.sym:hover{border-color:var(--neon)}
.sym .s{font-size:1.4em;color:var(--neon2)} .sym .g{font-size:.6em;color:var(--dim);line-height:1.15}
.gloss{background:#0f0f16;border:1px solid var(--ln);border-radius:10px;padding:14px 16px;margin-top:12px}
.seg{border-left:3px solid var(--neon);padding:2px 0 2px 12px;margin:8px 0}
.dim{color:var(--dim)} .mut{color:var(--dim);font-size:.9em}
.pill{display:inline-block;background:#ff4aec1a;color:#ffc7f4;border-radius:20px;padding:2px 11px;font-size:.8em;margin:2px 3px}
.stat{display:inline-block;min-width:88px;text-align:center;margin:6px 10px 6px 0}
.stat b{display:block;font-size:1.6em;color:var(--neon2)} .stat span{font-size:.8em;color:var(--dim)}
.bar{height:8px;background:#0f0f16;border-radius:5px;overflow:hidden;margin-top:4px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--neon),var(--neon2))}
kbd{background:#0f0f16;border:1px solid var(--ln);border-radius:5px;padding:1px 6px;font-size:.85em}

button.say:hover{border-color:var(--neon);background:#26263a}
button.opt{display:block;width:100%;text-align:left;background:#0f0f16;border:1px solid var(--ln);color:var(--txt);border-radius:10px;padding:14px 16px;margin:8px 0;font:inherit;cursor:pointer}
button.opt:hover{border-color:var(--neon)}
button.opt.correct{border-color:var(--good);background:#11351f}
button.opt.wrong{border-color:var(--bad);background:#3a1420}
button.opt:disabled{cursor:default}
.wchip{display:inline-block;text-align:center;margin:4px 6px;vertical-align:top;cursor:pointer}
.wchip .v{font-size:1.35em;color:var(--neon2)} .wchip.coined .v{color:var(--coin)}

.tline{font-size:1.5em;line-height:2.2;word-spacing:.15em}
.tw{color:var(--neon2);cursor:pointer} .tw.coined{color:var(--coin)} .tw:hover{text-decoration:underline}
.punct{color:var(--dim)}

/* ============================ CURATED CORE LEXICON ============================ */

const CORE=[

  {en:"is|am|are|be|being|been",v:"es",pos:"v"},{en:"have|has|had",v:"hab",pos:"v"},{en:"do|does|did",v:"vo",pos:"v"},
  {en:"will|shall",v:"fut",pos:"aux"},{en:"can|could",v:"po",pos:"aux"},{en:"would",v:"vud",pos:"aux"},{en:"should|must",v:"deb",pos:"aux"},{en:"may|might",v:"pos",pos:"aux"},

  {en:"go|went|gone",v:"wa",pos:"v"},{en:"come|came",v:"ven",pos:"v"},{en:"see|saw|seen|look|watch",v:"ɗa",pos:"v"},
  {en:"know|knew|known",v:"ju",pos:"v"},{en:"think|thought",v:"je",pos:"v"},{en:"want",v:"wi",pos:"v"},
  {en:"give|gave|given",v:"gi",pos:"v"},{en:"take|took|taken",v:"ki",pos:"v"},{en:"make|made|build",v:"du",pos:"v"},
  {en:"say|said|tell|told|speak|spoke",v:"za",pos:"v"},{en:"learn|learned",v:"jǎi",pos:"v"},
  {en:"get|got",v:"hol",pos:"v"},{en:"find|found",v:"tov",pos:"v"},{en:"use|used",v:"uz",pos:"v"},
  {en:"work|worked",v:"la",pos:"v"},{en:"help|helped",v:"aj",pos:"v"},{en:"love|liked|like",v:"am",pos:"v"},
  {en:"feel|felt",v:"fol",pos:"v"},{en:"live|lived",v:"viv",pos:"v"},{en:"die|died",v:"mor",pos:"v"},
  {en:"eat|ate|eaten",v:"ed",pos:"v"},{en:"drink|drank",v:"bev",pos:"v"},{en:"read",v:"leg",pos:"v"},{en:"write|wrote|written",v:"ski",pos:"v"},{en:"hear|heard",v:"aw",pos:"v"},
  {en:"become|became",v:"fi",pos:"v"},{en:"seem",v:"par",pos:"v"},{en:"keep|kept|hold|held",v:"mo",pos:"v"},{en:"let",v:"les",pos:"v"},{en:"begin|began|start",v:"ko",pos:"v"},{en:"end|finish",v:"fin",pos:"v"},{en:"move|moved",v:"muv",pos:"v"},{en:"perceive",v:"ɗa",pos:"v"},{en:"transform|change|flow",v:"va",pos:"v"},{en:"predict|expect",v:"ji",pos:"v"},{en:"forget|forgot",v:"hu",pos:"v"},

  {en:"divide|divided",v:"div",pos:"math"},{en:"power",v:"pote",pos:"math"},
  {en:"root",v:"ʁadi",pos:"math"},{en:"sum",v:"suma",pos:"math"},

// grammar particles used by the translator
const G={past:"pə",future:"fʊt",plural:"mɛ",neg:"ʔa"};

/* build english -> core map */
const CORE_EN={};
for(const w of CORE) for(const key of w.en.split("|")) CORE_EN[key]=w.v;

/* ============================ AUTO-COINER ============================ */
const G_ON=["p","b","t","d","ʈ","ɖ","c","ɟ","k","ɡ","q","m","n","ɳ","ɲ","ŋ","ɸ","β","f","v","θ","ð","s","z",
  "ʃ","ʒ","ʂ","ʐ","ç","ʝ","x","ɣ","χ","ʁ","ħ","h","ɦ","r","ɾ","ʀ","l","ɭ","ʎ","ɹ","ɻ","ʋ","j","w","ɰ"];
const G_VO=["a","ɑ","ɛ","e","i","ɪ","ɔ","o","u","ʊ","ə","æ","ø","œ","ɨ","ʉ","ɯ","ʌ","ɤ","y","ɒ","ɐ"];
const G_CO=["","n","ŋ","ɲ","s","ʃ","l","ɭ","r","ʁ","k","t","m","p","ç","x"];
function _hash(s){let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function _nxt(h){return (Math.imul(h,2654435761)^(h>>>15))>>>0;}
function _form(seed){
  // flowing open syllables: 1–3 of CV, no clusters
  const r=seed%10, nsyl=r===0?1:(r>=8?3:2);
  let h=_nxt(seed),w="";
  for(let i=0;i<nsyl;i++){ w+=G_ON[h%G_ON.length]; h=_nxt(h); w+=G_VO[h%G_VO.length]; h=_nxt(h); }
  return w;
}
const CKEY="vaya-coined-v1";
function coinStore(){try{return JSON.parse(localStorage.getItem(CKEY))||{};}catch(e){return {};}}
function saveCoin(s){localStorage.setItem(CKEY,JSON.stringify(s));}
let _taken=null;
function takenSet(){
  if(_taken) return _taken;
  _taken=new Set(Object.values(CORE_EN)); Object.values(coinStore()).forEach(v=>_taken.add(v));
  return _taken;
}
function coin(en){
  en=en.toLowerCase();
  if(CORE_EN[en]) return CORE_EN[en];
  const store=coinStore();
  if(store[en]) return store[en];
  const taken=takenSet();
  let seed=_hash(en), form=_form(seed), tries=0;
  while(taken.has(form)&&tries<60){ seed=(seed+0x9e3779b1)>>>0; form=_form(seed); tries++; }
  store[en]=form; taken.add(form); saveCoin(store);
  return form;
}
function isCoined(en){ return !CORE_EN[en.toLowerCase()]; }

/* ============================ SOUND — Web Audio formant synth ============================ */

function _vowel(ctx,out,c,marks,t,basef){

function _cons(ctx,out,c,t){

  amp.connect(out);o.start(t);o.stop(t+dur+0.03);return t+dur+0.02;

function _fsynth(word){   /* fallback formant synth if Web Speech is unavailable */
  const ctx=AC();if(ctx.state==="suspended")ctx.resume();
  const out=ctx.createGain();out.gain.value=0.5;
  const warm=ctx.createBiquadFilter();warm.type="lowpass";warm.frequency.value=3300;warm.Q.value=0.4;
  out.connect(warm);warm.connect(ctx.destination);

  for(const {sym,marks} of segs){const c=classify(sym);
    if(c.kind==="V"){const frac=nV>1?vi/(nV-1):0;t=_vowel(ctx,out,c,marks,t,p0+(pE-p0)*frac);vi++;}
    else if(c.kind==="C")t=_cons(ctx,out,c,t);}

const RESP={
  "p":"p","b":"b","t":"t","d":"d","ʈ":"t","ɖ":"d","c":"ky","ɟ":"gy","k":"k","g":"g","ɡ":"g","q":"k","ɢ":"g","ʔ":"","ɓ":"b","ɗ":"d","ʄ":"j","ɠ":"g","ʛ":"g",
  "m":"m","ɱ":"m","n":"n","ɳ":"n","ɲ":"ny","ŋ":"ng","ɴ":"ng","ʙ":"br","r":"r","ʀ":"r","ɾ":"r","ɽ":"r",
  "ɸ":"f","β":"v","f":"f","v":"v","θ":"th","ð":"th","s":"s","z":"z","ʃ":"sh","ʒ":"zh","ʂ":"sh","ʐ":"zh",
  "ç":"h","ʝ":"y","x":"kh","ɣ":"g","χ":"kh","ʁ":"r","ħ":"h","ʕ":"h","h":"h","ɦ":"h",
  "l":"l","ɭ":"l","ʎ":"ly","ʟ":"l","ʋ":"v","ɹ":"r","ɻ":"r","j":"y","ɰ":"w","w":"w",
  "t͡s":"ts","d͡z":"dz","t͡ʃ":"ch","d͡ʒ":"j",
  "i":"ee","y":"ew","ɨ":"i","ʉ":"u","ɯ":"u","u":"oo","ɪ":"i","ʊ":"uu","e":"e","ø":"er","ɘ":"uh","ɵ":"uh","ɤ":"uh","o":"oh","ə":"uh","ɛ":"e","œ":"er","ɜ":"ur","ʌ":"uh","ɔ":"aw","æ":"a","ɐ":"uh","a":"ah","ɶ":"ah","ɑ":"ah","ɒ":"aw"

function respell(word){
  let out="";for(const {sym} of seglist(word)) out+=(RESP[sym]!==undefined?RESP[sym]:sym);
  return out.replace(/-/g," ").replace(/\s+/g," ").trim();
}
// guaranteed word-like spellings for common short words (else voices spell them out)
const SAY_FIX={e:"eh",le:"leh",ne:"neh",lo:"loh",od:"odd",ma:"mah",si:"see",ku:"koo",no:"noh",re:"reh",
  de:"deh",be:"beh",et:"et",vo:"voh",po:"poh",es:"ess",en:"en",ad:"add",up:"up",wa:"wah",ju:"joo",je:"yeh",
  wi:"wee",do:"doh",gi:"gee",ki:"kee",mo:"moh",ko:"koh",la:"lah",am:"am",fi:"fee",ha:"hah",ga:"gah",nu:"noo",
  an:"an",ta:"tah",hu:"hoo",va:"vah",ji:"yee",du:"doo",fa:"fah",za:"zah",mi:"mee",su:"soo",gu:"goo",fe:"feh",
  ke:"keh",lu:"loo",fu:"foo",se:"seh",ro:"roh",so:"soh",mu:"moo",
  ple:"pleh",aj:"eye",vaj:"vye",vje:"vyeh",kwe:"kweh",ba:"bah",ne:"neh",fe:"feh"};
function speechify(word){
  let s=SAY_FIX[word];
  if(s===undefined){ s=respell(word); if(!/[aeiouy]/.test(s))s+="a"; if(s.length<=2)s+=s.slice(-1); }
  return s.toLowerCase();
}
let _voices=[];
const VOICE_KEY="vaya-voice";
function _loadVoices(){if(window.speechSynthesis)_voices=speechSynthesis.getVoices()||[];}
function _scoreVoice(v){                       // higher = more natural / human
  const n=v.name||"",l=(v.lang||"").toLowerCase();let s=0;
  if(/siri/i.test(n))s+=100;
  if(/enhanced|premium|natural|neural/i.test(n))s+=60;
  if(/google/i.test(n))s+=45;
  if(/microsoft/i.test(n)&&/online|natural/i.test(n))s+=50;
  if(/\b(ava|samantha|allison|serena|zoe|evan|nathan|joelle|karen|moira|tessa|alex)\b/i.test(n))s+=20;
  if(l.startsWith("en-us"))s+=12;else if(l.startsWith("en"))s+=8;
  return s;
}
function _pickVoice(){
  if(!_voices.length)_loadVoices();
  const saved=localStorage.getItem(VOICE_KEY);
  if(saved){const v=_voices.find(v=>v.name===saved);if(v)return v;}
  let best=null,bs=-1;for(const v of _voices){const s=_scoreVoice(v);if(s>bs){bs=s;best=v;}}
  return best||_voices[0]||null;
}
function speakText(text){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  const v=_pickVoice();if(v){u.voice=v;u.lang=v.lang;}
  u.rate=0.95;u.pitch=1.02;speechSynthesis.speak(u);
}
function fillVoices(){
  _loadVoices();const sel=document.getElementById("voicepick");if(!sel)return;
  const cur=(_pickVoice()||{}).name;
  let list=_voices.filter(v=>/^en/i.test(v.lang));if(!list.length)list=_voices;
  list=list.slice().sort((a,b)=>_scoreVoice(b)-_scoreVoice(a));

  sel.onchange=()=>{localStorage.setItem(VOICE_KEY,sel.value);speakText(["mi","jǎi","θa","gu"].map(speechify).join(" "));};
}
if(window.speechSynthesis){_loadVoices();speechSynthesis.onvoiceschanged=()=>{_loadVoices();fillVoices();};}

/* ============================ DECODER ============================ */
const COMB="́̀̌̂̃̈";
function seglist(s){
  s=s.normalize("NFD");const out=[];let i=0;
  while(i<s.length){
    const three=s.substr(i,3);
    if(AFFR[three]){out.push({sym:three,marks:""});i+=3;continue;}
    let base=s[i];i++;let marks="";
    while(i<s.length&&(/\p{Mn}/u.test(s[i])||s[i]==="ː")){marks+=s[i];i++;}
    if(base.trim()==="")continue;
    // recompose non-tone marks (e.g. cedilla in ç) back onto the base; keep tone marks separate
    const other=marks.replace(/[̀́̂̃̈̌̄]/g,"").replace(/ː/g,"");
    out.push({sym:(base+other).normalize("NFC"),marks});
  }
  return out;
}
function classify(sym){
  if(AFFR[sym])return {kind:"C",place:AFFR[sym][0],manner:"affricate",voiced:AFFR[sym][1]};
  if(C[sym])return {kind:"C",place:C[sym][0],manner:C[sym][1],voiced:C[sym][2]};
  if(V[sym])return {kind:"V",height:V[sym][0],back:V[sym][1],round:V[sym][2]};
  return {kind:"?"};
}
function decode(word){
  const rows=[];
  for(const {sym,marks} of seglist(word)){
    const c=classify(sym);
    if(c.kind==="C") rows.push({sym,kind:"C",parts:[
      MANNER[c.manner].mode+" — "+MANNER[c.manner].desc,VOICE[!!c.voiced].v+" — "+VOICE[!!c.voiced].d,"locus: "+c.place+" — "+PLACE[c.place]],
      artic:(c.voiced?"voiced":"voiceless")+" "+c.place+" "+c.manner});
    else if(c.kind==="V"){let tone="";for(const mm of marks){if(TONE[mm])tone=TONE[mm].t+" — "+TONE[mm].d;}
      rows.push({sym,kind:"V",parts:["stance: "+HEIGHT[c.height].s+" — "+HEIGHT[c.height].d,"arc: "+BACK[c.back].a+" — "+BACK[c.back].d,"magnitude: "+ROUND[!!c.round],(marks.includes("ː")?"long — a large residual":""),(tone?"trajectory: "+tone:"")].filter(Boolean),
        artic:(c.round?"rounded ":"")+c.height+" "+c.back+" vowel"});}
    else rows.push({sym,kind:"?",parts:["not in the current IPA inventory"],artic:"—"});
  }
  return rows;
}
function glossSentence(rows){
  const cs=rows.filter(r=>r.kind==="C"),vs=rows.filter(r=>r.kind==="V");
  if(!cs.length&&!vs.length)return "—";
  let s="A ";const c=cs[0]&&classify(cs[0].sym),v=vs[vs.length-1]&&classify(vs[vs.length-1].sym);
  if(c)s+="<b class=tag>"+MANNER[c.manner].mode.toLowerCase()+"</b>, <b class=tag>"+VOICE[!!c.voiced].v.split(" ")[0].toLowerCase()+"</b> process at the <b class=tag>"+c.place+"</b> locus";else s+="stance";
  if(v)s+=", held as <b class=tag>"+HEIGHT[v.height].s.toLowerCase()+"</b> at the <b class=tag>"+BACK[v.back].a.toLowerCase()+"</b> point of the arc";
  return s+".";
}

/* ============================ TRANSLATE ============================ */
function lemma(w){
  // returns {base, plural, past, prog}
  let plural=false,past=false,prog=false,base=w;
  if(CORE_EN[w]) return {base:w,plural,past,prog};
  if(w.endsWith("ies")&&w.length>4){const b=w.slice(0,-3)+"y";plural=true;base=b;}
  else if(w.endsWith("es")&&w.length>3){base=w.slice(0,-2);plural=true;}
  else if(w.endsWith("s")&&!w.endsWith("ss")&&w.length>2){base=w.slice(0,-1);plural=true;}
  if(w.endsWith("ed")&&w.length>3){base=w.slice(0,-2);past=true;plural=false;}
  if(w.endsWith("ing")&&w.length>4){base=w.slice(0,-3);prog=true;plural=false;}
  return {base,plural,past,prog};
}
function wordToVaya(raw){
  const w=raw.toLowerCase();
  if(w==="a"||w==="an")return null; // drop indefinite article
  const LEX=window.VAYA_LEX||{};
  let hit=CORE_EN[w]?{v:CORE_EN[w]}:LEX[w];
  if(hit)return {v:hit.v,en:raw,coined:false,parts:hit.p||null,extra:[]};
  const lm=lemma(w);
  let bh=CORE_EN[lm.base]?{v:CORE_EN[lm.base]}:LEX[lm.base];
  let v,coined;
  if(bh){v=bh.v;coined=false;} else {v=coin(lm.base);coined=true;}
  const extra=[];
  if(lm.past)extra.push({v:G.past,tag:"past"});
  if(lm.plural)extra.push({v:G.plural,tag:"plural"});
  if(lm.prog)extra.push({v:"ʒa",tag:"ongoing"});
  return {v,en:raw,coined,parts:(bh&&bh.p)||null,extra};
}
function translate(text){
  const parts=text.match(/([A-Za-z']+)|([^A-Za-z']+)/g)||[];
  const out=[];
  for(const p of parts){
    if(!/[A-Za-z]/.test(p)){out.push({punct:p});continue;}
    const r=wordToVaya(p);
    if(r)out.push(r);
  }
  return out;
}

// the course: all ~10k words, most-common first, each {v, en, p}
const COURSE=(function(){
  const LEX=window.VAYA_LEX||{}, ORDER=window.VAYA_ORDER||[], out=[], seen=new Set();
  for(const en of ORDER){ if(out.length>=10000)break; const e=LEX[en]; if(!e||en.length<2||seen.has(e.v))continue; seen.add(e.v); out.push({v:e.v,en,p:e.p||null,s:(window.VAYA_SENSES&&window.VAYA_SENSES[e.v])||[en]}); }
  return out;
})();
function _shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const SKEY="vaya-srs-v1";
function srs(){try{return JSON.parse(localStorage.getItem(SKEY))||{};}catch(e){return {};}}
function saveSrs(s){localStorage.setItem(SKEY,JSON.stringify(s));}
function strength(it){if(!it)return 0;const days=(Date.now()-it.last)/86400000;return it.s*Math.exp(-days/Math.max(0.4,it.s*6));}
function renderCourse(){
  const el=document.getElementById("p-course");
  const S={active:false,n:0,correct:0,cur:null};
  const key=it=>"w:"+it.v;
  function learned(){const s=srs();return COURSE.filter(it=>strength(s[key(it)])>0.5).length;}
  function grade(ok){const s=srs(),id=key(S.cur),prev=s[id]?s[id].s:0.2;s[id]={s:ok?Math.min(1,prev+0.3):0.15,last:Date.now()};saveSrs(s);S.n++;if(ok)S.correct++;}
  function pick(){
    const s=srs();
    const due=COURSE.filter(it=>s[key(it)]&&strength(s[key(it)])<0.6);
    const fresh=COURSE.find(it=>!s[key(it)]);
    if(fresh&&(Math.random()<0.55||!due.length))return{item:fresh,mode:"teach"};
    if(due.length)return{item:due[Math.floor(Math.random()*due.length)],mode:"quiz"};
    let w=COURSE[0],bs=2;for(const it of COURSE){const st=strength(s[key(it)]);if(st<bs){bs=st;w=it;}}return{item:w,mode:"quiz"};
  }
  function opts(item){return _shuffle([item,..._shuffle(COURSE.filter(x=>x.v!==item.v)).slice(0,3)]);}
  function topbar(){return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span class="mut">this session · '+S.n+' done · '+S.correct+' right</span><button class="act ghost" id="cstop">■ Stop</button></div>';}
  function wire(){const b=el.querySelector("#cstop");if(b)b.onclick=()=>{S.active=false;render();};}
  function teach(item){
    el.innerHTML='<div class="card">'+topbar()+
      '<div class="mut">new word</div>'+
      '<div style="text-align:center;margin:22px 0"><div class="ipa" style="font-size:2.8em;color:var(--neon2)">'+item.v+'</div>'+
      '<div style="font-size:1.35em;margin-top:8px">'+item.en+'</div>'+
      (item.s&&item.s.length>1?'<div class="mut" style="margin-top:4px">also: '+item.s.filter(x=>x!==item.en).slice(0,8).join(", ")+'</div>':'')+
      (item.p?'<div class="mut">'+item.p+'</div>':'')+
      '<div style="margin-top:14px"><button class="say" data-say="'+item.v+'">🔊 hear it</button></div></div>'+
      '<button class="act" id="cgot" style="width:100%">Got it →</button></div>';
    wire();speak(item.v);
    el.querySelector("#cgot").onclick=()=>{const s=srs();s[key(item)]={s:0.35,last:Date.now()};saveSrs(s);next();};
  }
  function quiz(item){
    const type=["va2en","en2va","listen"][Math.floor(Math.random()*3)], choices=opts(item);
    let q,ren,auto=false;
    if(type==="va2en"){q='What does <span class="ipa big">'+item.v+'</span> <button class="say" data-say="'+item.v+'">🔊</button> mean?';ren=o=>o.en;}
    else if(type==="en2va"){q='Which word means <b>'+item.en+'</b>?';ren=o=>'<span class="ipa" style="font-size:1.2em">'+o.v+'</span>';}
    else{q='🔊 What did you hear? <button class="say" data-say="'+item.v+'">↻ replay</button>';ren=o=>o.en;auto=true;}
    el.innerHTML='<div class="card">'+topbar()+'<div style="font-size:1.2em;margin:8px 0 14px">'+q+'</div><div id="copts">'+
      choices.map((o,i)=>'<button class="opt" data-i="'+i+'">'+ren(o)+'</button>').join("")+'</div><div id="ccont"></div></div>';
    wire();if(auto)speak(item.v);
    el.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{
      const ok=choices[+b.dataset.i].v===item.v;
      el.querySelectorAll(".opt").forEach((x,i)=>{x.disabled=true;if(choices[i].v===item.v)x.classList.add("correct");});
      if(!ok)b.classList.add("wrong");
      grade(ok);
      el.querySelector("#ccont").innerHTML='<button class="act" id="cnext" style="width:100%;margin-top:10px">'+(ok?"Correct →":"Got it →")+'</button>';
      el.querySelector("#cnext").onclick=next;
    });
  }
  function next(){if(!S.active)return;const{item,mode}=pick();S.cur=item;if(mode==="teach")teach(item);else quiz(item);}
  function render(){
    const done=learned();
    el.innerHTML='<div class="card"><h2>Learn Vaya — guided lessons</h2>'+
      '<p>Press start and go. New words are introduced, then drilled with quick activities — multiple choice, listening, and recall — and spaced over time so they stick. Stop whenever you like; progress is saved.</p>'+
      '<div class="bar"><i style="width:'+Math.round(done/COURSE.length*100)+'%"></i></div>'+
      '<p class="mut">'+done+' / '+COURSE.length+' words learned'+(S.n?' · last session '+S.correct+'/'+S.n+' right':'')+'</p>'+
      '<button class="act" id="cstart" style="width:100%;font-size:1.1em;padding:14px">▶ Start lesson</button></div>';
    el.querySelector("#cstart").onclick=()=>{S.active=true;S.n=0;S.correct=0;next();};
  }
  render();
}

const NUMW={0:"zin",1:"win",2:"tin",3:"rin",4:"pin",5:"kin",6:"lin",7:"min",8:"bin",9:"gin",10:"den"};
function num2vaya(n){
  n=Math.floor(Math.abs(n));
  if(n<=10)return NUMW[n];
  if(n<100){const t=Math.floor(n/10),o=n%10;return (t===1?"den":NUMW[t]+" den")+(o?" "+NUMW[o]:"");}
  if(n<1000){const h=Math.floor(n/100),r=n%100;return NUMW[h]+" sun"+(r?" "+num2vaya(r):"");}
  if(n<1000000){const k=Math.floor(n/1000),r=n%1000;return num2vaya(k)+" tun"+(r?" "+num2vaya(r):"");}
  return String(n);
}
const MATHOP={"+":"ple","-":"mɪnu","*":"mul","×":"mul","/":"div","÷":"div","=":"ba","^":"pote",">":"maʁ","<":"mɪnɔ"};
function mathToVaya(expr){
  const toks=expr.match(/\d+\.?\d*|[+\-*/=^×÷<>]/g)||[];
  return toks.map(t=>/\d/.test(t)?num2vaya(parseFloat(t)):(MATHOP[t]||t)).join(" ");
}

    sHTML("θus θa je","∴ You think.   (therefore you think)")+
    '<p class="mut" style="margin-top:14px">And a conditional argument (modus ponens):</p>'+
    sHTML("si θa jǎi , θa ju","If you learn, you know.")+
    sHTML("θa jǎi","You learn.")+
    sHTML("θus θa ju","∴ You know.")+'</div>'+
  '<div class="card"><h2>The words of math</h2>'+
    '<table><tr><th>symbol</th><th>meaning</th><th>Vaya</th></tr>'+
    ref("=","equals","ba")+ref("≠","not equal","ʔa ba")+ref("+","plus","ple")+ref("−","minus","mɪnu")+
    ref("×","times","mul")+ref("÷","divide","div")+ref("^","to the power","pote")+ref("√","root","ʁadi")+
    ref("∑","sum","suma")+ref(">","greater than","maʁ")+ref("<","less than","mɪnɔ")+'</table>'+
    '<p class="mut">Numbers are regular: 0–10 are single words, then they combine — 25 = <span class="ipa" style="color:var(--neon2)">tin den kin</span> (two-ten-five), 342 = <span class="ipa" style="color:var(--neon2)">rin sun pin den tin</span>.</p></div>'+
  '<div class="card"><h2>Say any equation</h2>'+
    '<p class="mut">Type math with digits and + − * / = ^ &gt; &lt; and hear it in Vaya.</p>'+
    '<input class="ipa" id="mexpr" style="font-size:1.2em" value="2 + 2 = 4">'+
    '<div style="margin-top:8px"><button class="act" id="mgo">Read as Vaya</button></div>'+
    '<div id="mout"></div></div>';
  const out=el.querySelector("#mout");
  function go(){ const v=mathToVaya(el.querySelector("#mexpr").value); out.innerHTML=sHTML(v,el.querySelector("#mexpr").value); }
  el.querySelector("#mgo").onclick=go;
  el.querySelector("#mexpr").addEventListener("keydown",e=>{if(e.key==="Enter")go();});
  go();
}

}
