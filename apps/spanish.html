.sub{color:var(--dim);font-size:.9em;margin-top:2px}
nav{display:flex;gap:4px;flex-wrap:wrap;max-width:1080px;margin:16px auto 0;padding:0 26px;border-bottom:1px solid var(--rule)}
nav button{background:none;border:none;color:var(--dim);font-size:.95em;padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent;font-weight:600}
nav button:hover{color:var(--ink)}nav button.on{color:var(--gold);border-bottom-color:var(--gold)}
main{max-width:1080px;margin:0 auto;padding:22px 26px 100px}
h2{font-size:1.3em;margin-bottom:4px}.muted{color:var(--dim);font-size:.9em}
.card{background:var(--panel);border:1px solid var(--rule);border-radius:14px;padding:18px 20px;margin-bottom:14px}
.btn{background:var(--panel2);border:1px solid var(--rule);color:var(--ink);padding:10px 16px;border-radius:10px;cursor:pointer;font-weight:600;font-size:.95em}

.btn.p{background:var(--red);border-color:var(--red);color:#fff}.btn.p:hover{filter:brightness(1.1)}

input:focus,textarea:focus{outline:none;border-color:var(--gold)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.speak{background:none;border:none;color:var(--gold);cursor:pointer;font-size:1.3em}

.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:680px){.plan-grid{grid-template-columns:1fr}.flash{padding:34px 18px!important}}
.task{display:flex;gap:11px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--rule);cursor:pointer}
.task:last-child{border:none}
.task .box{width:22px;height:22px;border:2px solid var(--faint);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.9em;margin-top:1px}
.task.done .box{background:var(--green);border-color:var(--green);color:#0e2a14}
.task.done .t{color:var(--faint);text-decoration:line-through}
.task .t{font-weight:600}.task .d{color:var(--dim);font-size:.82em;font-weight:400}
.book{color:var(--gold);font-size:.75em;text-transform:uppercase;letter-spacing:.5px}
.stats{display:flex;gap:22px;flex-wrap:wrap;margin:6px 0 4px}
.stat{text-align:center}.stat .n{font-size:2em;font-weight:800;color:var(--gold);line-height:1}.stat .l{color:var(--dim);font-size:.78em}
.ring{--p:0;width:88px;height:88px;border-radius:50%;background:conic-gradient(var(--green) calc(var(--p)*1%),#2a201b 0);display:flex;align-items:center;justify-content:center}
.ring .in{width:70px;height:70px;border-radius:50%;background:var(--panel);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1em}
.week{border-left:2px solid var(--red);padding:2px 0 2px 14px;margin-bottom:12px}
.week b{color:var(--gold)}
/* flash / SRS */
.flash{background:var(--panel);border:1px solid var(--rule);border-radius:18px;padding:44px 30px;text-align:center;min-height:230px;display:flex;flex-direction:column;justify-content:center;cursor:pointer}
.flash .es{font-size:2.4em;font-weight:700}
.flash .cat{color:var(--faint);font-size:.75em;text-transform:uppercase;letter-spacing:1.5px;margin-top:8px}
.flash .en{color:var(--gold);font-size:1.5em;margin-top:16px}
.flash .hint{color:var(--faint);font-size:.82em;margin-top:20px;text-transform:uppercase;letter-spacing:1px}
.grades{display:flex;gap:10px;justify-content:center;margin-top:14px}
.bar{height:8px;background:#2a201b;border-radius:5px;overflow:hidden;margin:12px 0}
.bar>i{display:block;height:100%;background:var(--green)}
.pill{display:inline-block;background:var(--panel2);border:1px solid var(--rule);border-radius:20px;padding:3px 11px;font-size:.8em;color:var(--dim);margin:2px}
.q{font-size:1.5em;font-weight:700;margin:6px 0}
.correct{color:var(--green);font-weight:700}.wrong{color:var(--red);font-weight:700}
.tbl{width:100%;border-collapse:collapse;margin-top:8px}.tbl td{padding:6px 10px;border-bottom:1px solid var(--rule)}.tbl td:first-child{color:var(--dim)}
.gcard h3{color:var(--gold);font-size:1.15em;margin-bottom:6px}

.chip{background:var(--panel2);border:1px solid var(--rule);color:var(--dim);padding:6px 12px;border-radius:20px;cursor:pointer;font-size:.85em;font-weight:600}
.chip.on{background:var(--gold);color:#2a1e08;border-color:var(--gold)}
.mini{color:var(--faint);font-size:.8em}
a{color:var(--gold)}
</style>

["Ser vs Estar — two 'to be's","<b>Ser</b> = identity, origin, essence, time, characteristics (permanent-ish). <b>Estar</b> = location, temporary states, feelings, ongoing action.","Soy alto. (I am tall) · Estoy cansado. (I am tired) · La fiesta es en mi casa (event) vs La casa está aquí (location)."],

["The future, the easy way","<b>ir a + infinitive</b> = 'going to'. <b>acabar de + inf</b> = 'to have just'. The true future adds -é,-ás,-á,-emos,-éis,-án to the infinitive.","Voy a comer. · Acabo de llegar (I just arrived). · Comeré mañana. · Tendré (irregular stem tendr-)."],
["Present perfect","<b>haber</b> (he, has, ha, hemos, habéis, han) + past participle (-ado / -ido). 'Have done'.","He comido. · ¿Has visto la película? · Hemos aprendido mucho. Irregulars: hecho, dicho, visto, escrito, abierto."],
["Comparatives & superlatives","más/menos … que (more/less than). tan … como (as … as). Superlative: el/la más … de. Irregulars: mejor, peor, mayor, menor.","Más alto que tú. · Tan rápido como el viento. · El mejor libro del año. · Menos difícil de lo que parece."],
["The personal 'a'","When the direct object is a specific <b>person</b> (or beloved pet), put <b>a</b> before it. No translation in English.","Veo a María. · Busco a mi amigo. · (but) Veo la casa — no 'a' for things."],
["Accents & stress","Default stress: word ends in vowel/n/s → 2nd-last syllable; else last. A written accent marks the exception — and distinguishes pairs.","hablo vs habló · el (the) vs él (he) · si (if) vs sí (yes) · tu vs tú · que vs qué."],
["Conditional & 'si' clauses","Conditional = infinitive + -ía endings ('would'). Real 'si': si + present, present/future. Unreal: si + <b>imperfect subjunctive</b>, conditional.","Comería más (I would eat more). · Si estudias, aprobarás. · Si tuviera dinero, viajaría."],
["Commands (imperative)","Affirmative tú = the él-form (habla, come). Negative + all usted/nosotros forms use the <b>subjunctive</b>. Pronouns attach to affirmative, precede negative.","¡Habla! · ¡No hables! · ¡Dígame! · ¡Vámonos! · Hazlo (do it) vs No lo hagas."]
];

/* ============ NAV ============ */
const TABS=[["plan","☀️ Plan"],["vocab","🗂️ Vocab SRS"],["verbs","🔀 Verbs"],["cognates","🔑 Cognates"],["grammar","📘 Grammar"],["listen","🔊 Listen"]];
let tab=LS.get('tab','plan');

/* ============ PLAN ============ */
const TASKS=[
 ["m1","Madrigal's Magic Key","2 lessons (45 total → finished in ~3 weeks at this pace)","MADRIGAL","☀️"],
 ["m2","Frequency Dictionary","40 new words → add them in Vocab SRS","FREQ DICT","☀️"],
 ["m3","Verbs drill","20 conjugations — rotate the tense","DRILL","☀️"],
 ["m4","Cognates","2 rounds — a rule + rapid-fire drill","MADRIGAL","☀️"],
 ["m5","Speak aloud","20–30 min OUTPUT: shadow a clip, tutor (iTalki), or narrate your day","SPEAKING","☀️"],
 ["n1","Short Stories in Spanish","1 full story — read, then re-read ALOUD","STORIES","🌙"],
 ["n2","El Alquimista","6–8 pages — underline unknowns → SRS","EL ALQUIMISTA","🌙"],
 ["n3","Vocab SRS","clear every due card + 40 more new words","DRILL","🌙"],
 ["n4","Listen / dictation","10 sentences — hear, write, check","DRILL","🌙"],
 ["n5","Immersion","45–60 min Spanish audio/video (Dreaming Spanish, a podcast, a show)","INPUT","🌙"]
];
const BOOKS=[["madrigal","Madrigal's Magic Key","lesson",45,2],["stories","Short Stories in Spanish","story",8,1],["alq","El Alquimista","page",180,5],["freq","Frequency Dictionary","word",2500,20]];
function sprintDay(){let sd=LS.get('startd',null);if(sd===null){sd=dayNum();LS.set('startd',sd);}return Math.max(1,dayNum()-sd+1);}
function bookVal(id){return LS.get('books',{})[id]||0;}
function setBook(id,v){const b=LS.get('books',{});b[id]=Math.max(0,v);LS.set('books',b);renderPlan();}
function booksHTML(){const day=sprintDay();return BOOKS.map(([id,title,unit,total,step])=>{const cur=bookVal(id),exp=Math.round(total*Math.min(day/30,1)),pct=Math.min(100,Math.round(cur/total*100)),beh=exp-cur;const st=cur>=total?`<span style="color:var(--green)">finished ✓</span>`:cur>=exp?`<span style="color:var(--green)">on pace</span>`:`<span style="color:var(--gold)">behind ~${beh} ${unit}${beh==1?'':'s'}</span>`;return `<div style="margin-bottom:12px"><div class="row" style="justify-content:space-between"><div><b>${title}</b> <span class="mini">${cur}/${total} ${unit}s · ${st}</span></div><div class="row" style="gap:6px"><button class="btn sm" onclick="setBook('${id}',${cur-step})">−${step}</button><button class="btn sm p" onclick="setBook('${id}',${cur+step})">+${step}</button></div></div><div class="bar"><i style="width:${pct}%"></i></div></div>`;}).join('');}
function planData(){return LS.get('plan',{done:{}});}
function streakOf(p){let s=0,d=dayNum();for(;;){const k=new Date((d-s)*864e5).toISOString().slice(0,10);if((p.done[k]||[]).length>0)s++;else break;}return s;}
function renderPlan(){
 const p=planData(),tk=todayKey();const done=p.done[tk]||[];
 const pct=Math.round(done.length/TASKS.length*100);
 const totalDays=Object.values(p.done).filter(a=>a.length>0).length;
 const wordsLearned=Object.keys(LS.get('srs',{})).length;
 main.innerHTML=`
 <div class="card">
   <div class="row" style="justify-content:space-between">
     <div><h2>Day ${sprintDay()} of 30 · <span class="muted">${tk}</span></h2><div class="muted">${done.length}/${TASKS.length} tasks today — a hard ~5-hour immersion day</div></div>
     <div class="ring" style="--p:${pct}"><div class="in">${pct}%</div></div>
   </div>
   <div class="stats" style="margin-top:12px">
     <div class="stat"><div class="n">${streakOf(p)}</div><div class="l">day streak 🔥</div></div>
     <div class="stat"><div class="n">${totalDays}</div><div class="l">days studied</div></div>
     <div class="stat"><div class="n">${wordsLearned}</div><div class="l">words in SRS</div></div>
   </div>
 </div>
 <div class="plan-grid">
   <div class="card"><h2>☀️ Morning</h2><div id="mlist"></div></div>
   <div class="card"><h2>🌙 Night</h2><div id="nlist"></div></div>
 </div>
 <div class="card">
   <h2>📖 Book progress</h2>
   <div class="mini" style="margin-bottom:10px">Log where you are; the bar shows whether you’re on pace to finish inside the month. Madrigal at 2 lessons/day finishes with a week to spare.</div>
   ${booksHTML()}
 </div>
 <div class="card">
   <h2>The 4-week arc → B1/B2</h2>
   <div class="mini" style="margin-bottom:8px">Non-negotiable every day: <b>speak aloud</b> and <b>flood your ears</b>. The books are input; output + listening are what actually move B1/B2.</div>
   <div class="week"><b>Week 1 — Foundations.</b> Madrigal lessons 1–14 (cognates = instant vocabulary), present tense of ser/estar/tener + regular verbs, first ~600 frequency words, daily shadowing. Goal: build simple true sentences out loud.</div>
   <div class="week"><b>Week 2 — The past & stories.</b> Preterite vs imperfect, next 500–800 words, start Short Stories. Goal: narrate what happened yesterday; read a whole short story.</div>
   <div class="week"><b>Week 3 — Subjunctive & El Alquimista.</b> Subjunctive triggers, por/para, object pronouns, begin El Alquimista. Goal: express wishes, doubts, opinions; read real literary Spanish.</div>
   <div class="week"><b>Week 4 — Fluency push.</b> Finish El Alquimista, conditional + 'si' clauses, review all SRS, think/journal in Spanish daily. Goal: hold a B1/B2 conversation, read without constant lookups.</div>
   <div class="mini">Tip: reset a day’s checklist by unchecking. Streak counts any day with ≥1 task done.</div>
 </div>`;
 const draw=slot=>TASKS.filter(t=>t[4]==slot).map(t=>`<div class="task ${done.includes(t[0])?'done':''}" data-id="${t[0]}"><div class="box">✓</div><div><div class="t">${t[1]} <span class="book">${t[3]}</span></div><div class="d">${t[2]}</div></div></div>`).join('');
 document.getElementById('mlist').innerHTML=draw("☀️");
 document.getElementById('nlist').innerHTML=draw("🌙");
 main.querySelectorAll('.task').forEach(el=>el.onclick=()=>{
   const id=el.dataset.id,p=planData(),tk=todayKey();p.done[tk]=p.done[tk]||[];
   const i=p.done[tk].indexOf(id);if(i<0)p.done[tk].push(id);else p.done[tk].splice(i,1);
   LS.set('plan',p);renderPlan();
 });
}

/* ============ VOCAB SRS ============ */
const INT=[0,1,2,4,8,16,30];const NEW_PER=40;
function deck(){return VOCAB.concat(LS.get('custom',[]));}
let vq=null,vi=0,vShown=false;
function buildVQ(){
 const s=LS.get('srs',{}),t=dayNum(),D=deck();
 const due=D.filter(c=>s[c[0]]&&s[c[0]].due<=t);
 const nw=D.filter(c=>!s[c[0]]).slice(0,NEW_PER);
 for(let i=due.length-1;i>0;i--){const j=(i*13+7)%(i+1);[due[i],due[j]]=[due[j],due[i]];}
 vq=due.concat(nw);vi=0;vShown=false;
}
function renderVocab(){
 if(!vq)buildVQ();
 const s=LS.get('srs',{}),D=deck();
 const learned=D.filter(c=>s[c[0]]&&s[c[0]].box>=3).length;
 if(vi>=vq.length){
   main.innerHTML=`<div class="card" style="text-align:center"><h2>¡Bien hecho! 🎉</h2><p class="muted">No cards left in this session. ${D.length} words total · ${learned} well-known (box 3+).</p><div class="row" style="justify-content:center;margin-top:12px"><button class="btn p" onclick="buildVQ();renderVocab()">Go again</button></div></div>${addBox()}${browseBox()}`;
   wireAdd();return;
 }
 const c=vq[vi],st=s[c[0]]||{box:0};
 main.innerHTML=`
  <div class="row" style="justify-content:space-between;margin-bottom:8px"><div class="muted">Card ${vi+1} / ${vq.length} · box ${st.box||0}</div><div class="muted">${D.length} words · ${learned} strong</div></div>
  <div class="bar"><i style="width:${Math.round(vi/vq.length*100)}%"></i></div>
  <div class="flash" onclick="revealV()">
    <div class="es">${esc(c[0])} <button class="speak" onclick="event.stopPropagation();speak('${c[0].replace(/'/g,"\\'")}')">🔊</button></div>
    <div class="cat">${CATLBL[c[2]]||''}</div>
    ${vShown?`<div class="en">${esc(c[1])}</div>`:`<div class="hint">tap to reveal — say it first</div>`}
  </div>
  ${vShown?`<div class="grades">
     <button class="btn" onclick="gradeV(0)">Again</button>
     <button class="btn g" onclick="gradeV(1)">Good</button>
     <button class="btn" onclick="gradeV(2)">Easy</button>
   </div>`:`<div class="row" style="justify-content:center;margin-top:14px"><button class="btn p" onclick="revealV()">Reveal</button></div>`}
  ${addBox()}${browseBox()}`;
 wireAdd();
 if(!vShown)speak(c[0]);
}
function revealV(){vShown=true;renderVocab();}
function gradeV(g){
 const c=vq[vi],s=LS.get('srs',{}),t=dayNum();let st=s[c[0]]||{box:0};
 if(g==0){st.box=0;vq.push(c);}
 else{st.box=Math.min((st.box||0)+(g==2?2:1),6);}
 st.due=t+INT[st.box];s[c[0]]=st;LS.set('srs',s);
 vi++;vShown=false;renderVocab();
}
function addBox(){return `<div class="card" style="margin-top:16px"><h2 style="font-size:1.05em">➕ Add words (from the Frequency Dictionary or your books)</h2>
  <div class="muted" style="margin:4px 0 8px">One per line as <b>español = english</b>. They join your SRS deck immediately.</div>
  <textarea id="bulk" rows="4" style="width:100%" placeholder="p. ej.\nla suerte = luck\naprovechar = to take advantage of"></textarea>
  <div class="row" style="margin-top:8px"><button class="btn p" id="addbtn">Add to deck</button><span id="addmsg" class="mini"></span></div></div>`;}
function wireAdd(){const b=document.getElementById('addbtn');if(!b)return;b.onclick=()=>{
  const lines=(document.getElementById('bulk').value||'').split('\n').map(l=>l.trim()).filter(Boolean);
  const cur=LS.get('custom',[]);let n=0;
  lines.forEach(l=>{const m=l.split(/=|—|\t| - /);if(m.length>=2){const es=m[0].trim(),en=m.slice(1).join(' ').trim();if(es&&en&&!deck().some(c=>c[0]==es)){cur.push([es,en,'x']);n++;}}});
  LS.set('custom',cur);document.getElementById('addmsg').textContent=`Added ${n} word(s).`;document.getElementById('bulk').value='';buildVQ();
 };}
function browseBox(){const D=deck(),s=LS.get('srs',{});
 return `<div class="card"><h2 style="font-size:1.05em">📚 Deck (${D.length})</h2><div style="max-height:220px;overflow:auto;margin-top:8px">`+
  D.map(c=>`<span class="pill" title="box ${(s[c[0]]||{}).box??'—'}">${esc(c[0])} · ${esc(c[1])}</span>`).join('')+
  `</div><div class="row" style="margin-top:10px"><button class="btn sm" onclick="if(confirm('Reset all SRS progress?')){LS.set('srs',{});buildVQ();renderVocab();}">Reset SRS progress</button></div></div>`;}

/* ============ VERBS ============ */
let vbState=null;
function renderVerbs(){
 const tense=LS.get('vtense','present');
 if(!vbState||vbState.tense!=tense)newVerb(tense);
 const {inf,en,i,tense:tn}=vbState;
 main.innerHTML=`
  <div class="card">
   <div class="row" style="gap:6px;margin-bottom:12px">
    ${["present","pret","imperf","future"].map(t=>`<span class="chip ${t==tense?'on':''}" onclick="LS.set('vtense','${t}');vbState=null;renderVerbs()">${({present:'Present',pret:'Preterite',imperf:'Imperfect',future:'Future'})[t]}</span>`).join('')}
   </div>
   <div class="muted">Conjugate — type the form, then check.</div>
   <div class="q">${esc(inf)} <span class="muted" style="font-size:.6em">(${en})</span> · <span style="color:var(--gold)">${PERS[i]}</span> <button class="speak" onclick="speak('${inf}')">🔊</button></div>
   <div class="row"><input id="vans" style="flex:1;min-width:160px" placeholder="type the conjugation…" autocomplete="off" autofocus><button class="btn p" onclick="checkVerb()">Check</button><button class="btn" onclick="vbState=null;renderVerbs()">Skip →</button></div>
   <div id="vres" style="margin-top:12px"></div>
  </div>
  <div class="card"><h2 style="font-size:1.05em">Full table — ${esc(inf)} · ${({present:'present',pret:'preterite',imperf:'imperfect',future:'future'})[tense]}</h2>
   <table class="tbl">${PERS.map((p,k)=>`<tr><td>${p}</td><td><b>${conj(inf,tense,k)}</b></td></tr>`).join('')}</table>
   <div class="mini" style="margin-top:8px">Regular endings are generated; ${Object.keys(IRR).length} core irregulars are stored verified. Stem-changers beyond these aren’t drilled yet.</div>
  </div>`;
 const inp=document.getElementById('vans');inp.focus();inp.onkeydown=e=>{if(e.key=='Enter')checkVerb();};
}
function newVerb(tense){const v=VERBS[Math.floor(rnd()*VERBS.length)];vbState={inf:v[0],en:v[1],i:Math.floor(rnd()*6),tense};}
let _seed=Date.now()%9973;function rnd(){_seed=(_seed*48271)%2147483647;return _seed/2147483647;}
function norm(s){return(s||'').trim().toLowerCase();}
function checkVerb(){
 const {inf,tense,i}=vbState;const ans=norm(document.getElementById('vans').value);const right=conj(inf,tense,i);
 const ok=norm(right)===ans;
 document.getElementById('vres').innerHTML=ok
  ?`<span class="correct">✓ ¡Correcto!</span> ${inf} → <b>${right}</b> <button class="speak" onclick="speak('${right}')">🔊</button> <button class="btn sm" onclick="vbState=null;renderVerbs()">Next →</button>`
  :`<span class="wrong">✗</span> You wrote “${esc(ans||'—')}”. It’s <b>${right}</b> <button class="speak" onclick="speak('${right}')">🔊</button> <button class="btn sm" onclick="vbState=null;renderVerbs()">Next →</button>`;
 if(ok)speak(right);
}

/* ============ COGNATES ============ */
let cog=null;
function renderCog(){
 if(!cog)cog=COGDRILL[Math.floor(rnd()*COGDRILL.length)];
 main.innerHTML=`
  <div class="card"><h2>🔑 Madrigal’s Magic Key — cognate machine</h2>
   <div class="muted">Thousands of English words become Spanish by rule. Learn the pattern, unlock the whole family.</div>
   <div style="margin-top:12px">${COGRULES.map(r=>`<div class="task" style="cursor:default"><div class="box" style="border:none;color:var(--gold)">→</div><div><div class="t">${r[0]}</div><div class="d">${r[1]}</div></div></div>`).join('')}</div>
  </div>
  <div class="card"><h2 style="font-size:1.05em">Drill — make it Spanish</h2>
   <div class="q">${esc(cog[0])}</div>
   <div class="row"><input id="cans" style="flex:1;min-width:160px" placeholder="the Spanish cognate…" autocomplete="off"><button class="btn p" onclick="checkCog()">Check</button><button class="btn" onclick="cog=null;renderCog()">Skip →</button></div>
   <div id="cres" style="margin-top:12px"></div>
  </div>`;
 const inp=document.getElementById('cans');inp.focus();inp.onkeydown=e=>{if(e.key=='Enter')checkCog();};
}
function checkCog(){
 const ans=norm(document.getElementById('cans').value),right=cog[1];const ok=norm(right)===ans;
 document.getElementById('cres').innerHTML=ok
  ?`<span class="correct">✓ ¡Sí!</span> ${cog[0]} → <b>${right}</b> <button class="speak" onclick="speak('${right}')">🔊</button> <button class="btn sm" onclick="cog=null;renderCog()">Next →</button>`
  :`<span class="wrong">✗</span> It’s <b>${right}</b> <button class="speak" onclick="speak('${right}')">🔊</button> <button class="btn sm" onclick="cog=null;renderCog()">Next →</button>`;
 if(ok)speak(right);
}

/* ============ GRAMMAR ============ */
function renderGram(){
 main.innerHTML=`<div class="muted" style="margin-bottom:12px">The B1/B2 essentials. Read one a day; they’re what turn vocabulary into sentences.</div>`+
  GRAM.map(g=>`<div class="card gcard"><h3>${g[0]}</h3><div>${g[1]}</div><div class="ex">${g[2]}</div></div>`).join('');

/* ============ LISTEN ============ */
let li=0,liShown=false;
function renderListen(){
 const rate=LS.get('rate',0.9),s=SENTS[li];
 main.innerHTML=`
  <div class="card" style="text-align:center">
   <div class="row" style="justify-content:center;gap:14px"><div class="muted">Sentence ${li+1} / ${SENTS.length}</div>
     <label class="mini">speed <input type="range" min="0.5" max="1.1" step="0.05" value="${rate}" oninput="LS.set('rate',+this.value)"></label></div>
   <div style="margin:26px 0"><button class="btn p" onclick="speak(SENTS[${li}][0],LS.get('rate',0.9))" style="font-size:1.2em">🔊 Play</button>
     <button class="btn" onclick="speak(SENTS[${li}][0],0.6)">🐢 Slow</button></div>
   ${liShown?`<div class="q">${esc(s[0])}</div><div class="en" style="color:var(--gold);font-size:1.1em">${esc(s[1])}</div>`:`<div class="hint" style="color:var(--faint)">listen, say it back, then reveal</div>`}
   <div class="row" style="justify-content:center;margin-top:18px">
     ${liShown?`<button class="btn" onclick="liShown=false;li=(li+1)%SENTS.length;renderListen();speak(SENTS[li][0],LS.get('rate',0.9))">Next →</button>`
       :`<button class="btn g" onclick="liShown=true;renderListen()">Reveal</button>`}
     <button class="btn" onclick="li=(li-1+SENTS.length)%SENTS.length;liShown=false;renderListen()">← Prev</button>
   </div>
  </div>
  <div class="mini">These lean on your books — several are from <b>El Alquimista</b>. Dictation is the fastest route to real listening comprehension: hear it, write it, check it.</div>`;
}

render();
</script>
