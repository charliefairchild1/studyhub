<script>
"use strict";
const $=(s,r=document)=>r.querySelector(s),$$=(s,r=document)=>[...r.querySelectorAll(s)];
function frac(n,d){return `<span class="frac"><span class="n">${n}</span><span class="d">${d}</span></span>`;}
const toast=m=>{const t=$("#toast");t.textContent=m;t.classList.add("on");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("on"),1700);};
let P=load();function load(){try{return JSON.parse(localStorage.getItem("em_prog"))||{done:{},drill:{}};}catch(e){return{done:{},drill:{}};}}
function save(){localStorage.setItem("em_prog",JSON.stringify(P));}
function markDone(id){if(!P.done[id]){P.done[id]=1;save();toast("Lesson complete ✓");}}
const doneCount=()=>Object.keys(P.done).length;

/* ============================ CURRICULUM ============================ */
const MODULES=[
 {ic:"①",t:"Part I · Electrostatics",lessons:[
   {id:"charge",n:"Electric charge",sub:"the stuff that pushes and pulls"},
   {id:"coulomb",n:"Coulomb's law",sub:"the force between two charges"},
   {id:"efield",n:"The electric field",sub:"force per charge, and its lines",lab:"fieldlines"},
   {id:"gauss",n:"Flux & Gauss's law",sub:"counting field lines through a surface"},
   {id:"potential",n:"Potential & voltage",sub:"electrical energy per charge"},
 ]},
 {ic:"②",t:"Part II · Circuits",lessons:[
   {id:"current",n:"Electric current",sub:"charge in motion"},
   {id:"ohm",n:"Resistance & Ohm's law",sub:"V = I R",lab:"ohm"},
   {id:"seriespar",n:"Series & parallel",sub:"how to combine resistors"},
   {id:"power",n:"Electrical power",sub:"P = I V = I²R"},
   {id:"capacitor",n:"Capacitors",sub:"storing charge and energy",lab:"capacitor"},
 ]},
 {ic:"③",t:"Part III · Magnetism",lessons:[
   {id:"bfield",n:"The magnetic field",sub:"force on a moving charge, F = qv×B",lab:"magforce"},
   {id:"ampere",n:"Currents make magnetism",sub:"wires, loops & Ampère's law"},
 ]},
 {ic:"④",t:"Part IV · Electromagnetism unified",lessons:[
   {id:"faraday",n:"Induction: Faraday & Lenz",sub:"changing fields make currents"},
   {id:"maxwell",n:"Maxwell's equations & light",sub:"the four laws, and why light is a wave",lab:"emwave"},
 ]},
];
const ALL=MODULES.flatMap(m=>m.lessons);const LESSON=Object.fromEntries(ALL.map(l=>[l.id,l]));

/* ---- lesson content ---- */
const sup=(b,e)=>`${b}<sup>${e}</sup>`;
const C={};
C.charge=`<p>Matter carries a property called <b>electric charge</b>, as fundamental as mass. It comes in two kinds — <b>positive</b> and <b>negative</b> — named by Benjamin Franklin. The basic rule of the whole subject: <b>like charges repel, opposite charges attract</b>. Ordinary matter is neutral because it holds equal amounts of both.</p>
<p>Charge lives on particles. The <b>proton</b> is positive, the <b>electron</b> is negative, and their charges are exactly equal and opposite. Everyday charging — rubbing a balloon on your hair — simply <i>moves electrons</i> from one object to the other; the heavy protons stay locked in their nuclei.</p>
<div class="eq box">charge is <b>quantized</b>: &nbsp; q = N·e, &nbsp; e = 1.602×10⁻¹⁹ C</div>
<p>Every charge you can measure is a whole-number multiple of the <b>elementary charge</b> e. The unit is the <b>coulomb</b> (C), and it is enormous: one coulomb is about 6.24×10¹⁸ elementary charges.</p>
<p><b>Conservation of charge.</b> Charge is never created or destroyed, only transferred. The total charge of an isolated system stays constant — one of the deepest conservation laws in physics. <b>Conductors</b> (metals) let electrons roam freely, so charge flows and spreads; <b>insulators</b> (glass, rubber) bind their electrons, so charge stays put where you place it.</p>
<div class="wk"><div class="wl">Worked example · counting electrons</div>
<div class="step">How many excess electrons carry a charge of −1.0 nC (nanocoulomb)?</div>
<div class="step">N = |q| / e = 1.0×10⁻⁹ / 1.602×10⁻¹⁹</div>
<div class="step">≈ <b>6.2×10⁹ electrons</b> <span class="r">— billions, yet only a nanocoulomb.</span></div></div>
<div class="callout"><span class="l">Why it matters</span>Every force you feel that isn't gravity — the solidity of a floor, the tension in a rope, chemistry itself — is electric charge in disguise. This is the ground floor of that entire building.</div>`;

C.coulomb=`<p>How strong is the push or pull between two charges? Charles-Augustin de Coulomb measured it in the 1780s and found a law with the same shape as Newton's gravity — an <b>inverse-square law</b>.</p>
<div class="eq box">F = k ${frac("q₁ q₂","r²")}, &nbsp; k ≈ 8.99×10⁹ N·m²/C²</div>
<p>The force is proportional to each charge and falls off as the <b>square</b> of the distance r between them: move twice as far apart and the force drops to one quarter. It points along the line joining the charges — <b>outward</b> (repulsive) for like charges, <b>inward</b> (attractive) for opposite ones. The constant k is often written k = 1/(4πε₀), where ε₀ is the permittivity of free space.</p>
<div class="wk"><div class="wl">Worked example · two microcoulombs</div>
<div class="step">Two +1.0 µC charges sit 10 cm (0.10 m) apart. Find the force.</div>
<div class="step">F = k q₁q₂/r² = (8.99×10⁹)(1×10⁻⁶)(1×10⁻⁶)/(0.10)²</div>
<div class="step">= (8.99×10⁻³)/(0.010) = <b>0.90 N</b>, repulsive.</div>
<div class="step"><span class="r">Gravity between the same two masses would be ~10⁻²³ N — electricity beats it by a factor near 10²².</span></div></div>
<div class="callout"><span class="l">Superposition</span>With more than two charges, just add the individual Coulomb forces as vectors — each pair acts as if the others weren't there. That simple additivity is what makes the whole theory tractable.</div>`;

C.efield=`<p>Rather than talk about action-at-a-distance, we say a charge fills the space around it with an <b>electric field</b> — an invisible arrow at every point that tells any other charge which way, and how hard, to be pushed. The field is <b>force per unit charge</b>:</p>
<div class="eq box">E = ${frac("F","q₀")} &nbsp;(units N/C) &nbsp;·&nbsp; point charge: E = k ${frac("q","r²")}</div>
<p>Drop a tiny positive <b>test charge</b> q₀ at a point; the force it feels, divided by its charge, is the field E there. The field of a single point charge points radially <b>away</b> from a positive charge and <b>toward</b> a negative one, weakening as 1/r².</p>
<p><b>Field lines</b> are a picture of E: arrows drawn tangent to the field. The rules are strict and physical — lines <b>start on positive charges and end on negative</b> ones, they never cross, and their <b>density encodes the strength</b> (crowded lines = strong field). Below, drag two charges around and watch the field they build; gold streamlines flow out of the + charge and into the −.</p>
<div id="__sim"></div>
<div class="wk"><div class="wl">Worked example · field of a point charge</div>
<div class="step">Field 5.0 cm from a +2.0 µC charge:</div>
<div class="step">E = k q / r² = (8.99×10⁹)(2×10⁻⁶)/(0.050)²</div>
<div class="step">= (1.80×10⁴)/(0.0025) = <b>7.2×10⁶ N/C</b>, pointing straight away from the charge.</div></div>
<div class="callout"><span class="l">The field is real</span>The field carries energy and momentum and travels at a finite speed. It is not a bookkeeping trick — it is the actual physical thing that becomes a radio wave and, eventually, light.</div>`;

C.gauss=`<p>Gauss's law is Coulomb's law restated in a far more powerful form. It is about <b>electric flux</b> — a measure of how much field "flows through" a surface. For a flat area A with the field perpendicular to it, the flux is simply Φ = E·A; in general you sum E·(area) over the whole surface, counting only the component poking through.</p>
<div class="eq box">Φ = ∮ E·dA = ${frac("Q_enc","ε₀")}, &nbsp; ε₀ = 8.85×10⁻¹² C²/(N·m²)</div>
<p>The law says: the total flux out of <i>any</i> closed surface equals the charge <b>enclosed inside it</b>, divided by ε₀ — and nothing outside the surface matters at all. Picture field lines as arrows piercing a bag: the net number escaping the bag depends only on the charge trapped within.</p>
<div class="wk"><div class="wl">Worked example · Coulomb from Gauss</div>
<div class="step">Surround a point charge q with an imaginary sphere of radius r. By symmetry E is radial and has the same size everywhere on the sphere.</div>
<div class="step">Flux = E × (sphere area) = E·4πr². Gauss says this equals q/ε₀.</div>
<div class="step">E·4πr² = q/ε₀ → E = ${frac("q","4πε₀r²")} = k ${frac("q","r²")}. <span class="r">Coulomb's law falls right out.</span></div></div>
<p>The real power shows up with symmetry: the field of an <b>infinite sheet</b> of charge is a uniform E = σ/(2ε₀) (σ = charge per area), and inside a <b>hollow conductor</b> the enclosed charge is zero, so E = 0 — that is why a car or a Faraday cage shields you from lightning.</p>
<div class="callout"><span class="l">One of Maxwell's four</span>Gauss's law is the first of Maxwell's equations. Keep it in mind — its magnetic twin (in Part IV) says something startling by comparison.</div>`;

C.potential=`<p>Pushing a charge against an electric field takes work, and that work is stored as <b>electric potential energy</b> U — exactly like lifting a mass against gravity. Divide that energy by the charge and you get a property of the <i>location alone</i>, the <b>electric potential</b> V, better known as <b>voltage</b>.</p>
<div class="eq box">V = ${frac("U","q")} &nbsp;(volt = J/C) &nbsp;·&nbsp; point charge: V = k ${frac("q","r")}</div>
<p>Voltage is <b>energy per unit charge</b>. Notice V for a point charge falls off as 1/r (one power slower than the field's 1/r²) and, being an energy, it is a plain number, not an arrow — much easier to work with than E. Only <b>differences</b> in voltage, ΔV, have physical meaning; charges are pushed from high potential to low, like water running downhill.</p>
<p>In a <b>uniform field</b> (as between two charged plates) the relationship is beautifully simple: V = E·d, so the field is the voltage gradient, E = V/d. More generally the field points "downhill" on the voltage landscape, from high V to low.</p>
<div class="wk"><div class="wl">Worked example · voltage and energy</div>
<div class="step">Potential 5.0 cm from a +2.0 µC charge: V = kq/r = (8.99×10⁹)(2×10⁻⁶)/0.050</div>
<div class="step">= (1.80×10⁴)/0.050 = <b>3.6×10⁵ V</b> (360 kV).</div>
<div class="step">Energy to carry a +1.0 nC charge from far away to that point: U = qV = (1×10⁻⁹)(3.6×10⁵) = <b>3.6×10⁻⁴ J</b>.</div></div>
<div class="callout"><span class="l">The word "volts"</span>Every battery, outlet, and neuron is rated in volts because voltage is the quantity that actually drives charge through a circuit — the subject of Part II. A 1.5 V battery gives each coulomb 1.5 joules to spend.</div>`;

C.current=`<p>Static charge is only half the story. Set charge <b>in motion</b> and you get an <b>electric current</b> — the rate at which charge flows past a point:</p>
<div class="eq box">I = ${frac("ΔQ","Δt")} &nbsp;(ampere A = C/s)</div>
<p>One ampere is one coulomb per second. By a historical accident we define <b>conventional current</b> as the direction <i>positive</i> charge would move — which in a metal wire is actually opposite to the flow of the electrons that really carry it. It rarely matters, as long as you are consistent.</p>
<p>The electrons themselves drift astonishingly slowly (millimeters per second), but the <i>signal</i> — the push — travels near light speed, because the whole sea of electrons starts shoving at once, like a pipe already full of water. A voltage source (a battery) is the "pump" that keeps the charge circulating around a closed loop.</p>
<div class="wk"><div class="wl">Worked example · counting the charge</div>
<div class="step">A wire carries a steady 3.0 A. How much charge passes in 10 s, and how many electrons is that?</div>
<div class="step">Q = I·t = (3.0)(10) = 30 C.</div>
<div class="step">N = Q/e = 30 / 1.6×10⁻¹⁹ ≈ <b>1.9×10²⁰ electrons</b>.</div></div>
<div class="callout"><span class="l">A complete loop</span>Current only flows in a closed circuit. Break the loop anywhere — flip a switch — and it stops everywhere instantly. Charge has nowhere to pile up, so the same current flows through every point of a single loop.</div>`;

C.ohm=`<p>Push charge through a material and it resists, colliding with the atoms and giving up energy as heat. The <b>resistance</b> R measures how much a component opposes current. For most materials (called <b>ohmic</b>), current is simply proportional to voltage — <b>Ohm's law</b>:</p>
<div class="eq box">V = I R &nbsp; ⟺ &nbsp; I = ${frac("V","R")} &nbsp;(ohm Ω = V/A)</div>
<p>More voltage pushes more current; more resistance chokes it off. Resistance itself comes from the material and shape of the conductor: R = ρL/A, where ρ is the <b>resistivity</b> (a property of the substance), L the length, and A the cross-sectional area. Long thin wires resist more; short fat ones resist less — exactly like water through a pipe.</p>
<p>Try the circuit below: dial the battery voltage and the resistance and watch the current respond, with more charge flowing when you raise V or lower R.</p>
<div id="__sim"></div>
<div class="wk"><div class="wl">Worked example · Ohm's law</div>
<div class="step">A 6.0 Ω resistor is connected across a 12 V battery. Find the current.</div>
<div class="step">I = V / R = 12 / 6.0 = <b>2.0 A</b>.</div>
<div class="step"><span class="r">Double the voltage (to 24 V) and, because R is fixed, the current doubles to 4.0 A — the hallmark of ohmic behavior.</span></div></div>
<div class="callout"><span class="l">Not a fundamental law</span>Ohm's law is an empirical rule, not a law of nature like Coulomb's — light bulbs, diodes, and your body all break it. But for wires and resistors it is superb, and it anchors nearly all of circuit analysis.</div>`;

C.seriespar=`<p>Real circuits combine many resistors, and there are two basic ways to wire them. Getting the combined resistance right is the core skill of circuit analysis.</p>
<p><b>Series</b> — components in a single-file line, one after another. The <i>same current</i> flows through each (charge has only one path), and the resistances simply <b>add</b>:</p>
<div class="eq box">series: R = R₁ + R₂ + R₃ + ⋯</div>
<p><b>Parallel</b> — components side by side, offering the current several paths at once. Each sees the <i>same voltage</i>, the currents split, and the <b>reciprocals</b> add. The combined resistance is always <i>less</i> than the smallest branch, because you have opened extra lanes:</p>
<div class="eq box">parallel: ${frac("1","R")} = ${frac("1","R₁")} + ${frac("1","R₂")} + ${frac("1","R₃")} + ⋯</div>
<div class="wk"><div class="wl">Worked example · 3 Ω and 6 Ω</div>
<div class="step"><b>Series:</b> R = 3 + 6 = 9 Ω. Across 18 V, the current is I = 18/9 = 2 A through <i>both</i> resistors.</div>
<div class="step"><b>Parallel:</b> 1/R = 1/3 + 1/6 = 2/6 + 1/6 = 3/6, so R = <b>2 Ω</b> — less than either branch.</div>
<div class="step">In parallel each resistor feels the full 18 V, so the 3 Ω carries 6 A and the 6 Ω carries 3 A: 9 A total.</div></div>
<div class="callout"><span class="l">Why homes wire in parallel</span>Every outlet in your house is in parallel, so each gets the full 120 V and any one can switch off without cutting the rest. Series wiring (old Christmas lights) fails entirely if a single bulb dies.</div>`;

C.power=`<p>Current doing work in a resistor dumps energy as heat and light. The rate of that energy delivery is the <b>electrical power</b>, and it has three equivalent forms — pick whichever fits what you know:</p>
<div class="eq box">P = I V = I²R = ${frac("V²","R")} &nbsp;(watt W = J/s)</div>
<p>The base form P = IV reads directly from the definitions: voltage is energy per charge, current is charge per second, so their product is energy per second. Substituting Ohm's law (V = IR) gives the other two. Total energy used is just power times time, E = P·t — which is why your electric bill is in kilowatt-<b>hours</b>.</p>
<div class="wk"><div class="wl">Worked example · a 12 V device</div>
<div class="step">A device draws 2.0 A at 12 V. Power: P = IV = (2.0)(12) = <b>24 W</b>.</div>
<div class="step">Check with P = I²R, using R = V/I = 6 Ω: P = (2.0)²(6) = 24 W. ✓</div>
<div class="step">Run it for one hour: E = Pt = 24 × 3600 = 8.6×10⁴ J = <b>0.024 kWh</b>.</div></div>
<div class="callout"><span class="l">Why power lines run at high voltage</span>Line losses are I²R — they grow with the <i>square</i> of the current. Transmitting the same power P = IV at very high voltage means very low current, so the I²R heat lost in the wires plummets. That single fact shaped the entire electrical grid.</div>`;

C.capacitor=`<p>A <b>capacitor</b> is a device that stores charge and energy in an electric field — typically two conducting plates separated by a thin gap. Connect it to a battery and charge piles up, +Q on one plate and −Q on the other, until the voltage across it matches the source. The charge stored is proportional to that voltage:</p>
<div class="eq box">Q = C V &nbsp;·&nbsp; energy U = ½ C V² &nbsp;(farad F = C/V)</div>
<p>The constant <b>C</b> is the <b>capacitance</b> — how many coulombs the device banks per volt. For parallel plates it grows with plate area and shrinks with the gap: C = ε₀A/d. The farad is a huge unit, so real capacitors are usually micro- (µF) or picofarads.</p>
<p>Capacitors don't fill instantly. Charged through a resistor R, the voltage climbs along an exponential curve set by the <b>time constant</b> τ = RC — after one τ it reaches 63% of full charge. Adjust R and C below and watch the approach speed up or slow down.</p>
<div id="__sim"></div>
<div class="wk"><div class="wl">Worked example · a 100 µF capacitor</div>
<div class="step">Charged to 12 V, how much charge and energy does it hold?</div>
<div class="step">Q = C V = (100×10⁻⁶)(12) = 1.2×10⁻³ C = <b>1.2 mC</b>.</div>
<div class="step">U = ½ C V² = ½ (100×10⁻⁶)(12)² = <b>7.2×10⁻³ J</b>.</div></div>
<div class="callout"><span class="l">The fast bank</span>Unlike a battery (which stores energy chemically and slowly), a capacitor dumps its energy almost instantly — which is why a camera flash, a defibrillator, and the timing circuits in every computer all rely on them.</div>`;

C.bfield=`<p>Magnetism is the other face of electricity. A <b>magnetic field</b> B fills the space around magnets and currents, and it announces itself in a peculiar way: it only pushes on charges that are <b>moving</b>, and it pushes them <b>sideways</b>. The force on a charge q moving with velocity v is the cross product</p>
<div class="eq box">F = q v × B, &nbsp; |F| = q v B sinθ &nbsp;(tesla T = N/(A·m))</div>
<p>Three consequences follow from that "×". The force is <b>zero</b> when v is parallel to B (sinθ = 0) and <b>maximum</b> when v is perpendicular. Its direction is given by the <b>right-hand rule</b>: point your fingers along v, curl them toward B, and your thumb gives F (for positive q; flip it for negative). And because F is always perpendicular to v, the magnetic force <b>does no work</b> — it changes a charge's direction but never its speed.</p>
<p>A charge moving perpendicular to a uniform B is therefore bent into a perfect <b>circle</b>, the sideways force forever acting as the centripetal force. Its radius is r = mv/(qB). The lab below shows the charge curling around; try changing v, B, and the sign of the charge.</p>
<div id="__sim"></div>
<p>The same law explains the force on a current-carrying <b>wire</b>, since a current is just moving charge: F = B I L (for a length L perpendicular to B). This is how every electric motor turns.</p>
<div class="wk"><div class="wl">Worked example · a proton in a field</div>
<div class="step">A proton (m = 1.67×10⁻²⁷ kg, q = 1.6×10⁻¹⁹ C) moves at 1.0×10⁶ m/s perpendicular to a 0.50 T field.</div>
<div class="step">r = mv/(qB) = (1.67×10⁻²⁷)(1×10⁶) / [(1.6×10⁻¹⁹)(0.50)]</div>
<div class="step">= 1.67×10⁻²¹ / 8.0×10⁻²⁰ ≈ <b>0.021 m</b> (about 2 cm).</div></div>
<div class="callout"><span class="l">No monopoles</span>Magnetic field lines never start or stop — they always close into loops, because there is no isolated "north charge." Cut a magnet in half and you get two smaller magnets, never a lone pole. That is Gauss's law for magnetism, and it is Maxwell's second equation.</div>`;

C.ampere=`<p>Here is the deep unification: <b>moving charges create magnetic fields</b>. Oersted discovered it by accident in 1820 when a current made a nearby compass needle jump. A straight wire wraps the space around it in circular field lines whose strength is</p>
<div class="eq box">straight wire: B = ${frac("μ₀ I","2π r")}, &nbsp; μ₀ = 4π×10⁻⁷ T·m/A</div>
<p>The field circles the wire (use the right-hand rule: thumb along the current, fingers curl the way B points), gets stronger with more current, and weakens as 1/r with distance. Coil the wire into a tight <b>solenoid</b> and the loops reinforce into a nearly uniform field inside, B = μ₀ n I, where n is turns per meter — an electromagnet.</p>
<p><b>Ampère's law</b> is the magnetic counterpart of Gauss's law, and it makes these results fall out of symmetry. It says the field summed around any closed loop is set by the current threading through it:</p>
<div class="eq box">∮ B·dl = μ₀ I_enc</div>
<div class="wk"><div class="wl">Worked example · field near a wire</div>
<div class="step">Field 2.0 cm from a wire carrying 10 A:</div>
<div class="step">B = μ₀I/(2πr) = (4π×10⁻⁷)(10) / (2π × 0.020)</div>
<div class="step">= (1.26×10⁻⁵)/(0.126) ≈ <b>1.0×10⁻⁴ T</b> (0.1 mT) — roughly twice Earth's field.</div></div>
<div class="callout"><span class="l">Electricity ⟷ magnetism</span>Charges at rest make electric fields; charges in motion also make magnetic fields. The two are so intertwined that whether you "see" an electric or a magnetic field can even depend on your motion — a hint of the relativity lurking underneath, and the setup for Part IV.</div>`;

C.faraday=`<p>If a current makes a magnetic field, can a magnetic field make a current? Faraday spent years chasing this and found the answer is yes — but with a crucial twist. It is not the field that drives a current, but a <b>changing</b> field. A <b>changing magnetic flux</b> through a loop induces a voltage (an EMF) around it:</p>
<div class="eq box">EMF = −N ${frac("dΦ_B","dt")}, &nbsp; Φ_B = B·A cosθ</div>
<p>Here Φ_B is the magnetic flux — field times the area it threads — and N is the number of turns. You can change the flux three ways: change the field B, change the loop's area A, or rotate the loop to change the angle θ. Do any of them and current flows; hold everything still and it stops, no matter how strong the field.</p>
<p><b>Lenz's law</b> is that minus sign. It says the induced current flows in whatever direction <b>opposes the change</b> that created it — push a magnet toward a coil and the coil pushes back. This is not a coincidence; it is <b>conservation of energy</b>. If the induced current <i>helped</i> the change, you would get free energy from nothing. Instead you must do work against the resistance, and that work becomes the electrical energy.</p>
<div class="wk"><div class="wl">Worked example · a coil in a rising field</div>
<div class="step">A 100-turn coil of area 0.010 m² sits in a field that climbs from 0 to 0.50 T in 0.10 s.</div>
<div class="step">EMF = N·ΔΦ/Δt = N·(ΔB·A)/Δt = 100 × (0.50 × 0.010) / 0.10</div>
<div class="step">= 100 × 0.050 = <b>5.0 V</b>. <span class="r">Lenz's minus sign: the induced current fights the rising field.</span></div></div>
<div class="callout"><span class="l">This runs the modern world</span>Every generator, transformer, electric guitar pickup, induction stove, and phone charger is Faraday's law at work. Spin a loop in a field and you have turned motion into electricity — the basis of nearly all power generation on Earth.</div>`;

C.maxwell=`<p>By the 1860s James Clerk Maxwell had gathered the whole subject into <b>four equations</b>. Stated in plain words, they are:</p>
<ul>
<li><b>Gauss's law:</b> electric charges create diverging electric fields (∮E·dA = Q/ε₀).</li>
<li><b>Gauss for magnetism:</b> there are no magnetic charges — B lines only form closed loops (∮B·dA = 0).</li>
<li><b>Faraday's law:</b> a changing magnetic field creates a circulating electric field.</li>
<li><b>Ampère–Maxwell law:</b> currents <i>and changing electric fields</i> create circulating magnetic fields.</li>
</ul>
<p>That last italic clause was Maxwell's own addition (the "displacement current"), and it completed a loop with staggering consequences. A changing E makes a B; a changing B makes an E. Each can sustain the other, so once you jiggle a charge the disturbance <b>keeps regenerating itself</b> and races off through empty space — an <b>electromagnetic wave</b>, with E and B perpendicular to each other and to the direction of travel.</p>
<p>Maxwell then computed how fast such a wave must go, purely from the two constants of electricity and magnetism:</p>
<div class="eq box">c = ${frac("1","√(μ₀ε₀)")} = 2.998×10⁸ m/s</div>
<div class="wk"><div class="wl">Worked example · the speed that changed physics</div>
<div class="step">c = 1/√(μ₀ε₀) = 1/√[(4π×10⁻⁷)(8.85×10⁻¹²)]</div>
<div class="step">= 1/√(1.11×10⁻¹⁷) = 1/(3.34×10⁻⁹) ≈ <b>3.0×10⁸ m/s</b>.</div>
<div class="step"><span class="r">Exactly the measured speed of light — a "coincidence" too perfect to be one.</span></div></div>
<p>Light <b>is</b> an electromagnetic wave. Radio, microwaves, infrared, visible light, ultraviolet, X-rays, and gamma rays are all the same phenomenon — Maxwell's self-propagating E and B fields — differing only in wavelength. Watch the two fields oscillate in step below.</p>
<div id="__sim"></div>
<div class="callout"><span class="l">The summit</span>Two forces that seemed unrelated — the amber-attracting-straw of the Greeks and the lodestone of the compass — turned out to be one thing, and that one thing turned out to be light. It is arguably the greatest unification in the history of physics, and it is where this course has been headed all along.</div>`;

let cleanups=[];
function clearSims(){cleanups.forEach(f=>{try{f();}catch(e){}});cleanups=[];}
function raf(fn){let id,run=true;const l=t=>{if(!run)return;fn(t);id=requestAnimationFrame(l);};id=requestAnimationFrame(l);cleanups.push(()=>{run=false;cancelAnimationFrame(id);});}
function fit(cv,h){const w=cv.clientWidth||cv.parentElement.clientWidth-24;const dpr=Math.min(2,devicePixelRatio||1);cv.width=w*dpr;cv.height=h*dpr;cv.style.height=h+"px";const x=cv.getContext("2d");x.setTransform(dpr,0,0,dpr,0,0);return {x,w,h};}
function arrow(x,x0,y0,ang,L,col,lw){const ex=x0+Math.cos(ang)*L,ey=y0+Math.sin(ang)*L;x.strokeStyle=col;x.lineWidth=lw||1.6;x.beginPath();x.moveTo(x0,y0);x.lineTo(ex,ey);x.stroke();x.fillStyle=col;const s=(lw||1.6)+2.4;x.beginPath();x.moveTo(ex,ey);x.lineTo(ex-Math.cos(ang-0.42)*s,ey-Math.sin(ang-0.42)*s);x.lineTo(ex-Math.cos(ang+0.42)*s,ey-Math.sin(ang+0.42)*s);x.closePath();x.fill();}

/* --- electric field lines: two draggable charges --- */
function simFieldLines(el){
  el.innerHTML=`<div class="simwrap"><canvas></canvas><div class="readout" id="ro">Drag the two charges. Arrows show the field a + test charge would feel; gold streamlines flow out of + and into −.</div>
   <div class="simctl"><label>right charge <select id="sg"><option value="-1">negative −</option><option value="1">positive +</option></select></label>
   <label>field density <input type="range" id="dn" min="24" max="46" step="2" value="32"></label></div></div>`;
  const cv=$("canvas",el);let charges=null,dragI=-1,step=32,rsign=-1;
  $("#sg",el).onchange=e=>{rsign=+e.target.value;if(charges)charges[1].q=rsign;};
  $("#dn",el).oninput=e=>step=+e.target.value;
  function pos(e){const r=cv.getBoundingClientRect();return {x:e.clientX-r.left,y:e.clientY-r.top};}
  cv.addEventListener("pointerdown",e=>{if(!charges)return;const p=pos(e);dragI=-1;charges.forEach((c,i)=>{if(Math.hypot(c.x-p.x,c.y-p.y)<26)dragI=i;});if(dragI>=0)cv.setPointerCapture(e.pointerId);});
  cv.addEventListener("pointermove",e=>{if(dragI<0||!charges)return;const p=pos(e);charges[dragI].x=Math.max(14,Math.min(cv.clientWidth-14,p.x));charges[dragI].y=Math.max(14,Math.min(260-14,p.y));});
  cv.addEventListener("pointerup",()=>dragI=-1);
  function field(px,py){let ex=0,ey=0;for(const c of charges){const dx=px-c.x,dy=py-c.y;const r2=dx*dx+dy*dy+140;const r=Math.sqrt(r2);const f=c.q/(r2*r);ex+=f*dx;ey+=f*dy;}return[ex,ey];}
  function draw(){const {x,w,h}=fit(cv,260);if(!charges)charges=[{x:w*0.34,y:h/2,q:1},{x:w*0.66,y:h/2,q:rsign}];
    x.clearRect(0,0,w,h);
    for(let gx=step/2;gx<w;gx+=step)for(let gy=step/2;gy<h;gy+=step){const f=field(gx,gy);const m=Math.hypot(f[0],f[1]);if(m<1e-12)continue;const ang=Math.atan2(f[1],f[0]);const t=Math.max(0,Math.min(1,(Math.log(m)+15)/7));
      const col=`rgb(${Math.round(78+167*t)},${Math.round(140+72*t)},${Math.round(220-154*t)})`;arrow(x,gx-Math.cos(ang)*step*0.2,gy-Math.sin(ang)*step*0.2,ang,step*0.42,col,1.5);}
    charges.forEach(c=>{if(c.q<=0)return;const N=14;for(let k=0;k<N;k++){const a0=k/N*2*Math.PI;let sx=c.x+15*Math.cos(a0),sy=c.y+15*Math.sin(a0);x.beginPath();x.moveTo(sx,sy);x.strokeStyle="rgba(245,212,66,.5)";x.lineWidth=1.4;
      for(let s=0;s<240;s++){const f=field(sx,sy);const m=Math.hypot(f[0],f[1]);if(m<1e-12)break;sx+=f[0]/m*3;sy+=f[1]/m*3;if(sx<0||sx>w||sy<0||sy>h)break;let hit=false;for(const cc of charges){if(cc.q<0&&Math.hypot(sx-cc.x,sy-cc.y)<13){hit=true;break;}}x.lineTo(sx,sy);if(hit)break;}x.stroke();}});
    charges.forEach(c=>{x.beginPath();x.arc(c.x,c.y,13,0,7);x.fillStyle=c.q>0?"#ef7a6a":"#4ec6e0";x.fill();x.lineWidth=2;x.strokeStyle="#05070d";x.stroke();x.fillStyle="#05070d";x.font="bold 18px sans-serif";x.textAlign="center";x.textBaseline="middle";x.fillText(c.q>0?"+":"−",c.x,c.y+1);});
  }
  raf(draw);
}

/* --- Ohm's law circuit --- */
function simOhm(el){
  el.innerHTML=`<div class="simwrap"><canvas></canvas><div class="readout" id="ro"></div>
   <div class="simctl"><label>voltage V: <b id="vv">12</b> V <input type="range" id="v" min="1" max="24" step="1" value="12"></label>
   <label>resistance R: <b id="rr">6</b> Ω <input type="range" id="r" min="1" max="24" step="1" value="6"></label></div></div>`;
  const cv=$("canvas",el);let V=12,R=6,ph=0;
  $("#v",el).oninput=e=>{V=+e.target.value;$("#vv",el).textContent=V;};
  $("#r",el).oninput=e=>{R=+e.target.value;$("#rr",el).textContent=R;};
  function draw(){const {x,w,h}=fit(cv,220);x.clearRect(0,0,w,h);
    const I=V/R,Pw=V*I;
    const m=40,x1=m,y1=m,x2=w-m,y2=h-m,my=(y1+y2)/2,mx=(x1+x2)/2;
    const wtop=x2-x1,hside=y2-y1,per=2*(wtop+hside);
    function pt(d){d=((d%per)+per)%per;if(d<wtop)return[x1+d,y1];d-=wtop;if(d<hside)return[x2,y1+d];d-=hside;if(d<wtop)return[x2-d,y2];d-=wtop;return[x1,y2-d];}
    // loop wire
    x.strokeStyle="#3a466b";x.lineWidth=5;x.beginPath();x.moveTo(x1,y1);x.lineTo(x2,y1);x.lineTo(x2,y2);x.lineTo(x1,y2);x.lineTo(x1,my+16);x.moveTo(x1,my-16);x.lineTo(x1,y1);x.stroke();
    // battery (left side gap): long plate (+) and short plate (−)
    x.strokeStyle="#f5d442";x.lineWidth=3;
    x.beginPath();x.moveTo(x1-11,my-16);x.lineTo(x1+11,my-16);x.stroke();       // long = + (top)
    x.lineWidth=6;x.beginPath();x.moveTo(x1-6,my+16);x.lineTo(x1+6,my+16);x.stroke(); // short = −
    x.fillStyle="#f5d442";x.font="11px ui-monospace,monospace";x.textAlign="left";x.textBaseline="middle";x.fillText("+",x1-26,my-16);x.fillText("−",x1-26,my+16);
    // resistor block on top
    const rw=Math.min(90,wtop*0.5),rx=mx-rw/2;x.fillStyle="#f0a028";x.fillRect(rx,y1-8,rw,16);x.strokeStyle="#0c0e14";x.lineWidth=2;x.strokeRect(rx,y1-8,rw,16);
    x.fillStyle="#eef2fa";x.font="bold 11px ui-monospace,monospace";x.textAlign="center";x.textBaseline="middle";x.fillText("R="+R+"Ω",mx,y1-20);
    // charge carriers (conventional current, clockwise)
    ph=(ph+I*0.7)%22;const nd=Math.max(6,Math.round(per/26));
    for(let i=0;i<nd;i++){const d=ph+i*(per/nd);const p=pt(d);x.beginPath();x.arc(p[0],p[1],3.2,0,7);x.fillStyle="#4ec6e0";x.fill();}
    $("#ro",el).innerHTML=`I = V/R = <b>${I.toFixed(2)} A</b> &nbsp;·&nbsp; P = V·I = <b style="color:var(--teal)">${Pw.toFixed(1)} W</b><br><span style="color:var(--faint)">cyan dots = conventional current (clockwise, from + terminal); faster flow = more amps</span>`;
  }
  raf(draw);
}

/* --- magnetic force on a moving charge --- */
function simMagForce(el){
  el.innerHTML=`<div class="simwrap"><canvas></canvas><div class="readout" id="ro"></div>
   <div class="simctl"><label>charge <select id="q"><option value="1">positive +</option><option value="-1">negative −</option></select></label>
   <label>speed v: <b id="vv">5</b> <input type="range" id="v" min="2" max="10" step="1" value="5"></label>
   <label>field B: <b id="bb">5</b> <input type="range" id="b" min="2" max="10" step="1" value="5"></label></div></div>`;
  const cv=$("canvas",el);let v=5,B=5,q=1,th=0;
  $("#q",el).onchange=e=>q=+e.target.value;
  $("#v",el).oninput=e=>{v=+e.target.value;$("#vv",el).textContent=v;};
  $("#b",el).oninput=e=>{B=+e.target.value;$("#bb",el).textContent=B;};
  function draw(){const {x,w,h}=fit(cv,240);x.clearRect(0,0,w,h);const cx=w/2,cy=h/2;
    // B into page: grid of ⊗
    x.fillStyle="#243050";x.font="12px sans-serif";x.textAlign="center";x.textBaseline="middle";
    for(let gx=24;gx<w;gx+=40)for(let gy=22;gy<h;gy+=40)x.fillText("⊗",gx,gy);
    const r=Math.max(20,Math.min(Math.min(w,h)/2-22,16*v/B));
    th+=q*0.02*B;                         // cyclotron: +q ccw (math), speed ∝ B
    // circle path (math coords, y flipped for canvas)
    x.strokeStyle="#3a466b";x.lineWidth=1.5;x.setLineDash([4,4]);x.beginPath();x.arc(cx,cy,r,0,7);x.stroke();x.setLineDash([]);
    const px=cx+r*Math.cos(th),py=cy-r*Math.sin(th);
    // velocity (tangent, ccw for +q) and force (centripetal, to center)
    const vdir=Math.atan2(-Math.cos(th)*q,-Math.sin(th)*q);   // canvas angle of (-sinθ,-cosθ)*sign after y-flip
    arrow(x,px,py,vdir,30,"#4ec6e0",2.4);
    const fdir=Math.atan2(Math.sin(th),-Math.cos(th));        // toward center on canvas
    arrow(x,px,py,fdir,r*0.7,"#ef7a6a",2);
    x.beginPath();x.arc(px,py,7,0,7);x.fillStyle=q>0?"#ef7a6a":"#4ec6e0";x.fill();x.lineWidth=2;x.strokeStyle="#05070d";x.stroke();
    x.fillStyle="#05070d";x.font="bold 11px sans-serif";x.textAlign="center";x.textBaseline="middle";x.fillText(q>0?"+":"−",px,py+1);
    $("#ro",el).innerHTML=`B into the page (⊗). &nbsp; <b style="color:var(--teal)">v</b> = velocity, <b style="color:var(--red)">F</b> = qv×B (always ⊥ v, so it curves but never speeds up).<br>|F| = qvB &nbsp;·&nbsp; radius r = mv/(qB) ∝ v/B &nbsp;·&nbsp; <span style="color:var(--faint)">raise v → bigger circle; raise B → tighter, faster orbit; flip the sign → reverses direction</span>`;
  }
  raf(draw);
}

/* --- capacitor charging curve --- */
function simCapacitor(el){
  el.innerHTML=`<div class="simwrap"><canvas></canvas><div class="readout" id="ro"></div>
   <div class="simctl"><label>resistance R: <b id="rr">10</b> kΩ <input type="range" id="r" min="1" max="20" step="1" value="10"></label>
   <label>capacitance C: <b id="cc">100</b> µF <input type="range" id="c" min="20" max="400" step="20" value="100"></label></div></div>`;
  const cv=$("canvas",el);let R=10,C=100,t0=null;const Vs=5;
  $("#r",el).oninput=e=>{R=+e.target.value;$("#rr",el).textContent=R;t0=null;};
  $("#c",el).oninput=e=>{C=+e.target.value;$("#cc",el).textContent=C;t0=null;};
  function draw(ts){const {x,w,h}=fit(cv,220);x.clearRect(0,0,w,h);
    const tau=R*1e3*C*1e-6;               // seconds
    if(t0===null)t0=ts;let t=(ts-t0)/1000;const Tw=5*tau;if(t>Tw){t0=ts;t=0;}
    const mL=42,mB=28,x0=mL,x1=w-14,y0=14,y1=h-mB;
    const X=s=>x0+(s/Tw)*(x1-x0),Y=V=>y1-(V/Vs)*(y1-y0);
    // axes
    x.strokeStyle="#3a466b";x.lineWidth=1;x.beginPath();x.moveTo(x0,y0);x.lineTo(x0,y1);x.lineTo(x1,y1);x.stroke();
    x.fillStyle="#5f6f8e";x.font="10px ui-monospace,monospace";x.textAlign="right";x.textBaseline="middle";x.fillText(Vs+"V",x0-4,y0+4);x.fillText("0",x0-4,y1);
    // 63% marker at t = tau
    const y63=Y(0.632*Vs);x.strokeStyle="#4ec6e055";x.setLineDash([4,3]);x.beginPath();x.moveTo(x0,y63);x.lineTo(X(tau),y63);x.lineTo(X(tau),y1);x.stroke();x.setLineDash([]);
    x.fillStyle="#4ec6e0";x.textAlign="center";x.fillText("63% at τ",X(tau),y63-8);
    // charging curve
    x.strokeStyle="#f5d442";x.lineWidth=2.5;x.beginPath();for(let px=x0;px<=x1;px+=2){const s=(px-x0)/(x1-x0)*Tw;const V=Vs*(1-Math.exp(-s/tau));px===x0?x.moveTo(px,Y(V)):x.lineTo(px,Y(V));}x.stroke();
    // moving dot
    const Vn=Vs*(1-Math.exp(-t/tau));x.fillStyle="#f0a028";x.beginPath();x.arc(X(t),Y(Vn),5,0,7);x.fill();
    $("#ro",el).innerHTML=`τ = R·C = <b>${tau.toFixed(2)} s</b> &nbsp;·&nbsp; V = <b>${Vn.toFixed(2)} V</b> of ${Vs} &nbsp;·&nbsp; Q = C·V = <b style="color:var(--teal)">${(C*1e-6*Vn*1e3).toFixed(2)} mC</b><br><span style="color:var(--faint)">V(t) = Vs(1 − e<sup>−t/RC</sup>); bigger R or C → slower charge. One τ reaches 63% of full.</span>`;
  }
  raf(draw);
}

/* --- electromagnetic wave --- */
function simEMWave(el){
  el.innerHTML=`<div class="simwrap"><canvas></canvas><div class="readout" id="ro">E (gold, vertical) and B (cyan, into the page) oscillate in step — perpendicular to each other and to the direction of travel. That self-sustaining pair, moving at c, is light.</div>
   <div class="simctl"><label>wavelength <input type="range" id="lam" min="60" max="220" step="10" value="120"></label></div></div>`;
  const cv=$("canvas",el);let lam=120;$("#lam",el).oninput=e=>lam=+e.target.value;
  function draw(ts){const {x,w,h}=fit(cv,240);x.clearRect(0,0,w,h);const by=h/2;const k=2*Math.PI/lam,ph=ts*0.004,A=h*0.28;
    // propagation axis
    x.strokeStyle="#243050";x.lineWidth=1;x.beginPath();x.moveTo(0,by);x.lineTo(w,by);x.stroke();
    // B field: skewed to suggest depth (into page), same phase as E
    x.strokeStyle="rgba(78,198,224,.35)";x.lineWidth=1;
    for(let px=0;px<w;px+=10){const val=A*Math.sin(k*px-ph);x.beginPath();x.moveTo(px,by);x.lineTo(px+val*0.5,by+val*0.34);x.stroke();}
    x.strokeStyle="#4ec6e0";x.lineWidth=2;x.beginPath();for(let px=0;px<=w;px+=2){const val=A*Math.sin(k*px-ph);const X=px+val*0.5,Y=by+val*0.34;px===0?x.moveTo(X,Y):x.lineTo(X,Y);}x.stroke();
    // E field: vertical stems + curve
    x.strokeStyle="rgba(245,212,66,.32)";x.lineWidth=1;
    for(let px=0;px<w;px+=10){const val=A*Math.sin(k*px-ph);x.beginPath();x.moveTo(px,by);x.lineTo(px,by-val);x.stroke();}
    x.strokeStyle="#f5d442";x.lineWidth=2.6;x.beginPath();for(let px=0;px<=w;px+=2){const val=A*Math.sin(k*px-ph);px===0?x.moveTo(px,by-val):x.lineTo(px,by-val);}x.stroke();
    // labels + propagation arrow
    x.fillStyle="#f5d442";x.font="bold 12px sans-serif";x.textAlign="left";x.textBaseline="middle";x.fillText("E",6,by-A-2);
    x.fillStyle="#4ec6e0";x.fillText("B",6,by+A*0.34+12);
    arrow(x,w-70,by,0,54,"#9fb0cc",1.8);x.fillStyle="#9fb0cc";x.font="11px sans-serif";x.fillText("c",w-13,by-10);
  }
  raf(draw);
}

/* practice */
const DR=[
 {q:`Two point charges are pulled twice as far apart. The force between them becomes:`,a:["twice as large","half as large","one-quarter as large","unchanged"],c:2,e:"Coulomb's law is inverse-square: F ∝ 1/r². Double r → force × (1/2)² = 1/4."},
 {q:`Two objects both carry negative charge. They will:`,a:["attract","repel","feel no force","attract then repel"],c:1,e:"Like charges repel, opposite charges attract. Both negative = like = repel."},
 {q:`The electric field E at a point is defined as:`,a:["force per unit charge (N/C)","charge per unit area","energy per unit charge","force times distance"],c:0,e:"E = F/q₀ — the force a small positive test charge feels, divided by its charge."},
 {q:`A 12 V battery drives current through a 4 Ω resistor. The current is:`,a:["3 A","48 A","0.33 A","16 A"],c:0,e:"Ohm's law: I = V/R = 12/4 = 3 A."},
 {q:`A 3 Ω and a 6 Ω resistor are wired in series. Total resistance:`,a:["2 Ω","4.5 Ω","9 Ω","18 Ω"],c:2,e:"Series resistances add: 3 + 6 = 9 Ω, and the same current flows through both."},
 {q:`Two 6 Ω resistors are wired in parallel. Total resistance:`,a:["12 Ω","6 Ω","3 Ω","0 Ω"],c:2,e:"1/R = 1/6 + 1/6 = 1/3 → R = 3 Ω. Parallel is always less than the smallest branch."},
 {q:`A device draws 2 A at 12 V. The power it consumes is:`,a:["6 W","14 W","24 W","2 W"],c:2,e:"P = I·V = 2 × 12 = 24 W (equivalently I²R with R = 6 Ω)."},
 {q:`The magnetic force on a moving charge is greatest when its velocity is:`,a:["parallel to B","antiparallel to B","perpendicular to B","zero"],c:2,e:"|F| = qvB·sinθ is maximum at θ = 90° (v ⊥ B) and zero when v is parallel to B."},
 {q:`A charge moving exactly parallel to a magnetic field B feels a force of:`,a:["qvB","zero","qv/B","maximum"],c:1,e:"sinθ = 0 when v ∥ B, so F = qvB·sinθ = 0 — it sails straight through."},
 {q:`A magnet is pushed toward a coil. The induced current will:`,a:["add energy to the push","oppose the change (Lenz's law)","be exactly zero","destroy charge"],c:1,e:"Lenz's law: the induced current opposes the flux change that created it — a consequence of energy conservation."},
 {q:`For a capacitor, Q = CV. This means capacitance C is the:`,a:["charge stored per volt","voltage per unit charge","energy released per second","resistance of the gap"],c:0,e:"C = Q/V, measured in farads (coulombs per volt). A capacitor stores charge and energy ½CV²."},
 {q:`Maxwell's great discovery was that light is:`,a:["a stream of tiny charged particles","an electromagnetic wave of oscillating E and B","a vibration of the ether only","purely a form of heat"],c:1,e:"Changing E makes B and changing B makes E, self-propagating at c = 1/√(μ₀ε₀) = 3×10⁸ m/s — the measured speed of light. Visible light is one band of the EM spectrum."},
];
