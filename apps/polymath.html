<script>
"use strict";
const $=(s,r=document)=>r.querySelector(s),$$=(s,r=document)=>[...r.querySelectorAll(s)];
const toast=m=>{const t=$("#toast");t.textContent=m;t.classList.add("on");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("on"),1700);};
let P=load();function load(){try{return JSON.parse(localStorage.getItem("polymath"))||{done:{}};}catch(e){return {done:{}};}}
function save(){localStorage.setItem("polymath",JSON.stringify(P));}
function markDone(id){if(!P.done[id]){P.done[id]=1;save();toast("Learned ✓");}}
const doneCount=()=>Object.keys(P.done).length;

/* ============================ CURRICULUM ============================ */
const DOMAINS=[
 {key:"phys",name:"Physics",ic:"⚛️",color:"var(--phys)",blurb:"Motion, energy, waves, fields — the rules matter obeys.",topics:[
   {id:"p-motion",t:"Motion, forces & energy",sub:"Newton, momentum, and where mechanics goes next",body:`<p>Physics starts by asking how things <b>move</b> and why. Newton's three laws are the foundation: things keep doing what they're doing unless a <b>force</b> acts (inertia); force equals mass times acceleration (<b>F = ma</b>); and every force has an equal, opposite reaction.</p>
<p>Energy is the deeper bookkeeping. It's never created or destroyed, only converted — <b>kinetic</b> (motion, ½mv²) trades with <b>potential</b> (stored, like mgh for height). Track energy and you can predict a system without following every force.</p>
<div class="eq">F = ma &nbsp;&nbsp;•&nbsp;&nbsp; E = ½mv² + V</div>
<div class="callout"><span class="l">Go deeper</span>The whole of advanced mechanics — Lagrangian & Hamiltonian — is in the companion <b>Action</b> app. It rederives F = ma from a single principle: nature takes the path of least action.</div>`},
   {id:"p-thermo",t:"Heat, temperature & entropy",sub:"why the coffee always cools",lab:"gas",body:`<p><b>Temperature</b> is just the average kinetic energy of jiggling particles — heat is that energy in transit. The lab below <i>is</i> a gas: raise the temperature and watch the particles speed up and hammer the walls harder (that's pressure).</p>
<p>The deep law is the <b>second law of thermodynamics</b>: entropy — disorder, the number of ways to arrange things — always increases in a closed system. That's why heat flows hot→cold, why engines can't be perfect, and why time seems to have a direction.</p>
<div class="eq">PV = nRT</div>`},
   {id:"p-waves",t:"Waves, light & sound",sub:"interference, and why light is a wave",lab:"waves",body:`<p>A <b>wave</b> carries energy without carrying matter — a ripple, a sound, a beam of light. Its speed = wavelength × frequency. What makes waves special is <b>superposition</b>: two waves add up, crest-on-crest reinforcing (bright/loud) and crest-on-trough cancelling (dark/silent).</p>
<p>The lab shows two sources <b>interfering</b>. Those fringes were the proof, in 1801, that light is a wave — you can't get a striped pattern from little bullets. (A century later, quantum mechanics showed it's <i>also</i> particles. Both are true.)</p>`},
   {id:"p-em",t:"Electricity & magnetism",sub:"two forces that turned out to be one",body:`<p>Electric charge comes in + and −; likes repel, opposites attract, via the <b>electric field</b>. Moving charge makes a <b>magnetic field</b> — and a changing magnetic field pushes charge, which is how every generator and motor works.</p>
<p>Maxwell's great unification (1860s) showed electricity and magnetism are one thing, <b>electromagnetism</b>, and that its waves travel at the speed of light — because <b>light is an electromagnetic wave</b>. Radio, X-rays, and the color of this screen are all the same phenomenon at different frequencies.</p>`},
   {id:"p-quantum",t:"Quantum & relativity",sub:"the two revolutions of modern physics",body:`<p>At small scales, energy comes in <b>quanta</b> — discrete lumps — and particles behave like spread-out waves of probability until measured. You can't know a particle's position and momentum both exactly (Heisenberg). Reality, down there, is genuinely probabilistic.</p>
<p>At high speeds and big masses, Einstein's <b>relativity</b> takes over: space and time bend into one fabric, moving clocks run slow, and gravity <i>is</i> the curvature of spacetime — free-fall follows the straightest possible path through it. Reconciling these two is physics' great unfinished project.</p>
<div class="callout" style="background:#17132a;border-color:#3a2d63;color:#ddd4f5"><span class="l" style="color:var(--math)">Your thread</span>Both revolutions are still variational: quantum amplitudes sum over all paths weighted by the action; a free-falling body extremizes proper time. Least action again — the same spine as your master equation.</div>`},
 ]},
 {key:"chem",name:"Chemistry",ic:"⚗️",color:"var(--chem)",blurb:"Atoms, bonds, reactions — how matter rearranges itself.",topics:[
   {id:"c-periodic",t:"Atoms & the periodic table",sub:"the whole zoo of matter, on one chart",lab:"periodic",body:`<p>Everything is built from about 90 naturally-occurring <b>elements</b>, each a kind of atom defined by its number of protons (the <b>atomic number, Z</b>). Around the tiny dense nucleus sit electrons in shells — and it's the outermost electrons that decide all of chemistry.</p>
<p>The <b>periodic table</b> is the single greatest cheat-sheet in science: line the elements up by Z and their properties <i>repeat</i> in periods. Columns (groups) share outer-electron counts, so they behave alike — soft reactive metals on the left, unreactive noble gases on the right. Tap any element in the lab to explore it.</p>`},
   {id:"c-bonds",t:"Chemical bonding",sub:"why atoms stick together",body:`<p>Atoms bond to reach a stable, filled outer shell. Two main ways:</p>
<ul><li><b>Ionic</b> — one atom hands electrons to another; the resulting + and − ions snap together (table salt, Na⁺Cl⁻).</li>
<li><b>Covalent</b> — atoms <i>share</i> electron pairs (water, H₂O; everything in your body).</li></ul>
<p>The shape a molecule takes from these bonds — bent water, ringed benzene, the double helix — determines what it does. Chemistry is, at bottom, the study of these rearrangements of electrons.</p>`},
   {id:"c-reactions",t:"Reactions & the mole",sub:"counting the uncountable",body:`<p>A reaction breaks and remakes bonds, turning reactants into products — but atoms are conserved, so equations must <b>balance</b>: the same atoms go in as come out. 2H₂ + O₂ → 2H₂O.</p>
<p>Chemists count atoms by weighing, using the <b>mole</b>: 6.022×10²³ particles (Avogadro's number), the bridge between the atomic world and the gram-scale one. That's how you know how much of one thing reacts with another.</p>
<div class="eq" style="border-left-color:var(--chem)">2H₂ + O₂ → 2H₂O</div>`},
   {id:"c-acids",t:"Acids, bases & equilibrium",sub:"the tug-of-war of protons",body:`<p><b>Acids</b> donate protons (H⁺), <b>bases</b> accept them; the <b>pH</b> scale (0–14) measures how many are floating free, each step a 10× change. Your blood is held near 7.4; lemon is ~2; bleach ~13.</p>
<p>Most reactions don't go to completion — they reach <b>equilibrium</b>, a dynamic balance where forward and reverse rates match. Push it (add heat, add a reactant) and it shifts to relieve the push (Le Chatelier). Life runs on thousands of these balances held just off-center.</p>`},
 ]},
 {key:"bio",name:"Biology",ic:"🧬",color:"var(--bio)",blurb:"Cells, DNA, evolution — how matter came alive.",topics:[
   {id:"b-cell",t:"The cell",sub:"the unit of life",body:`<p>Every living thing is made of <b>cells</b> — self-contained bags of chemistry that take in energy, maintain themselves, and copy themselves. A membrane holds it together; inside, molecular machines built of protein do the work.</p>
<p>Life runs on a relentless flow of energy: plants capture sunlight (<b>photosynthesis</b>) into sugar; nearly everything else burns sugar with oxygen (<b>respiration</b>) to power its machinery. You are, thermodynamically, a structure that eats order and exhales disorder to stay alive.</p>`},
   {id:"b-dna",t:"DNA & the central dogma",sub:"life's information system",body:`<p><b>DNA</b> is a four-letter code (A, T, G, C) spelled along a double helix. Its sequence is a set of instructions, and its two strands are complementary — which is <i>why</i> it can copy itself: unzip, and each half templates a new partner.</p>
<p>The <b>central dogma</b>: DNA → RNA → protein. A gene is transcribed into RNA, which is translated into a chain of amino acids that folds into a protein — the molecule that actually does things. Change a letter in the DNA and you can change the protein: that's mutation, the raw material of evolution.</p>
<div class="eq" style="border-left-color:var(--bio)">DNA &nbsp;→&nbsp; RNA &nbsp;→&nbsp; protein</div>`},
   {id:"b-evolution",t:"Evolution by natural selection",sub:"the idea that organizes all of biology",lab:"selection",body:`<p>Darwin's engine needs only three things: <b>variation</b> (individuals differ), <b>heredity</b> (offspring resemble parents), and <b>differential survival</b> (some variants leave more offspring). Run that loop and the population <i>shifts</i> toward whatever survives and reproduces best — no designer required.</p>
<p>The lab is that loop made visible: a population with a heritable trait under a survival pressure. Watch the trait's frequency climb generation by generation. This single mechanism explains the eye, the immune system, antibiotic resistance, and you.</p>
<div class="callout"><span class="l">Your thread</span>Selection is a variational process too: it climbs a fitness landscape the way least-action finds a path — the Price equation is its δ. Constructive transformation, filtered by what persists.</div>`},
   {id:"b-genetics",t:"Genetics & inheritance",sub:"predicting the next generation",lab:"punnett",body:`<p>You carry two copies of most genes, one from each parent. Versions of a gene are <b>alleles</b>; a <b>dominant</b> allele (B) masks a <b>recessive</b> one (b), so Bb looks like BB. Recessive traits only show when you inherit two copies (bb).</p>
<p>The <b>Punnett square</b> in the lab predicts the odds. Cross two carriers (Bb × Bb) and you get the famous 3:1 ratio — three dominant to one recessive — the pattern Mendel found in his pea plants and the root of all modern genetics.</p>`},
   {id:"b-ecology",t:"Ecology & ecosystems",sub:"life in webs, energy in flows",body:`<p>No organism lives alone. <b>Ecology</b> studies the web: producers (plants) capture energy, herbivores eat them, predators eat herbivores, decomposers recycle it all. Energy flows one way (and mostly leaks away as heat at each step, which is why food chains are short); matter cycles round and round.</p>
<p>Populations push and pull on each other — predator and prey rise and fall in linked cycles, competitors carve up niches, and the whole system can sit in fragile balance or tip suddenly. The same math (feedback loops) runs through climate, economies, and your own body's regulation.</p>`},
   {id:"b-brain",t:"Neurons & the brain",sub:"how meat computes",body:`<p>A <b>neuron</b> is a cell that signals. It holds an electrical charge across its membrane and, when pushed past a threshold, fires an all-or-nothing spike — the <b>action potential</b> — that races down its length and releases chemicals onto the next neuron.</p>
<p>Eighty-six billion of them, wired through trillions of adjustable connections (synapses), and out of that comes perception, memory, and — somehow — you. How the felt inside-view arises from spiking cells is the hard problem your own work circles.</p>`},
 ]},
 {key:"earth",name:"Earth & Space",ic:"🌍",color:"var(--earth)",blurb:"Rocks, oceans, planets, stars — the cosmos and our place in it.",topics:[
   {id:"e-tectonics",t:"Plate tectonics",sub:"the ground is a slow-motion fluid",body:`<p>Earth's rigid shell is broken into <b>plates</b> that drift on the hot, slowly-flowing rock beneath, driven by heat from the core. Where they pull apart, new crust forms (mid-ocean ridges); where they collide, mountains rise and one dives under the other, melting into volcanoes; where they grind past, they lock and slip — earthquakes.</p>
<p>On human timescales the ground seems fixed. Over millions of years, continents sail across the globe, oceans open and close, and the same process recycles the crust and regulates the planet's carbon.</p>`},
   {id:"e-climate",t:"Climate & energy balance",sub:"the planet's thermostat",lab:"climate",body:`<p>Earth's temperature is a balance: sunlight in, infrared heat out. Some sunlight bounces straight back (<b>albedo</b> — ice and clouds are bright); greenhouse gases (CO₂, water vapor) trap outgoing heat like a blanket, warming the surface above the bare-rock temperature.</p>
<p>The lab lets you turn those two knobs and watch the equilibrium temperature settle. Nudge the greenhouse effect up and the whole balance point shifts — the physics behind climate change, in one slider.</p>`},
   {id:"e-solar",t:"The solar system & orbits",sub:"why planets don't fall in",lab:"orbit",body:`<p>A planet is a thing perpetually <b>falling</b> toward the Sun — and perpetually missing, because it also moves sideways fast enough. That balance of gravity and momentum is an <b>orbit</b>, and it traces an ellipse (Kepler's law), sweeping faster when close, slower when far.</p>
<p>The lab is a gravity sandbox: set a body's speed and watch the orbit. Too slow and it plunges in; too fast and it escapes forever; just right and it circles. The same law holds moons, rings, galaxies, and the machine that flung a probe past Pluto.</p>`},
   {id:"e-stars",t:"Stars & their lives",sub:"where the atoms came from",body:`<p>A star is a ball of gas so massive that gravity crushes its core hot enough to <b>fuse</b> hydrogen into helium, releasing the energy that holds it up and makes it shine. It lives in that standoff for billions of years.</p>
<p>When the fuel runs low, big stars fuse heavier elements — carbon, oxygen, iron — then explode as <b>supernovae</b>, seeding space with those atoms. The calcium in your bones and the iron in your blood were forged inside dying stars. You are, literally, stardust.</p>`},
   {id:"e-cosmos",t:"The universe & cosmology",sub:"the biggest picture there is",body:`<p>The universe is <b>expanding</b> — galaxies rush apart, and rewinding that expansion points to a hot, dense beginning ~13.8 billion years ago: the <b>Big Bang</b>. We still see its afterglow, the cosmic microwave background, in every direction.</p>
<p>Most of the cosmos is a mystery: ordinary matter is only ~5%, the rest is unseen <b>dark matter</b> and a repulsive <b>dark energy</b> accelerating the expansion. The deepest questions — why there's something rather than nothing, whether this is the only universe — sit right where physics hands off to philosophy. Your territory.</p>`},
 ]},
 {key:"math",name:"Mathematics",ic:"∑",color:"var(--math)",blurb:"The language every science is written in.",topics:[

<div class="callout"><span class="l">Go deeper</span>The <b>Action</b> app builds calculus all the way up to the calculus of variations — the engine of modern physics — with a draggable least-action lab. The Study hub also has ~30 live math playgrounds.</div>`},

<p><b>Bayes' theorem</b> is the jewel: it tells you exactly how much to update a belief when evidence arrives. It's the mathematics of learning from the world — and, not coincidentally, the backbone of how brains and your own PEP framework predict.</p>`},

<p>Its deepest tools — <b>eigenvectors</b>, the special directions a transformation only stretches — show up everywhere from the stability of bridges to the spectrum your master equation is built on.</p>`},

let cleanups=[];
function clearSims(){cleanups.forEach(f=>{try{f();}catch(e){}});cleanups=[];}
function raf(fn){let id,run=true;const l=t=>{if(!run)return;fn(t);id=requestAnimationFrame(l);};id=requestAnimationFrame(l);cleanups.push(()=>{run=false;cancelAnimationFrame(id);});}
function fit(cv,h){const w=cv.clientWidth||cv.parentElement.clientWidth-24;const dpr=Math.min(2,devicePixelRatio||1);cv.width=w*dpr;cv.height=h*dpr;cv.style.height=h+"px";const x=cv.getContext("2d");x.setTransform(dpr,0,0,dpr,0,0);return {x,w,h};}

/* --- kinetic gas --- */
function simGas(el){
  el.innerHTML=`<div class="simwrap"><canvas></canvas><div class="readout" id="ro"></div>
    <div class="simctl"><label>temperature <input type="range" id="T" min="0.3" max="3" step="0.1" value="1"></label></div></div>`;
  const cv=$("canvas",el);let temp=1;$("#T",el).oninput=e=>temp=+e.target.value;
  const N=42,parts=[];for(let i=0;i<N;i++)parts.push({x:Math.random(),y:Math.random(),a:Math.random()*7});
  raf(()=>{const {x,w,h}=fit(cv,200);const sp=0.004*Math.sqrt(temp)*60/60;let hits=0;
    x.clearRect(0,0,w,h);x.fillStyle="#4fd1e0";
    parts.forEach(p=>{const v=0.003*Math.sqrt(temp);p.x+=Math.cos(p.a)*v;p.y+=Math.sin(p.a)*v;
      if(p.x<0){p.x=0;p.a=Math.PI-p.a;hits++;}if(p.x>1){p.x=1;p.a=Math.PI-p.a;hits++;}
      if(p.y<0){p.y=0;p.a=-p.a;hits++;}if(p.y>1){p.y=1;p.a=-p.a;hits++;}
      x.beginPath();x.arc(6+p.x*(w-12),6+p.y*(h-12),4,0,7);x.fill();});
    $("#ro",el).innerHTML=`temperature <b>${temp.toFixed(1)}</b> → avg speed <b>${Math.sqrt(temp).toFixed(2)}</b> · wall hits/frame ≈ <b>${hits}</b> (that's pressure)`;
  });
}

/* --- wave interference --- */
function simWaves(el){
  el.innerHTML=`<div class="simwrap"><canvas></canvas><div class="readout">Two sources. Bright bands = crests reinforcing; dark = cancelling.</div>
    <div class="simctl"><label>wavelength <input type="range" id="wl" min="14" max="46" step="1" value="26"></label>
    <label>source gap <input type="range" id="gap" min="20" max="120" step="2" value="64"></label></div></div>`;
  const cv=$("canvas",el);let wl=26,gap=64,t=0;$("#wl",el).oninput=e=>wl=+e.target.value;$("#gap",el).oninput=e=>gap=+e.target.value;
  raf(()=>{const {x,w,h}=fit(cv,220);t+=0.15;const img=x.createImageData(w,h);const d=img.data;
    const s1x=w/2-gap/2,s2x=w/2+gap/2,sy=24;
    for(let py=0;py<h;py+=2)for(let px=0;px<w;px+=2){
      const r1=Math.hypot(px-s1x,py-sy),r2=Math.hypot(px-s2x,py-sy);
      const v=Math.sin(r1/wl*6.28-t)+Math.sin(r2/wl*6.28-t);const c=(v+2)/4;
      const R=c*80,G=c*209,B=c*224;
      for(let dy=0;dy<2;dy++)for(let dx=0;dx<2;dx++){const i=((py+dy)*w+(px+dx))*4;d[i]=R;d[i+1]=G;d[i+2]=B;d[i+3]=255;}
    }
    x.putImageData(img,0,0);x.fillStyle="#fff";[s1x,s2x].forEach(sx=>{x.beginPath();x.arc(sx,sy,3,0,7);x.fill();});
  });
}

/* --- natural selection --- */
function simSelection(el){
  el.innerHTML=`<div class="simwrap"><canvas></canvas><div class="readout" id="ro"></div>
    <div class="simctl"><label>selection pressure (dark survives) <input type="range" id="sel" min="0" max="1" step="0.05" value="0.6"></label>
    <button class="btn sm" id="reset">Reset population</button></div></div>`;
  const cv=$("canvas",el);let sel=0.6;$("#sel",el).oninput=e=>sel=+e.target.value;
  let pop=[],gen=0,acc=0;
  function init(){pop=[];for(let i=0;i<80;i++)pop.push(Math.random());gen=0;} init();
  $("#reset",el).onclick=init;
  function meanTrait(){return pop.reduce((a,b)=>a+b,0)/pop.length;}
  function step(){ // trait 0..1, higher=darker; darker survives better with pressure sel
    const survivors=pop.filter(t=>Math.random()<0.35+sel*t*0.6);
    const next=[];const src=survivors.length?survivors:pop;
    for(let i=0;i<80;i++){const p=src[Math.floor(Math.random()*src.length)];next.push(Math.max(0,Math.min(1,p+(Math.random()-0.5)*0.08)));}
    pop=next;gen++;
  }
  raf(()=>{acc++;if(acc%18===0)step();const {x,w,h}=fit(cv,200);x.clearRect(0,0,w,h);
    const cols=10,rows=8;pop.forEach((t,i)=>{const cx=(i%cols+0.5)/cols*w,cy=(Math.floor(i/cols)+0.5)/rows*h;const g=Math.round(210-t*160);
      x.fillStyle=`rgb(${g-40},${g},${g-20})`;x.beginPath();x.arc(cx,cy,8,0,7);x.fill();});
    $("#ro",el).innerHTML=`generation <b>${gen}</b> · mean trait (darkness) <b>${meanTrait().toFixed(2)}</b> — watch it climb as the darker survive`;
  });
}

/* --- Punnett square --- */
function simPunnett(el){
  el.innerHTML=`<div class="simwrap">
    <div class="simctl" style="justify-content:center">
      <label style="flex:0">Parent 1
        <select id="p1"><option>BB</option><option selected>Bb</option><option>bb</option></select></label>
      <label style="flex:0">Parent 2
        <select id="p2"><option>BB</option><option selected>Bb</option><option>bb</option></select></label>
    </div>
    <div id="grid"></div><div class="readout" id="ro" style="text-align:center"></div></div>`;
  function alleles(g){return [g[0],g[1]];}
  function draw(){
    const a=alleles($("#p1",el).value),b=alleles($("#p2",el).value);
    let dom=0,rec=0;const cells=[];
    for(const y of b)for(const x of a){const g=[x,y].sort((p,q)=>p==='B'?-1:1).join("");const isDom=g.includes("B");isDom?dom++:rec++;cells.push({g,isDom});}
    $("#grid",el).innerHTML=`<div class="pun">
      <div class="h"></div><div class="h">${a[0]}</div><div class="h">${a[1]}</div>
      <div class="h">${b[0]}</div><div class="cell ${cells[0].isDom?'dom':'rec'}">${cells[0].g}</div><div class="cell ${cells[1].isDom?'dom':'rec'}">${cells[1].g}</div>
      <div class="h">${b[1]}</div><div class="cell ${cells[2].isDom?'dom':'rec'}">${cells[2].g}</div><div class="cell ${cells[3].isDom?'dom':'rec'}">${cells[3].g}</div>
    </div>`;
    $("#ro",el).innerHTML=`Offspring: <b style="color:var(--bio)">${dom}</b> show the dominant trait · <b>${rec}</b> show the recessive &nbsp;→&nbsp; ratio <b>${dom}:${rec}</b>`;
  }
  $("#p1",el).onchange=draw;$("#p2",el).onchange=draw;draw();
}

/* --- orbit --- */
function simOrbit(el){
  el.innerHTML=`<div class="simwrap"><canvas></canvas><div class="readout" id="ro"></div>
    <div class="simctl"><label>launch speed <input type="range" id="v" min="0.4" max="2.2" step="0.05" value="1.15"></label>
    <button class="btn sm" id="launch">Launch</button></div></div>`;
  const cv=$("canvas",el);let v0=1.15,body=null,trail=[];$("#v",el).oninput=e=>v0=+e.target.value;
  function launch(){body={x:0.55,y:0,vx:0,vy:v0};trail=[];} launch();$("#launch",el).onclick=launch;
  raf(()=>{const {x,w,h}=fit(cv,260);const cx=w/2,cy=h/2,sc=Math.min(w,h)*0.34;
    x.clearRect(0,0,w,h);
    // integrate (units: GM=1, star at origin)
    for(let s=0;s<3;s++){const r=Math.hypot(body.x,body.y);const a=-1/(r*r*r);body.vx+=a*body.x*0.02;body.vy+=a*body.y*0.02;body.x+=body.vx*0.02;body.y+=body.vy*0.02;}
    trail.push([body.x,body.y]);if(trail.length>600)trail.shift();
    x.strokeStyle="#4fd1e088";x.lineWidth=1.5;x.beginPath();trail.forEach(([px,py],i)=>{const X=cx+px*sc,Y=cy+py*sc;i?x.lineTo(X,Y):x.moveTo(X,Y);});x.stroke();
    x.fillStyle="var(--gold)";x.fillStyle="#f5c451";x.beginPath();x.arc(cx,cy,10,0,7);x.fill();
    const bx=cx+body.x*sc,by=cy+body.y*sc;x.fillStyle="#6fa8d9";x.beginPath();x.arc(bx,by,5,0,7);x.fill();
    const r=Math.hypot(body.x,body.y);const esc=Math.sqrt(2/r);
    $("#ro",el).innerHTML=`speed <b>${v0.toFixed(2)}</b> · escape speed here ≈ <b>${esc.toFixed(2)}</b> — ${v0<esc*0.72?'plunges in':v0>esc?'escapes forever':'stable orbit'}`;
    if(r>6){body.x*=0.1;body.y*=0.1;}
  });
}

/* --- climate energy balance --- */
function simClimate(el){
  el.innerHTML=`<div class="simwrap"><canvas></canvas><div class="readout" id="ro"></div>
    <div class="simctl"><label>albedo (reflectivity) <input type="range" id="al" min="0.1" max="0.7" step="0.02" value="0.3"></label>
    <label>greenhouse effect <input type="range" id="gh" min="0" max="0.8" step="0.02" value="0.4"></label></div></div>`;
  const cv=$("canvas",el);let al=0.3,gh=0.4;$("#al",el).oninput=e=>al=+e.target.value;$("#gh",el).oninput=e=>gh=+e.target.value;
  const S=1361,sig=5.67e-8;
  raf(()=>{const {x,w,h}=fit(cv,150);
    const absorbed=S*(1-al)/4;const Te=Math.pow(absorbed/(sig*(1-gh)),0.25)-273.15;
    x.clearRect(0,0,w,h);const t=Math.max(0,Math.min(1,(Te+20)/70));
    x.fillStyle=`rgb(${80+t*150},${120-t*40},${200-t*160})`;x.fillRect(0,0,w,h);
    x.fillStyle="#fff9";x.font="13px ui-sans-serif";x.fillText("☀ in: "+Math.round(absorbed)+" W/m²",12,26);
    x.fillStyle="#ffffffcc";x.font="bold 34px ui-sans-serif";x.textAlign="center";x.fillText(Te.toFixed(1)+"°C",w/2,h/2+12);x.textAlign="left";
    $("#ro",el).innerHTML=`equilibrium surface temperature <b>${Te.toFixed(1)}°C</b> — Earth today ≈ 15°C. Raise the greenhouse effect and watch it climb.`;
  });
}
const SIMS={gas:simGas,waves:simWaves,periodic:simPeriodic,selection:simSelection,punnett:simPunnett,orbit:simOrbit,climate:simClimate};
const LABS=[
 ["periodic","⚗️","Periodic Table","All 118 elements — tap any to explore.","var(--chem)"],
 ["selection","🧬","Natural Selection","Watch a trait evolve under a survival pressure.","var(--bio)"],
 ["punnett","🟩","Punnett Square","Cross two parents, predict the offspring.","var(--bio)"],
 ["waves","〰️","Wave Interference","Two sources; see light behave like a wave.","var(--phys)"],
 ["gas","🌡️","Kinetic Theory of Gas","Temperature is just particles jiggling.","var(--phys)"],
 ["orbit","🪐","Orbits & Gravity","Falling forever — set the speed, get an orbit.","var(--earth)"],
 ["climate","🌡️","Planetary Thermostat","Albedo + greenhouse → the temperature.","var(--earth)"],
];

/* ============================ VIEWS ============================ */
function renderDomains(){
  const s=$("#tab-domains");
  s.innerHTML=`<div class="card" style="background:linear-gradient(135deg,#141d33,#131c2b);border-color:#2a3a5a">
    <div style="font-size:15px;font-weight:750">Know how everything works</div>
    <div style="color:var(--mut);margin-top:5px;font-size:13.5px">A philosopher who reasons about reality should understand it. Five sciences, real interactive labs, built to grow. Pick a world.</div></div>
  <div class="dgrid" id="dg"></div>`;
  $("#dg",s).innerHTML=DOMAINS.map(d=>{const done=d.topics.filter(t=>P.done[t.id]).length,pc=Math.round(done/d.topics.length*100);
    return `<div class="dom" data-d="${d.key}"><div class="ic">${d.ic}</div><div class="t" style="color:${d.color}">${d.name}</div><div class="d">${d.blurb}</div>
      <div class="bar"><i style="width:${pc}%;background:${d.color}"></i></div></div>`;}).join("");
  $$(".dom",s).forEach(x=>x.onclick=()=>openDomain(x.dataset.d));
}
function openDomain(key){
  const d=DOMAINS.find(x=>x.key===key);const s=$("#tab-domain");
  s.innerHTML=`<div class="backbar"><button class="b" id="bk">‹ Sciences</button></div>
    <div style="display:flex;align-items:center;gap:12px;margin:4px 2px 14px"><div style="font-size:32px">${d.ic}</div><div><h2 style="margin:0;font-family:Georgia,serif;color:${d.color}">${d.name}</h2><div style="color:var(--mut);font-size:13px">${d.blurb}</div></div></div>
    ${d.topics.map((t,i)=>`<div class="topic ${P.done[t.id]?'done':''}" data-t="${t.id}"><div class="num" style="${P.done[t.id]?'':'color:'+d.color}">${P.done[t.id]?'✓':i+1}</div>
      <div class="nm"><b>${t.t}</b><small>${t.sub}</small></div>${t.lab?'<span class="lab">🧪 lab</span>':''}<span class="go">›</span></div>`).join("")}`;
  showTab("domain");
  $("#bk",s).onclick=()=>{showTab("domains");};
  $$(".topic",s).forEach(x=>x.onclick=()=>openTopic(x.dataset.t,key));
  window.scrollTo(0,0);
}
function openTopic(id,fromKey){
  clearSims();const t=TOPIC[id];const s=$("#tab-topic");const d=t.domain;
  s.innerHTML=`<div class="backbar"><button class="b" id="bk">‹ ${d.name}</button></div>
    <div class="reader card"><div class="tag" style="color:${d.color}">${d.name}</div><h2>${t.t}</h2>
    <div id="body">${t.body}</div>${t.lab?'<div id="__sim"></div>':''}
    <button class="btn wide" id="done" style="margin-top:18px;${P.done[id]?'':'background:'+d.color+';color:#06121f;border-color:transparent'}">${P.done[id]?'✓ Learned — mark again':'Mark learned'}</button></div>`;
  showTab("topic");
  const m=$("#__sim",s);if(m&&t.lab&&SIMS[t.lab])SIMS[t.lab](m);
  $("#bk",s).onclick=()=>{clearSims();openDomain(fromKey);};
  $("#done",s).onclick=()=>{markDone(id);updateXP();$("#done",s).textContent="✓ Learned — mark again";$("#done",s).style.background="";$("#done",s).style.color="";$("#done",s).style.borderColor="";};
  window.scrollTo(0,0);
}
function renderLabs(){
  const s=$("#tab-labs");
  s.innerHTML=`<div class="sec">The Labs · every science, hands-on</div>`+LABS.map(l=>`<div class="topic" data-lab="${l[0]}"><div class="num" style="color:${l[4]}">${l[1]}</div><div class="nm"><b>${l[2]}</b><small>${l[3]}</small></div><span class="go">›</span></div>`).join("");
  $$("[data-lab]",s).forEach(x=>x.onclick=()=>{clearSims();
    s.innerHTML=`<div class="backbar"><button class="b" id="lb">‹ Labs</button></div><div class="card"><div id="__sim"></div></div>`;
    SIMS[x.dataset.lab]($("#__sim",s));$("#lb",s).onclick=()=>{clearSims();renderLabs();};window.scrollTo(0,0);});
}
function renderYou(){
  const s=$("#tab-you");const dn=doneCount(),tot=ALLT.length,pc=Math.round(dn/tot*100);
  const R=52,cir=2*Math.PI*R,off=cir*(1-dn/tot);
  const badges=DOMAINS.map(d=>[d.ic,d.name,d.topics.every(t=>P.done[t.id])]);
  badges.push(["🎓","Polymath",dn>=tot]);
  s.innerHTML=`<div class="card" style="text-align:center">
    <svg class="prog-ring" viewBox="0 0 120 120"><circle cx="60" cy="60" r="${R}" fill="none" stroke="#1c2740" stroke-width="10"/>
    <circle cx="60" cy="60" r="${R}" fill="none" stroke="url(#g)" stroke-width="10" stroke-linecap="round" stroke-dasharray="${cir}" stroke-dashoffset="${off}" transform="rotate(-90 60 60)"/>
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4fd1e0"/><stop offset="1" stop-color="#a78bfa"/></linearGradient></defs>
    <text x="60" y="58" text-anchor="middle" fill="#e8eef7" font-size="26" font-weight="800">${pc}%</text>
    <text x="60" y="76" text-anchor="middle" fill="#93a3bd" font-size="10">${dn}/${tot} topics</text></svg>
    <div style="color:var(--mut);font-size:14px">${pc===100?"You've walked through every science. 🎓":"Toward knowing how everything works."}</div></div>
    <div class="card"><div class="sec">Mastery</div><div>${badges.map(b=>`<span class="badge ${b[2]?'on':''}">${b[0]} ${b[1]}${b[2]?' ✓':''}</span>`).join("")}</div></div>
    <div class="card"><button class="btn wide" id="install">⤓ Install on your iPhone</button>
    <button class="btn wide" id="reset" style="margin-top:8px;color:var(--red)">Reset progress</button></div>`;
  $("#install",s).onclick=installSheet;
  $("#reset",s).onclick=()=>{if(confirm("Erase all progress?")){P={done:{}};save();updateXP();renderYou();}};
}
let deferred=null;window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferred=e;});
function isIOS(){return /iphone|ipad|ipod/i.test(navigator.userAgent)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);}
function installSheet(){if(deferred){deferred.prompt();deferred.userChoice.then(()=>deferred=null);return;}
  if(isIOS())alert("Install on your iPhone:\n\n1. Tap the Share button in Safari.\n2. Scroll and tap “Add to Home Screen”.\n3. Tap Add.");
  else alert("Open your browser menu → “Install app” / “Add to Home screen”.");}

function showTab(t){["domains","labs","you","topic","domain"].forEach(x=>$("#tab-"+x).classList.toggle("hide",x!==t));
  $$("#nav button").forEach(b=>b.classList.toggle("on",b.dataset.t===t));}
$$("#nav button").forEach(b=>b.onclick=()=>{clearSims();const t=b.dataset.t;showTab(t);({domains:renderDomains,labs:renderLabs,you:renderYou})[t]();window.scrollTo(0,0);});
function updateXP(){$("#xp").textContent=doneCount();}
updateXP();renderDomains();
/* sw handled by the Study hub */
</script>
</body>
</html>
