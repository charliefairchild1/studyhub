<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Aim the Throw</title>
<meta name="theme-color" content="#0d0b07">
<style>
:root{--bg:#0d0b07;--panel:#171208;--panel2:#1f1810;--ink:#efe6d2;--dim:#a99a7c;--faint:#6f6350;--gold:#d9a441;--green:#7fd39a;--red:#e8795c;--blue:#7fb0e0;--rule:#332a1c}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{height:100%;max-width:100%;overflow:hidden}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif}
a.hub{position:fixed;top:calc(env(safe-area-inset-top,0px) + 6px);left:6px;z-index:99;background:rgba(13,11,7,.85);color:var(--gold);
  border:1px solid #4a3a1c;border-radius:16px;padding:5px 10px 5px 8px;font:600 12px/1 -apple-system,system-ui,sans-serif;text-decoration:none}
#app{height:100%;display:flex;flex-direction:column;max-width:520px;margin:0 auto;
  padding:calc(env(safe-area-inset-top) + 6px) 12px calc(env(safe-area-inset-bottom) + 10px)}
/* ---- chart ---- */
.chartwrap{position:relative;flex:0 0 auto}
.chartwrap .lab{position:absolute;top:6px;left:8px;font:700 9px/1 ui-monospace,monospace;letter-spacing:2px;text-transform:uppercase;color:var(--faint)}
.chartwrap .td{position:absolute;top:6px;right:8px;font:700 11px/1 ui-monospace,monospace}
.chartwrap .td b{color:var(--green)}.chartwrap .td i{color:var(--red);font-style:normal}
canvas#chart{width:100%;height:118px;display:block;background:#0a0805;border:1px solid var(--rule);border-radius:12px}
/* ---- meters ---- */
.meters{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:8px 0}
.meter{background:var(--panel);border:1px solid var(--rule);border-radius:11px;padding:7px 6px;text-align:center;position:relative;transition:.2s}
.meter .ic{font-size:15px;line-height:1}
.meter .v{font:800 17px/1.1 ui-monospace,monospace;margin-top:2px}
.meter .k{font-size:8.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--faint);margin-top:2px}
.meter.pot .v{color:var(--blue)} .meter.cap .v{color:var(--gold)} .meter.floor .v{color:#b9d0e8} .meter.light .v{color:var(--green)}
.meter.light.low{border-color:var(--red);animation:pulse 1s infinite}
.meter.light.low .v{color:var(--red)}
@keyframes pulse{50%{background:#2a1410}}
.meter .bar{height:3px;background:#0a0805;border-radius:2px;margin-top:5px;overflow:hidden}
.meter .bar>i{display:block;height:100%;background:currentColor;transition:width .3s}
/* ---- world / omen ---- */
.world{background:var(--panel);border:1px solid var(--rule);border-radius:12px;padding:9px 11px;margin-bottom:8px}
.world .top{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--faint);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.omen{position:relative;height:22px;margin-top:7px;border-radius:11px;background:linear-gradient(90deg,#3a2016,#3a3016 45%,#163a2a);border:1px solid var(--rule);overflow:hidden}
.omen .mk{position:absolute;top:-3px;width:4px;height:26px;background:#fff;border-radius:2px;box-shadow:0 0 8px #fff;transition:left .4s}
.omen .lbl{position:absolute;top:3px;font-size:11px;font-weight:800}
.omen .lbl.l{left:8px;color:#e8a06f}.omen .lbl.r{right:8px;color:var(--green)}
.world .read{font-size:12px;color:var(--dim);margin-top:6px;min-height:16px}
.world .read b{color:var(--ink)}
.log{text-align:center;font-size:12.5px;color:var(--dim);min-height:18px;margin:2px 0 8px;font-weight:600}
.log .g{color:var(--green)}.log .r{color:var(--red)}.log .y{color:var(--gold)}
.spacer{flex:1 1 auto;min-height:0}
/* ---- actions ---- */
.acts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.act{background:var(--panel);border:1px solid var(--rule);border-radius:13px;padding:11px 5px 9px;text-align:center;cursor:pointer;position:relative;transition:.12s}
.act:active{transform:scale(.95)}
.act .ai{font-size:21px;line-height:1}
.act .an{font-size:12px;font-weight:700;margin-top:3px}
.act .ac{font-size:10px;color:var(--blue);margin-top:2px;font-family:ui-monospace,monospace}
.act .ac .lk{color:var(--faint)}
.act.dis{opacity:.34;pointer-events:none}
.act.hot{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset}
.endturn{grid-column:1/4;background:linear-gradient(135deg,var(--gold),#b9832f);color:#1a1206;border:none;border-radius:13px;
  padding:14px;font:800 15px/1 -apple-system,system-ui,sans-serif;cursor:pointer;margin-top:8px}
.endturn:active{transform:translateY(1px)}
/* ---- float deltas ---- */
.float{position:fixed;font:800 20px/1 ui-monospace,monospace;pointer-events:none;z-index:80;animation:rise 1s ease-out forwards;text-shadow:0 2px 8px #000}
@keyframes rise{0%{opacity:0;transform:translateY(6px) scale(.8)}18%{opacity:1;transform:translateY(0) scale(1.1)}100%{opacity:0;transform:translateY(-38px) scale(1)}}
/* ---- overlay screens (intro / end) ---- */
.screen{position:absolute;inset:0;background:radial-gradient(900px 600px at 60% -10%,#1c1408,#0d0b07 62%);z-index:60;
  display:flex;flex-direction:column;justify-content:center;padding:26px 24px calc(26px + env(safe-area-inset-bottom));text-align:center;overflow:auto}
.screen .eb{font:700 11px/1 ui-monospace,monospace;letter-spacing:3px;text-transform:uppercase;color:var(--faint);margin-bottom:10px}
.screen h1{font-family:"Iowan Old Style",Palatino,Georgia,serif;font-size:2.6em;font-weight:600;line-height:1.02}
.screen h1 em{font-style:italic;color:var(--gold)}
.screen h2{font-family:"Iowan Old Style",Georgia,serif;font-weight:600;color:var(--gold);font-size:1.7em;margin:4px 0}
.rules{list-style:none;margin:20px auto;max-width:340px;text-align:left;display:flex;flex-direction:column;gap:12px}
.rules li{display:flex;gap:12px;align-items:center;font-size:15px;color:#e2d7c0}
.rules li .e{font-size:24px;flex:0 0 30px;text-align:center}
.rules li b{color:var(--gold)}
.screen .btn{margin-top:22px;background:var(--gold);color:#1a1206;border:none;border-radius:14px;padding:16px 40px;font:800 17px/1 inherit;cursor:pointer;align-self:center}
.endchart{margin:14px auto;max-width:420px;width:100%}
.endchart canvas{width:100%;height:150px;background:#0a0805;border:1px solid var(--rule);border-radius:14px;display:block}
.standing{font-family:"Iowan Old Style",Georgia,serif;font-style:italic;font-size:1.9em;color:var(--gold)}
.sdesc{color:var(--dim);max-width:400px;margin:8px auto 0;font-size:15px;line-height:1.5}
.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:400px;margin:16px auto 0}
.statgrid .s{background:var(--panel);border:1px solid var(--rule);border-radius:10px;padding:9px 4px}
.statgrid .s b{display:block;font:800 18px/1 ui-monospace,monospace;color:var(--ink)}
.statgrid .s span{font-size:9.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px}
</style></head>
<body>
<a href="../index.html" class="hub">&lsaquo; Hub</a>
<div id="app">
  <div class="chartwrap"><canvas id="chart" width="600" height="236"></canvas>
    <span class="lab">your becoming</span><span class="td" id="td"></span></div>
  <div class="meters" id="meters"></div>
  <div class="world" id="world"></div>
  <div class="log" id="log">&nbsp;</div>
  <div class="spacer"></div>
  <div class="acts" id="acts"></div>
</div>
<div class="screen" id="screen"></div>

<script>
/* ================= AIM THE THROW — a build/survival game =================
   The mechanics ARE the philosophy:
   • Light bleeds every turn → playing safe kills you (minimize surprise = the dark room)
   • Read the shifting world (predict) → the informative gamble is how you grow
   • Capacity compounds (trajectory > local reward)
   • Floor unlocks bold Leaps and absorbs ruin (floor the downside → boldness)
   • The chart is your trajectory; the end integrates it into your "direction"
==========================================================================*/
const A=id=>document.getElementById(id);
let G;
function fresh(){ return {
  turn:1, maxTurn:14,
  pot:4, cap:1.0, floor:0, light:10, lightMax:16,
  T:0, D:0, hist:[0],
  regime: Math.random()<0.5?'exp':'harsh', revealed:false, insight:0,
  st:{venture:0,leap:0,build:0,fortify:0,steady:0,land:0,miss:0}, dead:false, cause:''
}; }

const ACTS=[
  {k:'steady', ic:'🌾', n:'Steady', cost:1, need:0},
  {k:'venture',ic:'🎲', n:'Venture',cost:2, need:0},
  {k:'build',  ic:'✦', n:'Build',  cost:2, need:0},
  {k:'fortify',ic:'🛡', n:'Fortify',cost:2, need:0},
  {k:'leap',   ic:'🚀', n:'Leap',   cost:4, need:3},
];

function potPerTurn(){ return 4 + Math.round((G.cap-1)*3); }
function omenP(){ // displayed probability the world is EXPANSIVE
  const conf=Math.min(0.9, 0.58 + G.insight*0.04);
  if(G.revealed) return G.regime==='exp'?1:0;
  const base = G.regime==='exp'?conf:1-conf;
  return Math.max(0.05,Math.min(0.95, base));
}

/* ---------------- rendering ---------------- */
function render(){
  // meters
  const M=[
    {c:'pot', ic:'⚡', v:G.pot, k:'Potential', bar:G.pot/8},
    {c:'cap', ic:'✦', v:G.cap.toFixed(1), k:'Capacity', bar:(G.cap-1)/3},
    {c:'floor',ic:'🛡',v:G.floor, k:'Floor', bar:G.floor/8},
    {c:'light',ic:'◐', v:G.light, k:'Light', bar:G.light/G.lightMax},
  ];
  A('meters').innerHTML=M.map(m=>`<div class="meter ${m.c} ${m.c==='light'&&G.light<=3?'low':''}">
    <div class="ic">${m.ic}</div><div class="v">${m.v}</div><div class="k">${m.k}</div>
    <div class="bar"><i style="width:${Math.max(0,Math.min(1,m.bar))*100}%"></i></div></div>`).join('');
  // world / omen
  const p=omenP();
  A('world').innerHTML=`<div class="top"><span>Turn ${G.turn} / ${G.maxTurn}</span><span>${G.revealed?'READ ✓':'omen · '+Math.round(p*100)+'% ☀'}</span></div>
    <div class="omen"><span class="lbl l">⛈ harsh</span><span class="lbl r">expansive ☀</span>
      <span class="mk" style="left:${6+p*(88)}%"></span></div>
    <div class="read">${G.revealed
      ? (G.regime==='exp'?'The world is <b style="color:var(--green)">expansive</b> — ventures thrive.':'The world is <b style="color:var(--red)">harsh</b> — ventures fail.')
      : 'Scout with a Venture to <b>read</b> the world before you Leap.'}</div>`;
  // actions
  A('acts').innerHTML=ACTS.map(a=>{
    const locked=a.need&&G.floor<a.need, poor=G.pot<a.cost, dis=locked||poor;
    const hot = a.k==='leap' && G.revealed && G.regime==='exp' && !dis;
    return `<div class="act ${dis?'dis':''} ${hot?'hot':''}" data-k="${a.k}">
      <div class="ai">${a.ic}</div><div class="an">${a.n}</div>
      <div class="ac">⚡${a.cost}${a.need?` <span class="lk">🛡${a.need}</span>`:''}</div></div>`;
  }).join('') + `<button class="endturn" id="end">End turn ▸ &nbsp;<span style="opacity:.7;font-weight:700">−1 ◐</span></button>`;
  document.querySelectorAll('.act:not(.dis)').forEach(b=>b.onclick=e=>act(b.dataset.k,e));
  A('end').onclick=endTurn;
  drawChart('chart', G.hist);
  A('td').innerHTML=`<b>${Math.round(G.T)}</b> · <i>${Math.round(G.D)}</i>`;
}

function floatDelta(txt,color,x,y){
  const f=document.createElement('div'); f.className='float'; f.textContent=txt; f.style.color=color;
  f.style.left=(x-14)+'px'; f.style.top=(y-10)+'px'; document.body.appendChild(f);
  setTimeout(()=>f.remove(),1000);
}
function popAt(sel,txt,color){ const el=document.querySelector(sel); if(!el){return;} const r=el.getBoundingClientRect();
  floatDelta(txt,color,r.left+r.width/2,r.top+r.height/2); }

/* ---------------- actions ---------------- */
function commitT(amt){ G.T+=amt; G.hist.push(Math.round(G.T-G.D)); }
function commitD(amt){ G.D+=amt; G.hist.push(Math.round(G.T-G.D)); }
function setLight(dl){ G.light=Math.max(0,Math.min(G.lightMax,G.light+dl)); }

function act(k,e){
  const a=ACTS.find(x=>x.k===k); if(!a||G.pot<a.cost) return;
  if(a.need && G.floor<a.need) return;
  G.pot-=a.cost;
  let log='';
  if(k==='steady'){ const g=Math.round(2*G.cap); commitT(g); G.st.steady++;
    popAt('.meter.pot',`+${g}`,'var(--green)'); log=`🌾 Steady <span class="g">+${g}</span>`; }
  else if(k==='build'){ G.cap=Math.round((G.cap+0.3)*10)/10; G.st.build++;
    popAt('.meter.cap','+.3','var(--gold)'); log=`✦ Capacity now <span class="y">×${G.cap.toFixed(1)}</span>`; }
  else if(k==='fortify'){ G.floor+=2; G.st.fortify++;
    popAt('.meter.floor','+2','#b9d0e8'); log=`🛡 Floor <span class="y">+2</span>`; }
  else if(k==='venture'){ G.st.venture++; G.revealed=true; G.insight++;
    if(G.regime==='exp'){ const g=Math.round(6*G.cap); commitT(g); setLight(2); G.st.land++;
      popAt('.meter.pot',`+${g}`,'var(--green)'); log=`🎲 ☀ Venture landed <span class="g">+${g}</span> · <span class="g">+2◐</span>`; }
    else { commitD(4); setLight(-1); G.st.miss++;
      popAt('.meter.pot','−4','var(--red)'); log=`🎲 ⛈ Venture failed <span class="r">+4 waste</span> · but you learned`; } }
  else if(k==='leap'){ G.st.leap++; G.revealed=true; G.insight++;
    if(G.regime==='exp'){ const g=Math.round(14*G.cap); commitT(g); setLight(3); G.st.land++;
      popAt('.chartwrap',`+${g}`,'var(--green)'); log=`🚀 ☀ LEAP <span class="g">+${g}</span> · <span class="g">+3◐</span>`; }
    else { const dmg=10, absorbed=Math.min(G.floor,dmg), net=dmg-absorbed; G.floor-=absorbed;
      commitD(net); setLight(-Math.ceil(net/2.5)); G.st.miss++;
      popAt('.chartwrap',`−${net}`,'var(--red)');
      log=`🚀 ⛈ LEAP into ruin — floor absorbed <span class="y">${absorbed}</span>, <span class="r">+${net} waste</span>`; } }
  A('log').innerHTML=log||'&nbsp;';
  if(G.light<=0){ return end('dark'); }
  render();
}

function endTurn(){
  setLight(-1);
  if(G.light<=0){ return end('dark'); }
  if(G.turn>=G.maxTurn){ return end('survive'); }
  G.turn++; G.pot=potPerTurn(); G.revealed=false;
  if(Math.random()<0.32) G.regime = G.regime==='exp'?'harsh':'exp'; // non-stationary
  A('log').innerHTML='&nbsp;';
  render();
}

/* ---------------- chart ---------------- */
function drawChart(id,hist){
  const cv=A(id); if(!cv)return; const x=cv.getContext('2d'),W=cv.width,H=cv.height;
  x.clearRect(0,0,W,H);
  const pts=hist.length?hist:[0]; const mn=Math.min(0,...pts), mx=Math.max(1,...pts);
  const PADL=6, PADR=8;
  const X=i=>PADL+ i/(Math.max(1,pts.length-1))*(W-PADL-PADR), Y=v=>H-14-((v-mn)/((mx-mn)||1))*(H-28);
  x.strokeStyle='#241d12';x.lineWidth=1;x.beginPath();x.moveTo(0,Y(0));x.lineTo(W,Y(0));x.stroke();
  // fill
  const grad=x.createLinearGradient(0,0,0,H); grad.addColorStop(0,'rgba(217,164,65,.22)');grad.addColorStop(1,'rgba(217,164,65,0)');
  x.beginPath();x.moveTo(X(0),Y(0));pts.forEach((v,i)=>x.lineTo(X(i),Y(v)));x.lineTo(X(pts.length-1),Y(0));x.closePath();x.fillStyle=grad;x.fill();
  x.strokeStyle='#d9a441';x.lineWidth=2.4;x.lineJoin='round';x.beginPath();
  pts.forEach((v,i)=>{i?x.lineTo(X(i),Y(v)):x.moveTo(X(i),Y(v));});x.stroke();
  const lv=pts[pts.length-1]; x.fillStyle=lv>=0?'#7fd39a':'#e8795c';
  x.beginPath();x.arc(X(pts.length-1),Y(lv),3.4,0,7);x.fill();
}

/* ---------------- screens ---------------- */
function showScreen(html){ const s=A('screen'); s.innerHTML=html; s.style.display='flex'; }
function hideScreen(){ A('screen').style.display='none'; }

function intro(){
  showScreen(`<div class="eb">a game of poiesis</div>
    <h1>Aim the <em>Throw</em></h1>
    <ul class="rules">
      <li><span class="e">◐</span><div>Your <b>Light</b> drops every turn. Sit still and you die in the dark. <b>Make</b> to stay alive.</div></li>
      <li><span class="e">🎲</span><div><b>Venture</b> to read the shifting world, then grow from the gamble. Safe play slowly bleeds out.</div></li>
      <li><span class="e">✦</span><div><b>Build</b> capacity — it compounds. The best move improves your <i>future</i> moves.</div></li>
      <li><span class="e">🚀</span><div><b>Floor</b> the downside to unlock the big <b>Leap</b> — and to survive it when the world turns harsh.</div></li>
    </ul>
    <div style="color:var(--faint);font-size:13px">The line at the top is your becoming. No score to beat — only its shape.</div>
    <button class="btn" id="play">Throw ▸</button>`);
  A('play').onclick=()=>{ G=fresh(); hideScreen(); render(); };
}

function end(kind){
  G.dead = kind==='dark';
  const ratio = G.T/(G.T+G.D||1);
  const bold = G.st.venture+G.st.leap;
  const built = G.st.build;
  const rising = G.hist.length>3 && G.hist[G.hist.length-1] > G.hist[Math.floor(G.hist.length/2)];
  let meta, standing, sdesc;
  if(kind==='dark'){
    standing = 'The Dark Room';
    sdesc = G.st.steady>bold
      ? 'You minimized surprise until the light went out. A perfectly safe life isn’t peace — it’s slow suffocation.'
      : 'You overreached without a floor beneath you. Boldness without a floor isn’t courage; it’s a gamble with the rent.';
    meta='—';
  } else {
    if(bold>=6 && built>=2 && ratio>0.6){ meta='the child'; }
    else if(bold>=4){ meta='the lion'; }
    else { meta='the camel'; }
    if(ratio>0.66 && rising){ standing='The Maker'; sdesc='Construction outran waste across the whole arc — you forged, you compounded, you gave the throw its aim.'; }
    else if(ratio>0.55){ standing='The Channel'; sdesc='More was made through you than was lost. The throw was aimed, if not always far.'; }
    else if(ratio>0.45){ standing='The Wanderer'; sdesc='Making and waste in rough balance — a trajectory still finding its shape.'; }
    else { standing='The Dissipator'; sdesc='Much was moved; less was built. Motion is not the same as making.'; }
  }
  showScreen(`<div class="eb">${kind==='dark'?'the light went out · turn '+G.turn:'the field · you survived'}</div>
    <div class="standing">${standing}</div>
    <div class="sdesc">${sdesc}</div>
    <div class="endchart"><canvas id="echart" width="600" height="300"></canvas></div>
    <div class="sdesc" style="color:var(--gold);font-style:italic">Your metamorphosis: ${meta}</div>
    <div class="statgrid">
      <div class="s"><b>${Math.round(G.T)}</b><span>transform</span></div>
      <div class="s"><b>${Math.round(G.D)}</b><span>dissipate</span></div>
      <div class="s"><b>×${G.cap.toFixed(1)}</b><span>capacity</span></div>
      <div class="s"><b>${G.st.land}</b><span>bets landed</span></div>
      <div class="s"><b>${G.st.build}</b><span>built</span></div>
      <div class="s"><b>${G.turn}</b><span>turns</span></div>
    </div>
    <button class="btn" id="again">Throw again ▸</button>`);
  drawChart('echart', G.hist);
  A('again').onclick=()=>{ G=fresh(); hideScreen(); render(); };
}

intro();
</script>
</body></html>
