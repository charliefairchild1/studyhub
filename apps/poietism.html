<style>

*{box-sizing:border-box;margin:0;padding:0}

.fcard:hover{border-color:var(--accent)}

.count{color:var(--faint);margin-top:14px;font-size:.85em}
a.link{color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--accent)}
.legend{color:var(--faint);font-size:.8em;margin-left:auto;display:flex;gap:14px;align-items:center}

.pad{position:relative;width:100%;max-width:340px;aspect-ratio:1;margin:0 auto;background:radial-gradient(circle at 72% 26%,#241d10,#14110b);border:1px solid var(--rule);border-radius:12px;touch-action:none;cursor:crosshair;overflow:hidden}
.pad .axis{position:absolute;color:var(--faint);font-size:.68em;text-transform:uppercase;letter-spacing:1px;pointer-events:none}

.dot2{position:absolute;width:18px;height:18px;border-radius:50%;background:var(--accent);border:2px solid #fff;transform:translate(-50%,-50%);box-shadow:0 0 14px var(--accent);pointer-events:none}
.readout{margin-top:16px;color:#e6d9bf;text-align:center;min-height:2.6em;line-height:1.5}
.readout b{color:var(--accent)}
.specbar{position:relative;height:54px;border-radius:10px;margin:14px 0 8px;cursor:ew-resize;touch-action:none;background:linear-gradient(90deg,#0f2cff,#0092e0,#00c2c2,#00cf7a,#3ad100)}
.specdiv{position:absolute;top:-7px;bottom:-7px;width:3px;background:#fff;box-shadow:0 0 8px #000;transform:translateX(-50%)}

<body>
<header>
  <h1>The <span class="a">Study</span></h1>
  <div class="tag">Philosophy · science · evolution · logic — and where <b>Poietism</b>, your philosophy, sits inside all of it.</div>
</header>
<nav id="nav"></nav>
<main id="main"></main>

<div class="modal" id="modal" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet"></div>
</div>

<script>
/* ---------------- DATA ---------------- */
const D_PHIL='phil',D_SCI='sci',D_LOGIC='logic';
const THINKERS=[
 {n:'Heraclitus',era:'c. 500 BCE · Presocratic',school:'Process / flux',dom:D_PHIL,
  td:'Reality is ceaseless change; the world an ever-living fire; time a child at play.',
  ideas:['You cannot step in the same river twice — all things flow','The logos: a hidden order in the flux','Strife and tension are the source of all things','Fr. B52: time is a child playing draughts; the kingdom is the child’s'],
  lens:'The direct ancestor of Poietism. Reality as becoming rather than being; uncertainty as generative rather than defective; the playing child = the wager affirmed without guilt. The book’s epigraph is his.'},
 {n:'Parmenides',era:'c. 475 BCE · Eleatic',school:'Being / monism',dom:D_PHIL,
  td:'Being is one, whole, unchanging; change and plurality are illusions of the senses.',
  ideas:['What is, is; what is not, cannot be','Change is logically impossible','Trust reason over the deceiving senses'],
  lens:'The anti-Poietist pole. Parmenides is the patron of the changeless "sure thing." Poietism takes Heraclitus’ side of this 2,500-year-old quarrel: becoming is real, being is the slow case.'},
 {n:'Plato',era:'c. 380 BCE · Classical',school:'Idealism',dom:D_PHIL,
  td:'Behind the shifting world of appearances lie eternal, perfect, changeless Forms.',
  ideas:['The Theory of Forms','The allegory of the cave','Knowledge as recollection','The tripartite soul'],
  lens:'Patron of the "controller" stance — prefer the eternal and certain over the risky flux. Poietism inverts the priority: the shadow-world of becoming is the real one, and the sure Form is the wish.'},
 {n:'Aristotle',era:'c. 350 BCE · Classical',school:'Empiricism',dom:D_PHIL,
  td:'Knowledge grows from observing the world; things move from potential to actual.',
  ideas:['Potentiality → actuality','The four causes','The golden mean','Founder of formal logic'],
  lens:'Potentiality→actuality directly prefigures PTO: Potential → Transformation → Output. Ally on becoming — though Poietism drops his fixed final cause (the guaranteed telos) for an open trajectory.'},
 {n:'Epicurus',era:'c. 300 BCE · Hellenistic',school:'Atomism',dom:D_PHIL,
  td:'The world is atoms and void; happiness is tranquil pleasure; death is nothing to us.',
  ideas:['The clinamen — atoms randomly "swerve"','Pleasure as absence of pain (ataraxia)','Free will from indeterminacy','Death is nothing to fear'],
  lens:'The clinamen — chance built into physics itself — is an ancient ancestor of "uncertainty is fundamental, not a measurement error." Randomness makes room for freedom.'},
 {n:'The Stoics',era:'c. 300 BCE–180 CE',school:'Stoicism',dom:D_PHIL,
  td:'Live according to nature; master what is in your control; accept the rest.',
  ideas:['The dichotomy of control','Amor fati — love your fate','Virtue as the only true good','The cosmos as rational order (logos)'],
  lens:'The root of "affirm the throw." Poietism keeps the affirmation but refuses the resignation: you affirm fate AND aim it. Not "accept what comes" — "want it, then bend it toward building."'},
 {n:'The Skeptics',era:'c. 300 BCE · Pyrrho',school:'Skepticism',dom:D_PHIL,
  td:'Certainty is unreachable; suspend judgment (epochē) and find peace in doubt.',
  ideas:['Nothing can be known for certain','Suspend judgment on all claims','Tranquility follows from letting go of dogma'],
  lens:'The fallibilist streak. Poietism agrees certainty is unreachable — but does not stop there. You still must bet. Hold beliefs loosely, then place them anyway.'},
 {n:'Augustine',era:'c. 400 CE · Patristic',school:'Christian Platonism',dom:D_PHIL,
  td:'The restless inner self, memory and time, the will divided against itself.',
  ideas:['Time exists in the mind (past/present/future as memory, attention, expectation)','Original sin and the divided will','The City of God vs the City of Man'],
  lens:'The cosmic ledger. Sin as a debt owed — the same knot of guilt-and-debt (German Schuld = both) the book turns on when it explains why we feel we owe the universe.'},
 {n:'Thomas Aquinas',era:'c. 1270 · Scholastic',school:'Scholasticism',dom:D_PHIL,
  td:'A vast synthesis of Aristotle and Christianity into one ordered, rational cosmos.',
  ideas:['The Five Ways (arguments for God)','Natural law','Faith and reason as compatible','Being as a hierarchy'],
  lens:'The great systematizer of a fixed cosmic order — the closed, guaranteed universe Poietism trades in for an open, unfinished one where the dice are still rolling.'},
 {n:'René Descartes',era:'1637 · Early Modern',school:'Rationalism',dom:D_PHIL,
  td:'Doubt everything, and find one thing you cannot doubt: that you are thinking.',
  ideas:['Cogito, ergo sum','Method of radical doubt','Mind–body dualism','Certainty as the foundation of knowledge'],
  lens:'The arch-controller: the dream of an indubitable foundation. Poietism denies the foundation exists — there is no bedrock certainty to stand on. We build, and bet, on shifting ground.'},
 {n:'Baruch Spinoza',era:'1677 · Early Modern',school:'Rationalism',dom:D_PHIL,
  td:'God and Nature are one substance; everything follows by strict necessity.',
  ideas:['Deus sive Natura (God, i.e. Nature)','Strict determinism','Freedom = understanding necessity','Sub specie aeternitatis'],
  lens:'A determinist — yet his "acquiescence in necessity" is a rigorous amor fati. To understand what must be, and to affirm it, is the Stoic-Nietzschean thread Poietism inherits.'},
 {n:'Blaise Pascal',era:'1670 · Early Modern',school:'Fideism',dom:D_PHIL,
  td:'Reason has limits; the heart has reasons; and belief itself is a bet.',
  ideas:['Pascal’s Wager','"The heart has its reasons…"','The thinking reed','Co-founder of probability theory'],
  lens:'Literally the wager. Belief modeled as a bet under uncertainty, weighing stakes against odds — the decision-theoretic skeleton of Poietism, and its patron saint.'},
 {n:'David Hume',era:'1739 · Enlightenment',school:'Empiricism',dom:D_PHIL,
  td:'Reason serves the passions; causation is habit; the self is a bundle of moments.',
  ideas:['"Reason is, and ought only to be, the slave of the passions"','The problem of induction','Causation as habitual expectation, not necessity','The bundle theory of the self'],
  lens:'Central ally. Reason as the servant of the drives (= reason is the gambler’s tool), and induction as a wager we can never justify but must make. Hume is Poietism’s epistemic backbone.'},
 {n:'Immanuel Kant',era:'1781 · Enlightenment',school:'Transcendental idealism',dom:D_PHIL,
  td:'The mind actively structures experience; we never see the thing-in-itself.',
  ideas:['The synthetic a priori','The categories of understanding','The phenomenal vs the noumenal','The categorical imperative'],
  lens:'Half-ally, half-rival. Poietism keeps "the mind structures experience" (this is predictive processing avant la lettre) but drops Kant’s guarantee of certainty — the structure is a best guess, not a fixed a priori.'},
 {n:'G.W.F. Hegel',era:'1807 · German Idealism',school:'Dialectics',dom:D_PHIL,
  td:'Reality and reason unfold historically through contradiction and resolution.',
  ideas:['The dialectic (thesis / antithesis / synthesis)','Spirit (Geist) realizing itself in history','Becoming as fundamental','The cunning of reason'],
  lens:'Process ally — reality as dynamic becoming, driven by tension (echoing Heraclitus). But Poietism rejects the guaranteed destination: there is no Absolute waiting at the end to redeem the throws.'},
 {n:'Arthur Schopenhauer',era:'1818 · Post-Kantian',school:'Voluntarism',dom:D_PHIL,
  td:'Beneath the world of appearance drives a blind, striving, insatiable Will.',
  ideas:['The World as Will and Representation','The intellect as servant of the will','Life as suffering driven by endless wanting','Aesthetic and ascetic escape'],
  lens:'Names the beast beneath reason. The Will is the driver; the intellect its instrument — the direct precursor to "reason is the gambler’s tool, not its master."'},
 {n:'Friedrich Nietzsche',era:'1883 · 19th c.',school:'Existentialism / vitalism',dom:D_PHIL,
  td:'God is dead; affirm this life, this fate, the whole roll of the dice, and create.',
  ideas:['Amor fati — love of fate','The three metamorphoses: camel, lion, child','Eternal recurrence','The innocence of becoming','The will to power'],
  lens:'THE central ancestor. The camel bears the ledger, the lion says No, the child plays and throws the dice without guilt — the exact arc of a gambling mind that builds a cage to escape the wager, then throws off the cage to choose the wager again, with open eyes.'},
 {n:'Søren Kierkegaard',era:'1843 · 19th c.',school:'Existentialism',dom:D_PHIL,
  td:'Truth is subjective; the deepest commitments require a leap beyond proof.',
  ideas:['The leap of faith','Anxiety as "the dizziness of freedom"','The three stages: aesthetic, ethical, religious','Subjectivity as truth'],
  lens:'The wager as existential leap. Where reason runs out, you must commit under irreducible uncertainty — the felt inside of placing a bet you cannot verify first.'},
 {n:'Charles S. Peirce',era:'1878 · Pragmatism',school:'Pragmatism',dom:D_PHIL,
  td:'Meaning lies in practical effects; all knowledge is fallible and self-correcting.',
  ideas:['Pragmatism (meaning = practical consequences)','Fallibilism','Abduction — inference to the best explanation','Truth as the limit of inquiry'],
  lens:'Fallibilism + abduction (inference to the best bet). Truth is a long wager settled, if ever, by the community of inquiry running the experiment — knowledge as unrefuted, provisional bets.'},
 {n:'William James',era:'1896 · Pragmatism',school:'Pragmatism',dom:D_PHIL,
  td:'Ideas are true if they work; sometimes we’re entitled to believe ahead of proof.',
  ideas:['"The Will to Believe"','Truth as what "works"','Radical empiricism','The stream of consciousness'],
  lens:'"The Will to Believe" is Poietism almost by name: when the stakes are real and the choice is forced, belief is a wager you are entitled to place before the evidence is in.'},
 {n:'A.N. Whitehead',era:'1929 · 20th c.',school:'Process philosophy',dom:D_PHIL,
  td:'Reality is made of events and processes, not enduring substances.',
  ideas:['Process philosophy','"Actual occasions" of experience','Reality as becoming, not being','The fallacy of misplaced concreteness'],
  lens:'The metaphysics of becoming, fully systematized. A "thing" is a slow process; Poietism’s claim that a rock is a transformation winning against dissipation is pure Whitehead.'},
 {n:'Ludwig Wittgenstein',era:'1921 / 1953',school:'Analytic',dom:D_PHIL,
  td:'The limits of my language are the limits of my world; meaning is use.',
  ideas:['"Whereof one cannot speak, thereof one must be silent"','Language games','Meaning as use','Family resemblance'],
  lens:'Marks where the sure statement runs out. Past the edge of what can be said with certainty, we don’t know — we act, which is a form of betting.'},
 {n:'Karl Popper',era:'1959 · Phil. of science',school:'Critical rationalism',dom:D_PHIL,
  td:'Science advances by bold conjectures exposed to the risk of refutation.',
  ideas:['Falsifiability as the mark of science','Conjecture and refutation','No verification, only failed falsification','The open society'],
  lens:'Science as disciplined betting. A bold conjecture is a wager; the experiment is the residual that can bust it. Knowledge is the set of bets reality hasn’t refuted yet — hold them, keep testing.'},
 {n:'Sartre & Camus',era:'1943–1951 · 20th c.',school:'Existentialism / absurdism',dom:D_PHIL,
  td:'In a universe without given meaning, we are radically free — and must choose anyway.',
  ideas:['Existence precedes essence','Radical freedom and responsibility','The Absurd','Revolt: "one must imagine Sisyphus happy"'],
  lens:'Affirming a meaningless world and choosing anyway — amor fati without God. Camus’ revolt is exactly "aim the throw" inside an indifferent universe: no guaranteed meaning, so make one by how you bet.'},
 {n:'Charles Darwin',era:'1859 · 19th c.',school:'Evolutionary biology',dom:D_SCI,
  td:'Life’s diversity arises from heritable variation filtered by natural selection.',
  ideas:['Natural selection','Descent with modification','Variation + selection over deep time','Sexual selection'],
  lens:'The engine that built the betting animal. Variation = the throws of the dice; selection = the residual, quietly keeping the winners. Evolution is nature gambling with lives across deep time.'},
 {n:'Stephen Jay Gould',era:'1989 · 20th c.',school:'Evolutionary theory',dom:D_SCI,
  td:'Rewind the tape of life and it plays out utterly differently — contingency rules.',
  ideas:['Contingency ("replay the tape")','Punctuated equilibrium','Spandrels (byproducts, not adaptations)','The improbability of any given outcome'],
  lens:'Contingency = deep uncertainty inside evolution itself. "Replay the tape, get something else" means there is no guaranteed direction — the exact spirit of PTO’s trajectory-not-destiny, and of the Fermi chapter.'},
 {n:'François Jacob',era:'1977 · Molecular biology',school:'Evolutionary biology',dom:D_SCI,
  td:'Evolution is a tinkerer, not an engineer — it builds by addition from what’s at hand.',
  ideas:['Evolution as bricolage (tinkering)','Builds by co-opting existing parts','Cannot design from scratch, only modify','Constraint of history on form'],
  lens:'The source of your additive-not-subtractive insight. Evolution adds and re-purposes; it can only slowly fade what it no longer needs, never cleanly delete — the snake’s buried leg bones, and the human gambling drive that no law can remove, only redirect.'},
 {n:'Kahneman & Tversky',era:'1979 · 20th c.',school:'Behavioral science',dom:D_SCI,
  td:'Human judgment under uncertainty runs on fast heuristics — and predictable biases.',
  ideas:['Heuristics and biases','Prospect theory','Loss aversion','System 1 / System 2 thinking'],
  lens:'The empirical map of how the betting animal actually bets — and systematically misjudges risk (loss aversion, the gambler’s fallacy). This is the messy hardware any Poietist ethics or economics (Koin) must design around, not wish away.'},
 {n:'Friston & Clark',era:'2010s · Contemporary',school:'Cognitive science',dom:D_SCI,
  td:'The brain is a prediction machine that acts to minimize its own surprise.',
  ideas:['The free-energy principle','Predictive processing','Perception as "controlled hallucination"','Active inference'],
  lens:'The scientific spine of "the animal that bets." Mind = predictor; perception = a hallucination reined in by the senses; learning happens at the residual, the gap between forecast and fact. Poietism’s epistemology is this, made into an ethics.'},

const IDEAS=[
 {t:'Becoming, not Being',who:'Heraclitus · Hegel · Whitehead',
  d:'The oldest quarrel in philosophy: is reality fundamentally a set of fixed things (being), or a flow of processes (becoming)? Parmenides and Plato chose being — the changeless behind the changing. Heraclitus chose becoming — flux all the way down.',

function renderAle(){
  main.innerHTML=`<div class="reading">
    <div class="serif" style="font-size:1.15em;color:var(--dim);font-style:italic;margin-bottom:26px">Your philosophy — the affirmed wager. The descriptive case is the book <em>The Animal That Bets</em>; this is its prescriptive half. <a class="link" href="paper.html">Read the full paper →</a></div>
    <h2>The one line</h2>
    <p class="serif" style="font-size:1.3em;color:var(--ink)">We are the animal that bets. Poietism is the decision to bet <em style="color:var(--accent)">well</em>.</p>
    <h2>Three stances, one choice</h2>
    <div class="pill"><div class="big">1</div><div><div class="t">The fatalist</div><div class="s">The dice decide, so nothing matters. — surrenders.</div></div></div>
    <div class="pill"><div class="big">2</div><div><div class="t">The controller</div><div class="s">The dice must be abolished, so nothing is risked. — suffocates.</div></div></div>
    <div class="pill" style="border-color:var(--accent)"><div class="big">3</div><div><div class="t" style="color:var(--accent)">The Poietist</div><div class="s">Affirm the throw — and aim it.</div></div></div>
    <h2>The four commitments</h2>
    <p><b style="color:var(--accent)">Affirm the wager.</b> Want the uncertain over the certain; the certain is the silent room where nothing new can happen. Boredom in the safe and sated is a predictor with nothing left to bet on.</p>
    <p><b style="color:var(--accent)">Bet constructively.</b> The instinct is fixed; only its object is a choice. Aim the appetite for high-variance reward at building, making, healing, discovering — and starve the channels that fire the same circuit while producing nothing. Measure by PTO: transformation over dissipation.</p>
    <p><b style="color:var(--accent)">Floor the downside.</b> An animal that can lose everything is forced into paralysis or desperation. Guarantee the floor and you turn a frightened maximizer into a creature that can take the productive risks a cage never allows.</p>
    <p><b style="color:var(--accent)">Redirect; don’t abolish.</b> Evolution is a tinkerer — it adds and fades, never cleanly deletes. The snake keeps its buried leg bones; we keep the gambling drive. You cannot legislate an instinct away. You can only aim it somewhere better.</p>
    <h2>Where it comes from</h2>
    <p>Heraclitus (the playing child, the flux) · the Stoics & Nietzsche (amor fati, the throw of the dice) · Pascal & James (belief as a wager) · Hume (reason as the servant of the drives) · Popper (knowledge as unrefuted conjecture) · and the sciences — Darwin, Gould, Jacob, and the predictive-processing picture of the mind. See the <b>Thinkers</b> and <b>Big Ideas</b> tabs; each carries an Poietism lens.</p>
    <h2>What it is not</h2>
    <p>Not nihilism (you choose which way to aim the throw). Not recklessness (you floor the downside). Not a fantasy of control (you befriend uncertainty, not abolish it). Not relativism (bets can be better or worse, and the residual — reality’s answer — is the judge).</p>
  </div>`;
}

/* study / flashcards */
let deck=[],di=0,flipped=false;
function buildDeck(){
  deck=[];
  THINKERS.forEach(t=>{deck.push({q:t.n,a:t.td+'\n\n◈ '+t.lens,tag:t.era});
    deck.push({q:t.ideas[0],a:'— '+t.n+' ('+t.school+')',tag:t.era});});
  IDEAS.forEach(x=>deck.push({q:x.t,a:x.d.replace(/<[^>]+>/g,''),tag:x.who}));
  // shuffle (index-based, deterministic-ish)
  for(let i=deck.length-1;i>0;i--){const j=(i*7+3)%(i+1);[deck[i],deck[j]]=[deck[j],deck[i]];}
}
function renderStudy(){
  if(!deck.length)buildDeck();
  const c=deck[di];
  main.innerHTML=`<div class="flash">
    <div class="fcard" onclick="flip()">
      <div class="q">${esc(c.q)}</div>
      ${flipped?`<div class="a">${esc(c.a).replace(/\n/g,'<br>')}</div>`:`<div class="hint">tap to reveal</div>`}
    </div>
    <div class="fbtns">
      <button onclick="prevC(event)">← Prev</button>
      <button onclick="flip(event)">${flipped?'Hide':'Reveal'}</button>
      <button onclick="nextC(event)">Next →</button>
    </div>
    <div class="count">Card ${di+1} of ${deck.length} · ${esc(c.tag||'')}</div>
    <div style="color:var(--faint);font-size:.8em;margin-top:8px">A shuffled deck drawn from every thinker and idea. Recall first, then reveal.</div>
  </div>`;
}
function flip(e){if(e)e.stopPropagation();flipped=!flipped;renderStudy();}
function nextC(e){if(e)e.stopPropagation();di=(di+1)%deck.length;flipped=false;renderStudy();}
function prevC(e){if(e)e.stopPropagation();di=(di-1+deck.length)%deck.length;flipped=false;renderStudy();}
document.addEventListener('keydown',e=>{if(tab!='study')return;if(e.key==' '||e.key=='Enter'){e.preventDefault();flip();}if(e.key=='ArrowRight')nextC();if(e.key=='ArrowLeft')prevC();});

      <div class="readout" id="hread"></div>
    </div>

    <div class="idea" style="border-color:var(--accent)"><p class="fit" style="border:none;padding:0;color:#e6d9bf"><b style="color:var(--accent)">The Poietism lens.</b> A category is a <b>bet</b> — a compression the predicting mind lays over a continuous world because boxes are cheaper to act on than a gradient. Often a good bet (<em>predator</em>, <em>food</em>, <em>cliff-edge</em>). But it is a wager, not a joint of reality — and the deep error is forgetting we drew the line, then treating the map’s border as a fact of the territory: races, diagnoses, "natural kinds," the sharp names we give a feeling. Hold every border as loosely as every other bet, and redraw it the moment the world stops respecting your boxes.</p></div>
  </div>`;
  const pad=document.getElementById('pad');let drag=false;
  const emove=ev=>{const r=pad.getBoundingClientRect();let fx=(ev.clientX-r.left)/r.width,fy=(ev.clientY-r.top)/r.height;fx=Math.max(0,Math.min(1,fx));fy=Math.max(0,Math.min(1,fy));emoV=fx;emoAr=1-fy;const d=document.getElementById('edot');d.style.left=fx*100+'%';d.style.top=fy*100+'%';updEmo();};
  pad.addEventListener('pointerdown',e=>{drag=true;pad.setPointerCapture(e.pointerId);emove(e);});
  pad.addEventListener('pointermove',e=>{if(drag)emove(e);});
  pad.addEventListener('pointerup',()=>drag=false);pad.addEventListener('pointercancel',()=>drag=false);
  const spec=document.getElementById('spec');let sdrag=false;
  const smove=ev=>{const r=spec.getBoundingClientRect();let p=(ev.clientX-r.left)/r.width;p=Math.max(0,Math.min(1,p));colDiv=p*100;document.getElementById('sdiv').style.left=colDiv+'%';updSpec();};
  spec.addEventListener('pointerdown',e=>{sdrag=true;spec.setPointerCapture(e.pointerId);smove(e);});
  spec.addEventListener('pointermove',e=>{if(sdrag)smove(e);});
  spec.addEventListener('pointerup',()=>sdrag=false);spec.addEventListener('pointercancel',()=>sdrag=false);
  updEmo();updSpec();updHeap(heapN);
}
function updEmo(){
  const d=EMO_A.map(a=>({n:a.n,dist:Math.hypot(a.x-emoV,a.y-emoAr)})).sort((p,q)=>p.dist-q.dist);
  EMO_A.forEach((a,i)=>{const el=document.getElementById('an'+i);if(el)el.classList.toggle('near',a.n==d[0].n||a.n==d[1].n);});
  const gap=d[1].dist-d[0].dist;
  const el=document.getElementById('eread');if(!el)return;
  el.innerHTML=(d[0].dist<0.10&&gap>0.10)
    ? `Squarely <b>${d[0].n}</b> — a clear region. Now drag toward its edge and watch the name lose its grip.`
    : `You’d call this <b>${d[0].n}</b> … but you’re nearly as close to <b>${d[1].n}</b>. Same body-state, two words — the border between them is a name, not a wall.`;
}
function updSpec(){
  const p=colDiv,el=document.getElementById('sread');if(!el)return;let msg;
  if(p<28)msg=`You drew the line far left — now almost everything counts as "green." A Russian speaker would already have split the blue on the left into <b>siniy</b> and <b>goluboy</b>: two basic colours where you have one.`;
  else if(p>72)msg=`Far right — now almost everything is "blue." Homer’s Greek had no separate word for this stretch at all; the sea was "wine-dark."`;
  else msg=`About here is where English speakers waver. But the light is a smooth ramp of wavelength — <b>nothing</b> in it marks this spot. You put the border here; the Himba of Namibia would put it somewhere that looks plainly wrong to you.`;
  el.innerHTML=msg;
}
function updHeap(v){heapN=+v;const viz=document.getElementById('hviz');if(!viz)return;
  const show=Math.min(heapN,240);viz.innerHTML='<span class="grain"></span>'.repeat(show);
  const el=document.getElementById('hread');
  el.innerHTML=(heapN<=3)?`<b>${heapN}</b> grain${heapN>1?'s':''}. Obviously not a heap.`
    :(heapN>=1500)?`<b>${heapN}</b> grains. Obviously a heap. But slide down one grain at a time — which one will be the grain that stops it being a heap?`
    :`<b>${heapN}</b> grains. Heap? Perhaps? Take one away — still whatever it just was. No single grain flips it. The boundary you feel isn’t in the sand; it’s in the word.`;
}

render();
</script>
