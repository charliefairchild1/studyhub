<script>
"use strict";
const $=(s,r=document)=>r.querySelector(s),$$=(s,r=document)=>[...r.querySelectorAll(s)];
function frac(n,d){return `<span class="frac"><span class="n">${n}</span><span class="d">${d}</span></span>`;}
const toast=m=>{const t=$("#toast");t.textContent=m;t.classList.add("on");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("on"),1700);};
let P=load();function load(){try{return JSON.parse(localStorage.getItem("logic_prog"))||{done:{},drill:{}};}catch(e){return{done:{},drill:{}};}}
function save(){localStorage.setItem("logic_prog",JSON.stringify(P));}
function markDone(id){if(!P.done[id]){P.done[id]=1;save();toast("Lesson complete ✓");}}
const doneCount=()=>Object.keys(P.done).length;

/* ============================ LOGIC ENGINE ============================ */
/* tokenizer + recursive-descent parser for propositional logic:
   ¬ (not) ∧ (and) ∨ (or) → (imp) ↔ (iff), parens, atoms p q r s, ⊤ ⊥.
   precedence: ¬ > ∧ > ∨ > → > ↔ ; → is right-associative. */
function tokenize(s){const t=[];for(const c of s){if(c===" "||c==="\t")continue;
  if("¬∧∨→↔()⊤⊥".indexOf(c)>=0){t.push(c);continue;}
  if(/[a-zA-Z]/.test(c)){t.push(c);continue;}
  throw new Error("unexpected symbol: "+c);}return t;}
function parse(str){const T=tokenize(str);let i=0;const peek=()=>T[i],eat=()=>T[i++];
  function bicond(){let l=imp();while(peek()==="↔"){eat();l={o:"↔",l,r:imp()};}return l;}
  function imp(){const l=or();if(peek()==="→"){eat();return {o:"→",l,r:imp()};}return l;}
  function or(){let l=and();while(peek()==="∨"){eat();l={o:"∨",l,r:and()};}return l;}
  function and(){let l=not();while(peek()==="∧"){eat();l={o:"∧",l,r:not()};}return l;}
  function not(){if(peek()==="¬"){eat();return {o:"¬",r:not()};}return atom();}
  function atom(){const c=peek();
    if(c==="("){eat();const e=bicond();if(eat()!==")")throw new Error("missing )");return e;}
    if(c==="⊤"){eat();return {o:"T"};}if(c==="⊥"){eat();return {o:"F"};}
    if(c&&/[a-zA-Z]/.test(c)){eat();return {o:"v",n:c};}
    throw new Error("unexpected end");}
  const ast=bicond();if(i<T.length)throw new Error("extra input");return ast;}
function ev(n,e){switch(n.o){
  case "v":return e[n.n];case "T":return true;case "F":return false;
  case "¬":return !ev(n.r,e);case "∧":return ev(n.l,e)&&ev(n.r,e);
  case "∨":return ev(n.l,e)||ev(n.r,e);case "→":return !ev(n.l,e)||ev(n.r,e);
  case "↔":return ev(n.l,e)===ev(n.r,e);}}
function vars(n,set){set=set||new Set();if(n.o==="v")set.add(n.n);if(n.l)vars(n.l,set);if(n.r)vars(n.r,set);return set;}
function rowsFor(vlist){const out=[],N=vlist.length;for(let m=0;m<(1<<N);m++){const e={};
  for(let j=0;j<N;j++)e[vlist[j]]=!!(m&(1<<(N-1-j)));out.push(e);}return out;}
function truthTable(formula){const ast=parse(formula);const vl=[...vars(ast)].sort();
  const rows=rowsFor(vl).map(e=>({e,val:ev(ast,e)}));return {vl,rows};}
function tv(b){return b?'<span style="color:var(--green)">T</span>':'<span style="color:var(--red)">F</span>';}

/* ============================ CURRICULUM ============================ */
const MODULES=[
 {ic:"Ⅰ",t:"Part I · Propositional logic",lessons:[
   {id:"connect",n:"Statements & connectives",sub:"the atoms of reasoning: ¬ ∧ ∨ → ↔"},
   {id:"ttables",n:"Truth tables",sub:"every case, laid out and computed",lab:"truthtable"},
   {id:"taut",n:"Tautology, contradiction, contingency",sub:"true always, never, or sometimes"},
   {id:"equiv",n:"Logical equivalence",sub:"De Morgan, contrapositive, and friends",lab:"equiv"},
   {id:"valid",n:"Validity vs soundness",sub:"following correctly ≠ being true",lab:"validity"},
 ]},
 {ic:"Ⅱ",t:"Part II · Predicate logic",lessons:[
   {id:"quant",n:"Predicates & quantifiers",sub:"looking inside the statement: ∀ ∃"},
   {id:"negq",n:"Negating quantifiers",sub:"push a ¬ through and the quantifier flips"},
   {id:"translate",n:"Translating English to logic",sub:"∀ pairs with →, ∃ pairs with ∧"},
 ]},
 {ic:"Ⅲ",t:"Part III · Arguments & fallacies",lessons:[
   {id:"forms",n:"Valid argument forms",sub:"modus ponens, modus tollens, syllogism"},
   {id:"fallacy",n:"Fallacies, formal & informal",sub:"the arguments that only look valid"},
 ]},
 {ic:"Ⅳ",t:"Part IV · Proof & its limits",lessons:[
   {id:"direct",n:"Direct proof & contrapositive",sub:"assume the hypothesis; or flip it"},
   {id:"contra",n:"Proof by contradiction",sub:"assume the opposite, break something"},
   {id:"induct",n:"Mathematical induction",sub:"the base case and the falling dominoes",lab:"induction"},
   {id:"limits",n:"Sets, functions & Gödel's limit",sub:"the objects of proof — and its ceiling",lab:"venn"},
 ]},
];
const ALL=MODULES.flatMap(m=>m.lessons);const LESSON=Object.fromEntries(ALL.map(l=>[l.id,l]));

/* ---- lesson content ---- */
const C={};
C.connect=`<p>Logic studies which conclusions <b>follow</b> from which assumptions — with the certainty of arithmetic. It begins with the atom of reasoning: the <b>statement</b> (or proposition), a sentence that is definitely true or definitely false, never both and never neither.</p>
<p>"7 is prime" is a statement (true). "It is raining" is a statement (true or false depending on the sky). "Close the door" is <i>not</i> — a command has no truth value. Questions and opinions-of-taste don't qualify either.</p>
<p>We build compound statements with five <b>connectives</b>. Each has a fixed meaning given entirely by how it combines truth values:</p>
<div class="eq box">¬p &nbsp; <b>not</b> — flips the value<br>p ∧ q &nbsp; <b>and</b> — true only when <i>both</i> are true<br>p ∨ q &nbsp; <b>or</b> — <i>inclusive</i>: true when at least one is true<br>p → q &nbsp; <b>if…then</b> — false only when p is true and q is false<br>p ↔ q &nbsp; <b>if and only if</b> — true when the two sides <i>match</i></div>
<p>The one that trips everyone is the conditional →. It is false in exactly one case: a true antecedent leading to a false consequent (you promised, then broke the promise). In every other case it counts as true — including when the antecedent is false, where it is <b>vacuously true</b>.</p>
<div class="wk"><div class="wl">Worked example · symbolizing English</div>
<div class="step">"If it rains and the game isn't cancelled, we'll get wet."</div>
<div class="step">Let r = it rains, c = game cancelled, w = we get wet.</div>
<div class="step">Symbolized: <b>(r ∧ ¬c) → w</b></div></div>
<div class="callout"><span class="l">The vacuous truth</span>"If the moon is made of cheese, then 2 + 2 = 5" is a <b>true</b> conditional — because its antecedent is false, the promise is never tested, so nothing was broken. Strange at first; essential later.</div>`;

C.ttables=`<p>A <b>truth table</b> lists every possible combination of truth values for the atomic statements and computes the value of the whole. With n atoms there are 2ⁿ rows: 2 for one atom, 4 for two, 8 for three. Nothing is left to intuition — you check <i>all</i> cases.</p>
<p>Here are the five connectives, complete:</p>
<div style="overflow-x:auto"><table class="tt"><thead><tr><th>p</th><th>q</th><th>¬p</th><th>p ∧ q</th><th>p ∨ q</th><th>p → q</th><th>p ↔ q</th></tr></thead><tbody>
<tr><td>T</td><td>T</td><td class="fv">F</td><td class="tv">T</td><td class="tv">T</td><td class="tv">T</td><td class="tv">T</td></tr>
<tr><td>T</td><td>F</td><td class="fv">F</td><td class="fv">F</td><td class="tv">T</td><td class="fv">F</td><td class="fv">F</td></tr>
<tr><td>F</td><td>T</td><td class="tv">T</td><td class="fv">F</td><td class="tv">T</td><td class="tv">T</td><td class="fv">F</td></tr>
<tr><td>F</td><td>F</td><td class="tv">T</td><td class="fv">F</td><td class="fv">F</td><td class="tv">T</td><td class="tv">T</td></tr></tbody></table></div>
<p>Read the → column carefully: only the second row (p true, q false) is false. To evaluate a bigger formula, work from the inside out, obeying precedence: <b>¬</b> binds tightest, then <b>∧</b>, then <b>∨</b>, then <b>→</b>, then <b>↔</b>; parentheses override everything.</p>
<div class="wk"><div class="wl">Worked example · (p ∧ q) → p</div>
<div class="step">p=T,q=T: (T∧T)=T, T→T = <b>T</b></div>
<div class="step">p=T,q=F: (T∧F)=F, F→T = <b>T</b></div>
<div class="step">p=F,q=T: (F∧T)=F, F→F = <b>T</b></div>
<div class="step">p=F,q=F: (F∧F)=F, F→F = <b>T</b> &nbsp;<span class="r">true in every row — a tautology</span></div></div>
<p>Build any formula's full table below — pick one and every row is computed and classified for you.</p>
<div id="__sim"></div>`;

C.taut=`<p>Sort formulas by the <i>shape</i> of their truth-table column and three kinds appear.</p>
<p>A <b>tautology</b> is true in every row — true by its logical form alone, regardless of the facts. These are the laws of logic. The oldest is the law of excluded middle:</p>
<div class="eq box">p ∨ ¬p &nbsp; — always true</div>
<p>A <b>contradiction</b> is false in every row; it cannot possibly be true:</p>
<div class="eq box">p ∧ ¬p &nbsp; — always false</div>
<p>A <b>contingency</b> is true in some rows and false in others — its truth depends on the world. Almost every real statement ("it is raining", "p → q") is contingent.</p>
<div class="wk"><div class="wl">Worked example · classify (p → q) ∨ (q → p)</div>
<div class="step">p=T,q=T: (T→T)∨(T→T) = T∨T = <b>T</b></div>
<div class="step">p=T,q=F: (T→F)∨(F→T) = F∨T = <b>T</b></div>
<div class="step">p=F,q=T: (F→T)∨(T→F) = T∨F = <b>T</b></div>
<div class="step">p=F,q=F: (F→F)∨(F→F) = T∨T = <b>T</b> &nbsp;<span class="r">every row true — a tautology (of any two statements, at least one implies the other)</span></div></div>
<div class="callout"><span class="l">Why it matters</span>A tautology carries no information about the world — it's true whatever happens. That is exactly what makes it safe to use as a rule of inference: it can never lead you from truth into falsehood.</div>`;

C.equiv=`<p>Two statements are <b>logically equivalent</b> (written ≡) when they have identical truth tables — the same value in every single row. Equivalent statements say the same thing in different words, and you may swap one for the other anywhere.</p>
<p>The equivalences worth knowing cold:</p>
<div class="eq box"><b>De Morgan:</b> ¬(p ∧ q) ≡ ¬p ∨ ¬q &nbsp;·&nbsp; ¬(p ∨ q) ≡ ¬p ∧ ¬q</div>
<div class="eq box"><b>Contrapositive:</b> p → q ≡ ¬q → ¬p</div>
<div class="eq"><b>Implication:</b> p → q ≡ ¬p ∨ q &nbsp;·&nbsp; <b>Double negation:</b> ¬¬p ≡ p</div>
<p>De Morgan tells you how negation distributes over "and"/"or": to deny "both", say "not one or not the other." The <b>contrapositive</b> is the crucial one — a conditional and its contrapositive are always equivalent. Its two impostors are <i>not</i>: the <b>converse</b> q → p and the <b>inverse</b> ¬p → ¬q say something different.</p>
<div class="wk"><div class="wl">Worked example · De Morgan by truth table</div>
<div style="overflow-x:auto"><table class="tt"><thead><tr><th>p</th><th>q</th><th class="res">¬(p∧q)</th><th class="res">¬p∨¬q</th></tr></thead><tbody>
<tr><td>T</td><td>T</td><td class="fv res">F</td><td class="fv res">F</td></tr>
<tr><td>T</td><td>F</td><td class="tv res">T</td><td class="tv res">T</td></tr>
<tr><td>F</td><td>T</td><td class="tv res">T</td><td class="tv res">T</td></tr>
<tr><td>F</td><td>F</td><td class="tv res">T</td><td class="tv res">T</td></tr></tbody></table></div>
<div class="step">The two columns match in every row, so ¬(p∧q) ≡ ¬p∨¬q. ∎</div></div>
<p>Check any pair below in the Equivalence lab.</p>
<div id="__sim"></div>
<div class="callout"><span class="l">The classic error</span>"If it's a dog, it's a mammal" does <b>not</b> give you "if it's a mammal, it's a dog" (converse). It <i>does</i> give you "if it's not a mammal, it's not a dog" (contrapositive). Statement and contrapositive stand or fall together; statement and converse do not.</div>`;

C.valid=`<p>An <b>argument</b> is a set of premises offered in support of a conclusion. The central question of logic: does the conclusion <i>follow</i>?</p>
<p>An argument is <b>valid</b> when the conclusion must be true whenever all the premises are true — equivalently, there is <i>no</i> row of the truth table where every premise is true and the conclusion is false. Validity is about <b>structure</b>, not about whether the premises happen to be true.</p>
<p>An argument is <b>sound</b> when it is valid <i>and</i> its premises are actually true. Only a sound argument guarantees a true conclusion in the real world.</p>
<div class="eq box">valid &nbsp;=&nbsp; the form is truth-preserving<br>sound &nbsp;=&nbsp; valid &nbsp;+&nbsp; the premises are in fact true</div>
<p>So an argument can be <b>valid but not sound</b>: "All fish can fly; Nemo is a fish; therefore Nemo can fly." The reasoning is flawless; the first premise is false, so the argument is unsound. And a bad argument can stumble onto a true conclusion by luck — which proves nothing.</p>
<div class="wk"><div class="wl">Worked example · is modus ponens valid?</div>
<div class="step">Premises: p → q and p. &nbsp; Conclusion: q.</div>
<div style="overflow-x:auto"><table class="tt"><thead><tr><th>p</th><th>q</th><th>p→q</th><th>p</th><th class="res">q</th></tr></thead><tbody>
<tr class="hi"><td>T</td><td>T</td><td class="tv">T</td><td class="tv">T</td><td class="tv res">T</td></tr>
<tr><td>T</td><td>F</td><td class="fv">F</td><td class="tv">T</td><td class="fv res">F</td></tr>
<tr><td>F</td><td>T</td><td class="tv">T</td><td class="fv">F</td><td class="tv res">T</td></tr>
<tr><td>F</td><td>F</td><td class="tv">T</td><td class="fv">F</td><td class="fv res">F</td></tr></tbody></table></div>
<div class="step">Only the top row has <i>both</i> premises true — and there the conclusion is true too. No counterexample exists, so the form is <b>valid</b>. ∎</div></div>
<p>Test arguments yourself in the Validity lab below.</p>
<div id="__sim"></div>
<div class="callout"><span class="l">The dividing line</span>Logic certifies <b>validity</b>, not truth. It tells you the conclusion follows <i>if</i> the premises hold; whether they actually hold is a question about the world, answered by observation — not by logic.</div>`;

C.quant=`<p>Propositional logic can't see inside a sentence. To it, "All men are mortal" is just one letter. To reason about "all" and "some" we need <b>predicate logic</b>.</p>
<p>A <b>predicate</b> is a statement with a slot: P(x) = "x is prime". It isn't true or false until you fill the slot — P(7) is true, P(8) is false. <b>Quantifiers</b> then say <i>how many</i> fillings make it true, over some agreed <b>domain</b> of objects:</p>
<div class="eq box">∀x P(x) &nbsp; "for all x, P(x)" &nbsp;— true iff P holds for <i>every</i> object<br>∃x P(x) &nbsp; "there exists an x such that P(x)" &nbsp;— true iff P holds for <i>at least one</i></div>
<p>"All men are mortal" becomes ∀x (Man(x) → Mortal(x)). "Some number is even" becomes ∃x Even(x). The domain matters: ∀x (x² ≥ 0) is true over the real numbers.</p>
<div class="wk"><div class="wl">Worked example · nested quantifiers</div>
<div class="step">"Every integer has a successor."</div>
<div class="step">∀x ∃y (y = x + 1) &nbsp;<span class="r">for each x there is some y one larger</span></div></div>
<div class="callout"><span class="l">Order is not decoration</span>∀x ∃y Loves(x,y) — "everyone loves someone" (each person has some beloved, possibly different).<br>∃y ∀x Loves(x,y) — "someone is loved by everyone" (one single person, adored by all).<br>Same symbols, reversed order, completely different claims. Swapping ∀ and ∃ can change everything.</div>`;

C.negq=`<p>Negation and quantifiers interact by one clean rule: <b>a ¬ pushed inside a quantifier flips it</b> and lands on the predicate.</p>
<div class="eq box">¬∀x P(x) ≡ ∃x ¬P(x)<br>¬∃x P(x) ≡ ∀x ¬P(x)</div>
<p>"Not everything is P" means "something is not P." "Nothing is P" means "everything is not P." These are just De Morgan's laws stretched over a whole domain: ∀ is a giant AND across all objects, ∃ is a giant OR, and ¬ distributes exactly as before.</p>
<div class="wk"><div class="wl">Worked example · negating a universal</div>
<div class="step">Claim: "Every student passed" &nbsp;→&nbsp; ∀x Pass(x)</div>
<div class="step">Negation: ¬∀x Pass(x) ≡ <b>∃x ¬Pass(x)</b></div>
<div class="step">In English: "<b>some</b> student did not pass" — <span class="r">NOT "no student passed"</span></div></div>
<p>The commonest mistake in all of logic: thinking the opposite of "all are" is "none are." It isn't. The opposite of "all are" is "at least one isn't." To knock down a universal claim you need a <b>single counterexample</b>; to knock down an existential claim you must rule out <i>every</i> case.</p>
<p>Nested statements negate layer by layer, flipping each quantifier: ¬∀x ∃y P(x,y) ≡ ∃x ∀y ¬P(x,y).</p>
<div class="callout"><span class="l">Rule of thumb</span>Slide the ¬ rightward through the statement; every ∀ it crosses becomes ∃, every ∃ becomes ∀, and it finally negates the innermost predicate. Mechanical, and always correct.</div>`;

C.translate=`<p>English hides its logic; symbols expose it. Four templates cover most everyday claims — and the choice of connective is everything.</p>
<div class="eq box"><b>All A are B:</b> &nbsp; ∀x (A(x) → B(x))<br><b>Some A are B:</b> &nbsp; ∃x (A(x) ∧ B(x))<br><b>No A are B:</b> &nbsp; ∀x (A(x) → ¬B(x))<br><b>Only A are B:</b> &nbsp; ∀x (B(x) → A(x))</div>
<p>Notice the pairing: <b>∀ goes with →</b>, and <b>∃ goes with ∧</b>. There's a reason. "All dogs are mammals" must not claim everything <i>is</i> a dog — the → lets non-dogs off the hook (vacuously true for them). "Some dog is brown" must actually produce a dog that is brown — the ∧ demands both at once.</p>
<div class="wk"><div class="wl">Worked example · a layered sentence</div>
<div class="step">"Every prime greater than 2 is odd."</div>
<div class="step">∀x ( ( Prime(x) ∧ x &gt; 2 ) → Odd(x) )</div>
<div class="step"><span class="r">the conditions gather on the left of the →; the claim sits on the right</span></div></div>
<p>Two errors to never make: writing <b>∀x (A(x) ∧ B(x))</b> for "all A are B" (that says <i>everything</i> is both A and B), and writing <b>∃x (A(x) → B(x))</b> for "some A are B" (that's satisfied by any object that simply isn't an A, so it claims almost nothing).</p>
<div class="callout"><span class="l">Memorize the two pairs</span>∀ … → &nbsp; and &nbsp; ∃ … ∧. Cross the pairing and you assert something you never meant. This single habit prevents most translation mistakes.</div>`;

C.forms=`<p>Some argument shapes are valid no matter what statements you feed them — certified once by a truth table, trusted forever. These are the workhorses of every proof.</p>
<div class="eq box"><b>Modus ponens:</b> &nbsp; p → q, &nbsp; p &nbsp;⊢&nbsp; q<br><b>Modus tollens:</b> &nbsp; p → q, &nbsp; ¬q &nbsp;⊢&nbsp; ¬p<br><b>Hypothetical syllogism:</b> &nbsp; p → q, &nbsp; q → r &nbsp;⊢&nbsp; p → r<br><b>Disjunctive syllogism:</b> &nbsp; p ∨ q, &nbsp; ¬p &nbsp;⊢&nbsp; q</div>
<p>Read them in words. <b>Modus ponens</b>: affirm the antecedent, conclude the consequent — the most direct step in reasoning. <b>Modus tollens</b>: deny the consequent, conclude the denial of the antecedent. <b>Hypothetical syllogism</b>: chain two conditionals into one. <b>Disjunctive syllogism</b>: eliminate one option, keep the other.</p>
<div class="wk"><div class="wl">Worked example · modus tollens as science</div>
<div class="step">If the theory is right, the experiment shows q. &nbsp; (p → q)</div>
<div class="step">The experiment does not show q. &nbsp; (¬q)</div>
<div class="step">Therefore the theory is wrong. &nbsp; (∴ ¬p)</div>
<div class="step"><span class="r">this is the exact logic of falsification — one failed prediction refutes the theory</span></div></div>
<div class="callout"><span class="l">Try it</span>Every form here is a tautology of the shape (premises) → conclusion. Load them into the Validity lab and watch: there is no row where the premises are all true and the conclusion is false.</div>`;

C.fallacy=`<p>A <b>fallacy</b> is an argument that persuades without being valid. They split into two families.</p>
<p><b>Formal fallacies</b> are broken in <i>form</i> — a truth table exposes them. The two most dangerous are twins of the valid forms:</p>
<div class="eq box"><b>Affirming the consequent:</b> &nbsp; p → q, &nbsp; q &nbsp;⊢&nbsp; p &nbsp; <span style="color:var(--red)">INVALID</span><br><b>Denying the antecedent:</b> &nbsp; p → q, &nbsp; ¬p &nbsp;⊢&nbsp; ¬q &nbsp; <span style="color:var(--red)">INVALID</span></div>
<p>They look like modus ponens and modus tollens but move in the wrong direction. Both fail on the row p = F, q = T.</p>
<div class="wk"><div class="wl">Worked example · affirming the consequent</div>
<div class="step">"If he studied, he passed. He passed. So he studied."</div>
<div class="step">Counterexample — the row that breaks it: he did <b>not</b> study (p=F) yet <b>passed</b> (q=T), perhaps the test was easy.</div>
<div class="step">Premises p→q and q are both true there, but the conclusion p is <b>false</b>. Invalid. ∎</div></div>
<p><b>Informal fallacies</b> may have fine form but cheat on content:</p>
<ul>
<li><b>Ad hominem</b> — attack the person instead of the argument ("she's a criminal, so ignore her point").</li>
<li><b>Straw man</b> — refute a distorted, weaker version of the claim.</li>
<li><b>Circular reasoning</b> (begging the question) — assume the very thing you're proving.</li>
<li><b>False dilemma</b> — offer two options when more exist.</li>
<li><b>Appeal to popularity / authority</b> — "everyone believes it" or "an expert said so" in place of evidence.</li>
</ul>
<div class="callout"><span class="l">Watch the twins</span>The formal fallacies are the treacherous ones because they mimic valid forms. Always learn modus ponens beside affirming-the-consequent, and modus tollens beside denying-the-antecedent — the difference is the whole game.</div>`;

C.direct=`<p>A <b>proof</b> is a finite chain of statements, each one following by an accepted rule from axioms, definitions, or earlier lines, ending at the claim — with no gaps. It converts "seems true" into "is true, necessarily."</p>
<p>The <b>direct proof</b> of a conditional p → q: <i>assume</i> p, then reason forward by valid steps until you reach q.</p>
<div class="wk"><div class="wl">Worked example · direct proof</div>
<div class="step">Claim: if n is even, then n² is even.</div>
<div class="step">Assume n is even, so n = 2k for some integer k. &nbsp;<span class="r">(definition)</span></div>
<div class="step">Then n² = (2k)² = 4k² = 2(2k²).</div>
<div class="step">2k² is an integer, so n² is 2 × (integer) — even. ∎</div></div>
<p>Sometimes the direct route is awkward. <b>Proof by contrapositive</b> uses the equivalence p → q ≡ ¬q → ¬p from Part I: instead of proving the claim, prove its contrapositive, which is logically the same statement but often easier to attack.</p>
<div class="wk"><div class="wl">Worked example · proof by contrapositive</div>
<div class="step">Claim: if n² is even, then n is even. &nbsp;<span class="r">("n² is even" is hard to use directly)</span></div>
<div class="step">Contrapositive: if n is <b>odd</b>, then n² is <b>odd</b>.</div>
<div class="step">Assume n odd, n = 2k+1. Then n² = 4k² + 4k + 1 = 2(2k² + 2k) + 1 — odd.</div>
<div class="step">The contrapositive holds, so the original does too. ∎</div></div>
<div class="callout"><span class="l">Which to reach for</span>Use the contrapositive when the negated conclusion ("n is odd") is a friendlier starting point than the given hypothesis ("n² is even"). Same truth, easier path.</div>`;

C.contra=`<p><b>Proof by contradiction</b> (reductio ad absurdum) is the boldest tool: to prove a statement S, <i>assume its negation</i> ¬S and derive an outright contradiction — some claim that is both true and false, or a known impossibility. Since ¬S forces the absurd, ¬S must be false, so S is true. It rests on one bedrock principle: no statement is both true and false.</p>
<div class="wk"><div class="wl">Worked example · √2 is irrational</div>
<div class="step">Suppose, for contradiction, that √2 = a/b in <b>lowest terms</b> (a, b share no common factor).</div>
<div class="step">Then 2 = a²/b², so a² = 2b². Hence a² is even, so a is even: a = 2c.</div>
<div class="step">Substitute: (2c)² = 2b² → 4c² = 2b² → b² = 2c². So b² is even, hence b is even.</div>
<div class="step">But now a and b are <b>both even</b> — a common factor of 2 — contradicting "lowest terms."</div>
<div class="step">The assumption is impossible, so √2 cannot be written as a fraction: it is irrational. ∎</div></div>
<p>To prove a conditional p → q by contradiction, you assume <b>p ∧ ¬q</b> (the one way it could fail) and derive an absurdity.</p>
<div class="callout"><span class="l">Power and peril</span>The method is strong because ¬S hands you a free extra premise to work with. The catch: a long argument that reaches a contradiction only proves <i>something</i> is wrong — make sure it's the assumption, not a slip in your algebra.</div>`;

C.induct=`<p>To prove a statement P(n) for <b>all</b> natural numbers at once, <b>mathematical induction</b> checks just two things:</p>
<div class="eq box"><b>Base case:</b> prove P(1). &nbsp; <span style="color:var(--mut)">(the start)</span><br><b>Inductive step:</b> prove P(k) → P(k+1) for arbitrary k. &nbsp; <span style="color:var(--mut)">(each rung reaches the next)</span></div>
<p>From those two, P(n) follows for every n ≥ 1. The picture: an infinite line of dominoes. Knocking the first one is the base case; guaranteeing that each falling domino topples the next is the inductive step. Together they bring down the whole line — without your touching all infinitely many.</p>
<p>In the step you get to <i>assume</i> P(k) (the <b>induction hypothesis</b>) and must produce P(k+1).</p>
<div class="wk"><div class="wl">Worked example · 1 + 2 + ⋯ + n = ${frac("n(n+1)","2")}</div>
<div class="step"><b>Base:</b> n = 1. Left side = 1. Right side = 1·2/2 = 1. ✓</div>
<div class="step"><b>Hypothesis:</b> assume 1 + 2 + ⋯ + k = ${frac("k(k+1)","2")}.</div>
<div class="step"><b>Step:</b> add the next term (k+1) to both sides:</div>
<div class="step">1 + ⋯ + k + (k+1) = ${frac("k(k+1)","2")} + (k+1) = (k+1)·(${frac("k","2")} + 1) = ${frac("(k+1)(k+2)","2")}</div>
<div class="step">That is exactly the formula with n = k+1. The step holds, so the formula is true for all n. ∎</div></div>
<p>Watch the machinery below: set n, verify the base case, and topple the chain to see P(k) → P(k+1) propagate.</p>
<div id="__sim"></div>
<div class="callout"><span class="l">The leverage</span>Induction never inspects infinitely many cases. It proves a <b>start</b> and a <b>step</b>, then lets logic carry the result across the entire infinite list. Two proofs standing in for infinitely many — that economy is the whole idea.</div>`;

C.limits=`<p>A last look — at what proofs are <i>about</i>, and at where proof itself runs out.</p>
<p><b>The objects.</b> Much of mathematics is built from <b>sets</b> — collections of distinct objects. Write x ∈ A for "x is a member of A." The operations mirror the connectives you already know:</p>
<div class="eq box">A ∪ B &nbsp; union (in either) &nbsp;·&nbsp; A ∩ B &nbsp; intersection (in both)<br>A′ &nbsp; complement (not in A) &nbsp;·&nbsp; A ∖ B &nbsp; difference &nbsp;·&nbsp; A ⊆ B &nbsp; subset</div>
<p>De Morgan returns for sets: (A ∪ B)′ = A′ ∩ B′. A <b>function</b> f: A → B assigns each input exactly one output. It is <b>injective</b> (one-to-one) if no two inputs share an output, <b>surjective</b> (onto) if every output is hit, and <b>bijective</b> if both — a perfect pairing. Bijections let us <i>compare infinities</i>: two sets have the same size when a bijection exists. Cantor proved no bijection pairs the reals with the naturals — some infinities are strictly larger than others. Explore the set operations in the Venn lab below.</p>
<div id="__sim"></div>
<p><b>The ceiling.</b> Could one formal system, given enough axioms, prove <i>every</i> true statement of arithmetic? In 1931 <b>Kurt Gödel</b> proved the answer is no.</p>
<div class="eq box"><b>First incompleteness theorem:</b> any consistent formal system rich enough to express arithmetic contains true statements it cannot prove.</div>
<p>Gödel's trick was to build, inside the system, a sentence G that decodes to "G is not provable here." If the system could prove G, it would prove a falsehood (making it inconsistent). So — assuming it is consistent — G is unprovable, and therefore <i>true</i>. A true statement the system can never reach. His <b>second theorem</b> adds: such a system cannot even prove its own consistency.</p>
<p>Read it plainly, without mysticism. This is a precise limit on <i>formal proof</i>, not a collapse of reason. The unprovable sentences are specific and engineered; everyday mathematics runs untroubled. You can always <i>add</i> the missing truth as a new axiom — but the stronger system then has its own blind spot. There is no final system that proves everything.</p>
<div class="callout"><span class="l">Where a course on certainty ends</span>Gödel doesn't say nothing can be known or that logic is broken. He says no single fixed mechanical system captures all mathematical truth at once — <b>truth outruns provability</b>. Certainty is real, hard-won, and genuine. It is also, provably, never total. A fitting last word for how we know for certain.</div>`;

let cleanups=[];
function clearSims(){cleanups.forEach(f=>{try{f();}catch(e){}});cleanups=[];}
function raf(fn){let id,run=true;const l=t=>{if(!run)return;fn(t);id=requestAnimationFrame(l);};id=requestAnimationFrame(l);cleanups.push(()=>{run=false;cancelAnimationFrame(id);});}
function fit(cv,h){const w=cv.clientWidth||cv.parentElement.clientWidth-24;const dpr=Math.min(2,devicePixelRatio||1);cv.width=w*dpr;cv.height=h*dpr;cv.style.height=h+"px";const x=cv.getContext("2d");x.setTransform(dpr,0,0,dpr,0,0);return {x,w,h};}

/* --- render a full truth table for a formula string --- */
function renderTT(formula){
  const {vl,rows}=truthTable(formula);
  const allT=rows.every(r=>r.val),allF=rows.every(r=>!r.val);
  const cls=allT?"tautology":allF?"contradiction":"contingency";
  let h='<div style="overflow-x:auto"><table class="tt"><thead><tr>';
  vl.forEach(v=>h+=`<th>${v}</th>`);
  h+=`<th class="res">${formula}</th></tr></thead><tbody>`;
  rows.forEach(r=>{h+="<tr>";vl.forEach(v=>h+=`<td>${r.e[v]?"T":"F"}</td>`);
    h+=`<td class="res ${r.val?"tv":"fv"}">${r.val?"T":"F"}</td></tr>`;});
  h+="</tbody></table></div>";
  return {html:h,cls};
}

/* --- LAB: truth-table builder --- */
function simTruthtable(el){
  const forms=["p ∧ q","p ∨ q","p → q","p ↔ q","¬(p ∧ q)","¬p ∨ ¬q","p ∨ ¬p","p ∧ ¬p",
    "(p → q) ↔ (¬q → ¬p)","(p ∧ q) → r","(p → q) ∧ (q → r)"];
  el.innerHTML=`<div class="simwrap"><label style="font-size:12px;color:var(--mut)">pick a formula
    <select id="f">${forms.map(f=>`<option>${f}</option>`).join("")}</select></label>
    <div id="out" style="margin-top:12px"></div></div>`;
  const upd=()=>{const f=$("#f",el).value;let t;try{t=renderTT(f);}catch(e){$("#out",el).innerHTML="parse error";return;}
    const note=t.cls==="tautology"?"true in every row.":t.cls==="contradiction"?"false in every row.":"true in some rows, false in others.";
    $("#out",el).innerHTML=t.html+`<div class="readout" style="text-align:center">This formula is a <b>${t.cls}</b> — ${note}</div>`;};
  $("#f",el).onchange=upd;upd();
}

/* --- LAB: equivalence checker --- */
function simEquiv(el){
  const forms=["¬(p ∧ q)","¬p ∨ ¬q","¬(p ∨ q)","¬p ∧ ¬q","p → q","¬p ∨ q","¬q → ¬p","q → p","p ↔ q","(p → q) ∧ (q → p)"];
  el.innerHTML=`<div class="simwrap">
    <div class="row"><label style="font-size:12px;color:var(--mut);flex:1">formula A<select id="a">${forms.map((f,i)=>`<option${i===0?" selected":""}>${f}</option>`).join("")}</select></label>
    <label style="font-size:12px;color:var(--mut);flex:1">formula B<select id="b">${forms.map((f,i)=>`<option${i===1?" selected":""}>${f}</option>`).join("")}</select></label></div>
    <div id="out" style="margin-top:12px"></div></div>`;
  const upd=()=>{const fa=$("#a",el).value,fb=$("#b",el).value;
    let A,B;try{A=parse(fa);B=parse(fb);}catch(e){$("#out",el).innerHTML="parse error";return;}
    const vl=[...new Set([...vars(A),...vars(B)])].sort();const rows=rowsFor(vl);
    let eq=true;let h='<div style="overflow-x:auto"><table class="tt"><thead><tr>';
    vl.forEach(v=>h+=`<th>${v}</th>`);h+=`<th class="res">${fa}</th><th>${fb}</th><th>=</th></tr></thead><tbody>`;
    rows.forEach(e=>{const va=ev(A,e),vb=ev(B,e),same=va===vb;if(!same)eq=false;
      h+=`<tr class="${same?"":"bad"}">`;vl.forEach(v=>h+=`<td>${e[v]?"T":"F"}</td>`);
      h+=`<td class="res ${va?"tv":"fv"}">${va?"T":"F"}</td><td class="${vb?"tv":"fv"}">${vb?"T":"F"}</td><td>${same?"✓":"✗"}</td></tr>`;});
    h+="</tbody></table></div>";
    h+=`<div class="readout" style="text-align:center">${eq?"<b style=\"color:var(--green)\">Equivalent</b> — identical in every row (A ≡ B).":"<b style=\"color:var(--red)\">Not equivalent</b> — the red rows disagree."}</div>`;
    $("#out",el).innerHTML=h;};
  $("#a",el).onchange=upd;$("#b",el).onchange=upd;upd();
}

function simValidity(el){
  el.innerHTML=`<div class="simwrap"><label style="font-size:12px;color:var(--mut)">argument form
    <select id="a">${ARGS.map((a,i)=>`<option value="${i}">${a.name}</option>`).join("")}</select></label>
    <div id="out" style="margin-top:12px"></div></div>`;
  const upd=()=>{const arg=ARGS[+$("#a",el).value];
    const pA=arg.prem.map(parse),cA=parse(arg.con);
    const vs=new Set();pA.forEach(a=>vars(a,vs));vars(cA,vs);const vl=[...vs].sort();
    const rows=rowsFor(vl);let valid=true;
    let h='<div style="overflow-x:auto"><table class="tt"><thead><tr>';
    vl.forEach(v=>h+=`<th>${v}</th>`);
    arg.prem.forEach(p=>h+=`<th>${p}</th>`);h+=`<th class="res">∴ ${arg.con}</th></tr></thead><tbody>`;
    rows.forEach(e=>{const pv=pA.map(a=>ev(a,e));const cv2=ev(cA,e);const allP=pv.every(x=>x);
      const bad=allP&&!cv2;if(bad)valid=false;
      h+=`<tr class="${bad?"bad":allP?"hi":""}">`;vl.forEach(v=>h+=`<td>${e[v]?"T":"F"}</td>`);
      pv.forEach(x=>h+=`<td class="${x?"tv":"fv"}">${x?"T":"F"}</td>`);
      h+=`<td class="res ${cv2?"tv":"fv"}">${cv2?"T":"F"}</td></tr>`;});
    h+="</tbody></table></div>";
    h+=`<div class="readout" style="text-align:center">${valid?"<b style=\"color:var(--green)\">Valid</b> — in every highlighted row (all premises true) the conclusion is true too. No counterexample exists.":"<b style=\"color:var(--red)\">Invalid</b> — the red row is a counterexample: all premises true, conclusion false."}</div>`;
    $("#out",el).innerHTML=h;};
  $("#a",el).onchange=upd;upd();
}

/* --- LAB: Venn diagram sets (per-pixel membership) --- */
function simVenn(el){
  const ops=[
   ["A",(a,b,c)=>a,"{ x : x ∈ A }"],
   ["B",(a,b,c)=>b,"{ x : x ∈ B }"],
   ["C",(a,b,c)=>c,"{ x : x ∈ C }"],
   ["A ∪ B",(a,b,c)=>a||b,"in A or in B (or both)"],
   ["A ∩ B",(a,b,c)=>a&&b,"in A and in B"],
   ["A′",(a,b,c)=>!a,"everything not in A"],
   ["A ∖ B",(a,b,c)=>a&&!b,"in A but not in B"],
   ["A △ B",(a,b,c)=>a!==b,"in exactly one of A, B (symmetric difference)"],
   ["A ∩ B ∩ C",(a,b,c)=>a&&b&&c,"in all three"],
   ["(A∪B) ∩ C",(a,b,c)=>(a||b)&&c,"in C, and in A or B"],
   ["(A∪B)′",(a,b,c)=>!(a||b),"outside both A and B"],
   ["A′ ∩ B′",(a,b,c)=>!a&&!b,"De Morgan partner of (A∪B)′ — identical shading"],
  ];
  el.innerHTML=`<div class="simwrap"><canvas></canvas>
    <div class="row" id="ops" style="margin-top:10px"></div>
    <div class="readout" id="ro"></div></div>`;
  const cv=$("canvas",el);let cur=4;
  const obar=$("#ops",el);
  obar.innerHTML=ops.map((o,i)=>`<button class="opbtn ${i===cur?"on":""}" data-i="${i}">${o[0]}</button>`).join("");
  function render(){
    const w=cv.clientWidth||cv.parentElement.clientWidth-24,h=250;
    const dpr=Math.min(2,devicePixelRatio||1);cv.width=w*dpr;cv.height=h*dpr;cv.style.height=h+"px";
    const x=cv.getContext("2d");const W=cv.width,H=cv.height;
    const cx=W/2,cy=H/2,R=Math.min(W,H)*0.27,d=R*0.62;
    const A={x:cx,y:cy-d},B={x:cx-d*0.87,y:cy+d*0.5},C={x:cx+d*0.87,y:cy+d*0.5};
    const fn=ops[cur][1];const img=x.createImageData(W,H);const D=img.data;const R2=R*R;
    for(let py=0;py<H;py++)for(let px=0;px<W;px++){
      const inA=(px-A.x)*(px-A.x)+(py-A.y)*(py-A.y)<=R2;
      const inB=(px-B.x)*(px-B.x)+(py-B.y)*(py-B.y)<=R2;
      const inC=(px-C.x)*(px-C.x)+(py-C.y)*(py-C.y)<=R2;
      const i=(py*W+px)*4;let r=13,g=19,b=31;
      if(fn(inA,inB,inC)){r=70;g=112;b=170;}
      D[i]=r;D[i+1]=g;D[i+2]=b;D[i+3]=255;}
    x.putImageData(img,0,0);
    x.strokeStyle="#93a2bd";x.lineWidth=1.5*dpr;
    [A,B,C].forEach(p=>{x.beginPath();x.arc(p.x,p.y,R,0,7);x.stroke();});
    x.fillStyle="#e6ecf5";x.font=`bold ${15*dpr}px sans-serif`;x.textAlign="center";x.textBaseline="middle";
    x.fillText("A",A.x,A.y-R*0.62);x.fillText("B",B.x-R*0.6,B.y+R*0.5);x.fillText("C",C.x+R*0.6,C.y+R*0.5);
    $("#ro",el).innerHTML=`shading <b>${ops[cur][0]}</b> &nbsp;·&nbsp; <span style="color:var(--faint)">${ops[cur][2]}</span>`;
  }
  $$("[data-i]",obar).forEach(bn=>bn.onclick=()=>{cur=+bn.dataset.i;$$("[data-i]",obar).forEach(o=>o.classList.toggle("on",o===bn));render();});
  render();cleanups.push(()=>{});
}

/* --- LAB: induction & dominoes --- */
function simInduction(el){
  el.innerHTML=`<div class="simwrap"><canvas></canvas>
   <div class="simctl"><label>dominoes n = <b id="nn">6</b> <input type="range" id="n" min="1" max="12" step="1" value="6"></label>
   <button class="btn sm" id="go">▶ Topple the chain</button></div>
   <div class="readout" id="ro"></div></div>`;
  const cv=$("canvas",el);let n=6,t0=null,falling=false;
  $("#n",el).oninput=e=>{n=+e.target.value;$("#nn",el).textContent=n;falling=false;t0=null;};
  $("#go",el).onclick=()=>{falling=true;t0=performance.now();};
  function draw(){const {x,w,h}=fit(cv,200);x.clearRect(0,0,w,h);
    const gy=h-28;x.strokeStyle="#28344a";x.lineWidth=1;x.beginPath();x.moveTo(0,gy);x.lineTo(w,gy);x.stroke();
    const gap=w/(n+1),dw=Math.min(13,gap*0.42),dh=48,now=performance.now();
    for(let i=0;i<n;i++){const bx=gap*(i+1);let ang=0;
      if(falling){const start=t0+i*150;ang=Math.min(1,Math.max(0,(now-start)/230))*Math.PI/2*0.95;}
      x.save();x.translate(bx,gy);x.rotate(-ang);
      x.fillStyle=i===0?"#7fa8d9":"#5b86c4";x.fillRect(-dw/2,-dh,dw,dh);
      x.strokeStyle="#0a0e14";x.lineWidth=1;x.strokeRect(-dw/2,-dh,dw,dh);
      x.restore();
      x.fillStyle="#5a6b88";x.font="10px ui-monospace";x.textAlign="center";x.fillText(i+1,bx,gy+16);}
    const sum=n*(n+1)/2;
    $("#ro",el).innerHTML=`base case P(1): 1 = 1·2/2 = 1 ✓ &nbsp;·&nbsp; sum 1+2+…+${n} = <b>${sum}</b>, &nbsp; n(n+1)/2 = <b>${sum}</b> ✓<br><span style="color:var(--faint)">domino 1 (lighter) is the base case; each one knocking the next is the step P(k) → P(k+1)</span>`;
  }
  raf(draw);
}

const SIMS={truthtable:simTruthtable,equiv:simEquiv,validity:simValidity,venn:simVenn,induction:simInduction};

 ["equiv","≡","Equivalence Checker","Are two formulas the same? Compare their truth tables row by row.","var(--green)"],
 ["induction","⇊","Induction & Dominoes","Base case, then the chain — watch P(k) → P(k+1) topple.","var(--acc2)"],
];

/* practice */
const DR=[
 {q:`p is true and q is false. What is the value of &nbsp;p → q?`,a:["True","False","Undefined","Depends on r"],c:1,e:"A conditional is false in exactly one case: a true antecedent with a false consequent. T → F = F."},
 {q:`Which of these is a tautology (true in every row)?`,a:["p ∧ ¬p","p → q","p ∨ ¬p","p ∧ q"],c:2,e:"p ∨ ¬p is the law of excluded middle — one of p, ¬p is always true, so the disjunction is always true."},
 {q:`By De Morgan's law, ¬(p ∧ q) is equivalent to:`,a:["¬p ∧ ¬q","¬p ∨ ¬q","p ∨ q","¬(p ∨ q)"],c:1,e:"Negation turns ∧ into ∨ and negates each part: ¬(p ∧ q) ≡ ¬p ∨ ¬q."},
 {q:`The contrapositive of "If it rains, the ground is wet" is:`,a:["If the ground is wet, it rained","If it doesn't rain, the ground isn't wet","If the ground isn't wet, it didn't rain","If the ground is wet, it didn't rain"],c:2,e:"Contrapositive of p → q is ¬q → ¬p: negate both parts and swap. It is always equivalent to the original."},
 {q:`The negation of "All swans are white" is:`,a:["No swans are white","All swans are non-white","Some swan is not white","Some swans are white"],c:2,e:"¬∀x P(x) ≡ ∃x ¬P(x). The opposite of 'all are' is 'at least one isn't' — a single counterexample, not 'none are'."},
 {q:`The negation of "There exists a prime that is even" is:`,a:["Every prime is odd (no prime is even)","Some prime is odd","There exists a prime that is odd","Every number is prime"],c:0,e:"¬∃x P(x) ≡ ∀x ¬P(x). 'Nothing is P' — here, every prime fails to be even, i.e. no prime is even."},
 {q:`From "p → q" and "¬q", concluding "¬p" is the valid form called:`,a:["Modus ponens","Modus tollens","Hypothetical syllogism","Affirming the consequent"],c:1,e:"Deny the consequent to deny the antecedent: p → q, ¬q ⊢ ¬p. That's modus tollens."},
 {q:`From "p → q" and "q", concluding "p" is:`,a:["Modus ponens (valid)","Modus tollens (valid)","Affirming the consequent (invalid)","Disjunctive syllogism (valid)"],c:2,e:"Invalid: q could be true for other reasons. Counterexample p=F, q=T makes both premises true but the conclusion false."},
 {q:`"You can't trust her argument — she's been convicted of fraud." This is:`,a:["Modus tollens","An ad hominem fallacy","A valid syllogism","A false dilemma"],c:1,e:"Ad hominem: attacking the person rather than the argument. Her character doesn't bear on whether her reasoning is correct."},
 {q:`To prove a statement S by contradiction, you begin by assuming:`,a:["S is true","¬S, and then derive a contradiction","the contrapositive of S","a base case for S"],c:1,e:"Assume the negation ¬S; if it forces an impossibility, ¬S is false, so S must be true."},
 {q:`In proving 1+2+…+n = n(n+1)/2 by induction, the base case checks:`,a:["n = 0 gives 0","n = 1: 1 = 1·2/2","the step P(k) → P(k+1)","every n up to 100"],c:1,e:"The base case establishes the smallest case, n = 1: the left side is 1 and the right side is 1·2/2 = 1. ✓"},
 {q:`An argument that is valid but has a false premise is:`,a:["Sound","Unsound (valid but not sound)","Invalid","A tautology"],c:1,e:"Soundness = valid + all premises actually true. Valid form with a false premise is valid but unsound, so it guarantees nothing about the world."},
];

  DR.forEach((d,i)=>{const card=document.createElement("div");card.className="card q";
    card.innerHTML=`<div class="stem">${i+1}. ${d.q}</div>`+d.a.map((o,j)=>`<button class="opt" data-i="${j}">${o}</button>`).join("")+`<div class="exp" style="display:none;color:var(--mut);font-size:13px;margin-top:8px"></div>`;

  });
}
