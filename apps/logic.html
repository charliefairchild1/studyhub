<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Logic — Reason from the Ground Up</title>
<meta name="theme-color" content="#0c1413">
<style>
:root{--bg:#0c1413;--panel:#121c1a;--panel2:#172320;--ink:#e7efec;--dim:#8fa8a1;--faint:#5f7770;--teal:#4fd1b8;--gold:#e0b04a;--red:#f0866f;--blue:#6fa8d9;--rule:#22302c}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:radial-gradient(1000px 600px at 80% -10%,#12261f 0%,var(--bg) 58%) fixed;color:var(--ink);
  font-family:ui-sans-serif,-apple-system,"Segoe UI",system-ui,sans-serif;line-height:1.55;min-height:100vh;
  padding:calc(env(safe-area-inset-top) + 52px) 15px calc(env(safe-area-inset-bottom) + 78px)}
.wrap{max-width:660px;margin:0 auto}
.eyebrow{font-family:ui-monospace,"SF Mono",monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--faint);margin-bottom:7px}
h1{font-family:"Iowan Old Style",Palatino,Georgia,serif;font-size:1.9em;font-weight:600;line-height:1.1}
h1 em{font-style:italic;color:var(--teal)}
.lede{color:var(--dim);margin:11px 0 18px}
.card{background:var(--panel);border:1px solid var(--rule);border-radius:15px;padding:17px;margin-bottom:12px}
.sec{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);font-weight:700;margin:18px 2px 9px}
/* roadmap modules */
.mod{display:flex;align-items:center;gap:13px;background:var(--panel);border:1px solid var(--rule);border-radius:14px;padding:13px 15px;margin-bottom:9px;cursor:pointer;text-align:left;width:100%;color:var(--ink);font:inherit}
.mod:active{background:var(--panel2)}
.mod.done{border-color:#2b5c4e}
.mod .num{width:30px;height:30px;border-radius:50%;background:var(--panel2);border:1px solid var(--rule);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9em;color:var(--teal);flex-shrink:0}
.mod.done .num{background:linear-gradient(135deg,var(--teal),#2b9c86);color:#062019;border-color:transparent}
.mod .mt{flex:1;min-width:0}.mod .mt b{font-weight:700;font-size:1em}.mod .mt small{display:block;color:var(--dim);font-size:.8em;margin-top:1px}
.mod .go{color:var(--faint);font-size:1.2em}
/* lab card */
.labcard{background:linear-gradient(135deg,#13241f,#122a33);border:1px solid #2a4a44}
.labcard h3{font-family:"Iowan Old Style",Georgia,serif;font-weight:600;font-size:1.15em}
/* reader */
.backbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.backbar .b{background:none;border:1px solid var(--rule);color:var(--dim);border-radius:20px;padding:7px 13px;font:inherit;font-weight:650;font-size:.82em;cursor:pointer}
.tabs2{display:flex;gap:7px;margin-bottom:15px}
.tabs2 button{flex:1;background:var(--panel);border:1px solid var(--rule);color:var(--dim);border-radius:10px;padding:9px;font:inherit;font-weight:700;font-size:.85em;cursor:pointer}
.tabs2 button.on{background:var(--teal);color:#062019;border-color:var(--teal)}
.reader h2{font-family:"Iowan Old Style",Georgia,serif;font-weight:600;font-size:1.4em;margin:2px 0 4px}
.reader h4{color:var(--teal);font-size:1.02em;margin:18px 0 6px}
.reader p{color:#cdd9d5;margin:11px 0}
.reader ul{color:#cdd9d5;padding-left:20px;margin:10px 0}.reader li{margin:5px 0}
.reader b{color:var(--ink)}
.def{background:var(--panel2);border-left:3px solid var(--teal);border-radius:0 11px 11px 0;padding:12px 15px;margin:14px 0}
.def .l{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--teal);display:block;margin-bottom:5px}
.note{background:#1c2416;border:1px solid #3a4a2b;border-radius:11px;padding:11px 14px;margin:14px 0;color:#d8e6c9;font-size:.94em}
.note .l{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:4px}
.eq{font-family:"Iowan Old Style",Georgia,serif;font-size:1.12em;text-align:center;background:var(--panel2);border:1px solid var(--rule);border-radius:10px;padding:13px;margin:13px 0;letter-spacing:.3px;overflow-x:auto}
.sym{font-family:ui-monospace,monospace;color:var(--teal);font-weight:600}
/* truth table */
.tt{border-collapse:collapse;font-family:ui-monospace,monospace;font-size:.9em;margin:6px auto;min-width:60%}
.tt th,.tt td{border:1px solid var(--rule);padding:6px 12px;text-align:center}
.tt th{background:var(--panel2);color:var(--teal)}
.tt td.T{color:#7fe0c4}.tt td.F{color:var(--red)}
.tt th.res,.tt td.res{background:#152420;border-left:2px solid var(--teal);font-weight:700}
.ttwrap{overflow-x:auto;margin:12px -4px}
/* lab */
.labin{width:100%;background:#0a1110;border:1px solid var(--rule);color:var(--ink);border-radius:11px;padding:12px 13px;font:inherit;font-family:ui-monospace,monospace;font-size:1.05em}
.keys{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.keys button{background:var(--panel2);border:1px solid var(--rule);color:var(--teal);border-radius:9px;padding:8px 12px;font-family:ui-monospace,monospace;font-size:1.05em;cursor:pointer;min-width:42px}
.keys button.wide{color:var(--dim);font-size:.8em}
.verdict{border-radius:11px;padding:11px 14px;margin:12px 0;font-weight:650;text-align:center}
.verdict.taut{background:#13291f;border:1px solid #2f7a4c;color:#7fe0a8}
.verdict.contra{background:#2a1613;border:1px solid #7a3a2f;color:var(--red)}
.verdict.cont{background:#20241a;border:1px solid #5a5a2f;color:var(--gold)}
.verdict.err{background:#241416;border:1px solid #5a2a2f;color:var(--red)}
/* practice */
.q{background:var(--panel);border:1px solid var(--rule);border-radius:14px;padding:15px;margin-bottom:12px}
.q .qn{font-family:ui-monospace,monospace;font-size:.72em;color:var(--faint);letter-spacing:1px}
.q .qt{font-weight:600;margin:6px 0 12px;font-size:1.04em}
.opt{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--rule);border-radius:11px;padding:12px 14px;margin-bottom:8px;color:var(--ink);font:inherit;font-size:.98em;cursor:pointer}
.opt:active{background:#1d2c28}
.opt.correct{border-color:var(--teal);background:#13291f}
.opt.wrong{border-color:var(--red);background:#2a1613}
.opt .mk{float:right;font-weight:800}
.sol{margin-top:8px;padding:12px 14px;background:var(--panel2);border-left:3px solid var(--gold);border-radius:0 10px 10px 0;font-size:.92em;color:#d7e2de;display:none}
.sol.show{display:block}
.sol .l{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:4px}
.btn{background:var(--teal);color:#062019;border:none;border-radius:12px;padding:14px;font:700 1.02em/1 inherit;cursor:pointer;width:100%}
.btn:active{transform:translateY(1px)}
.ghost{background:none;border:1px solid var(--rule);color:var(--dim);border-radius:12px;padding:11px 16px;font:600 .92em/1 inherit;cursor:pointer}
.done-banner{text-align:center;padding:16px;color:var(--teal);font-weight:700}
/* proof trainer */
.proof{font-family:ui-monospace,monospace;font-size:.92em}
.proof .line{display:flex;gap:10px;padding:7px 10px;border-radius:8px;margin-bottom:5px;background:var(--panel2);border:1px solid var(--rule)}
.proof .line .ln{color:var(--faint);width:20px}
.proof .line .fm{flex:1;color:var(--ink)}
.proof .line .jf{color:var(--teal);font-size:.85em}
.proof .line.new{background:#13291f;border-color:#2f7a4c}
/* bottom nav */
nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:#0a1211ee;backdrop-filter:blur(10px);border-top:1px solid var(--rule);padding:8px 6px calc(env(safe-area-inset-bottom) + 8px);z-index:20}
nav button{flex:1;background:none;border:0;color:var(--faint);font-size:.68em;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:3px}
nav button .i{font-size:1.3em}
nav button.on{color:var(--teal)}
.prog-ring{--p:0;width:60px;height:60px;border-radius:50%;background:conic-gradient(var(--teal) calc(var(--p)*1%),#1a2723 0);display:flex;align-items:center;justify-content:center;margin:0 auto}
.prog-ring i{width:48px;height:48px;border-radius:50%;background:var(--panel);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--teal);font-style:normal}
.toast{position:fixed;left:50%;bottom:calc(78px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(14px);background:#0a1211;border:1px solid var(--teal);color:var(--teal);padding:10px 17px;border-radius:999px;font-weight:650;font-size:.9em;opacity:0;transition:.25s;pointer-events:none;z-index:50}
.toast.on{opacity:1;transform:translateX(-50%)}
a.hubback{position:fixed;top:calc(env(safe-area-inset-top,0px) + 8px);left:8px;z-index:2147483647;background:rgba(10,20,18,.9);color:var(--teal);border:1px solid #2a4a44;border-radius:20px;padding:7px 12px 7px 9px;font:600 14px/1 -apple-system,system-ui,sans-serif;text-decoration:none;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);box-shadow:0 2px 10px rgba(0,0,0,.45)}
/* iPhone 12 mini and other narrow phones (≤380pt): tighten to fit without horizontal scroll */
@media (max-width:380px){
  body{font-size:15px;padding-left:12px;padding-right:12px}
  h1{font-size:1.6em}
  .lede{font-size:.95em}
  .card{padding:14px}
  .mod{padding:11px 12px;gap:10px}
  .mod .num{width:27px;height:27px}
  .reader h2{font-size:1.25em}
  .eq{font-size:1.02em;padding:11px 9px}
  .keys button{min-width:38px;padding:8px 9px;font-size:1em}
  .opt{padding:11px 12px}
  .tt th,.tt td{padding:5px 8px}
  .def,.note{padding:11px 12px}
}
/* respect notch/home-bar and prevent any accidental sideways scroll */
html,body{max-width:100%;overflow-x:hidden}
</style></head>

<div class="wrap" id="app"></div>
<nav id="nav">
  <button data-v="home" class="on"><span class="i">📖</span>Learn</button>

<script>
/* ============================ content ============================ */
const S={
  not:'<span class="sym">¬</span>', and:'<span class="sym">∧</span>', or:'<span class="sym">∨</span>',
  imp:'<span class="sym">→</span>', iff:'<span class="sym">↔</span>', all:'<span class="sym">∀</span>',
  exi:'<span class="sym">∃</span>', turn:'<span class="sym">⊢</span>', equiv:'<span class="sym">≡</span>'
};
const MODULES=[
 {id:'arg',n:'Arguments, Validity & Soundness',sub:'what makes reasoning good',learn:`
  <h2>Arguments, Validity &amp; Soundness</h2>
  <p>Logic is the study of <b>good reasoning</b>. Its atom is the <b>argument</b>: one or more <b>premises</b> offered in support of a <b>conclusion</b>.</p>
  <div class="def"><span class="l">Definition · Argument</span>A set of statements where some (the <b>premises</b>) are offered as reasons to accept another (the <b>conclusion</b>).</div>
  <p>The central question is never "are the premises true?" — that's the job of the sciences. Logic asks a sharper question: <b>if the premises were true, would the conclusion have to be true?</b> That property is <b>validity</b>.</p>
  <div class="def"><span class="l">Definition · Validity</span>An argument is <b>valid</b> when it is <i>impossible</i> for all the premises to be true while the conclusion is false. Validity is about <b>form</b>, not content.</div>
  <p>The classic:</p>
  <div class="eq">All humans are mortal. &nbsp;·&nbsp; Socrates is human. &nbsp;∴&nbsp; Socrates is mortal.</div>
  <p>This is valid because of its <b>shape</b> — "All A are B; x is A; so x is B" — regardless of what A, B, and x mean. Swap in nonsense and it's still valid:</p>
  <div class="eq">All glorks are blue. &nbsp;·&nbsp; Zib is a glork. &nbsp;∴&nbsp; Zib is blue.</div>
  <h4>Soundness</h4>
  <p>Validity alone doesn't make an argument <i>good</i> — a valid argument can have false premises and a false conclusion. What we usually want is <b>soundness</b>.</p>
  <div class="def"><span class="l">Definition · Soundness</span>An argument is <b>sound</b> when it is (1) valid <b>and</b> (2) all its premises are actually true. A sound argument's conclusion is guaranteed true.</div>
  <p>Watch the four combinations. An argument can be:</p>
  <ul>
   <li><b>Valid + true premises</b> → sound, conclusion guaranteed. ✓</li>
   <li><b>Valid + a false premise</b> → unsound; conclusion may be false ("All fish fly; a trout is a fish; so a trout flies").</li>
   <li><b>Invalid</b> → the form fails even if everything is true ("Some cats are black; some black things are dogs; so some cats are dogs").</li>
  </ul>
  <div class="note"><span class="l">Key idea</span>Validity is a guarantee about <i>structure</i>: truth can't leak away between premises and conclusion. The rest of this course is about making that structure precise — first with <b>truth tables</b>, then with <b>proofs</b>.</div>
  <h4>Deductive vs. inductive</h4>
  <p>A <b>deductive</b> argument aims for validity — the conclusion is <i>contained</i> in the premises. An <b>inductive</b> argument aims only for <i>probability</i> — the premises make the conclusion likely (every swan I've seen is white, so all swans are white). This course is about deductive logic, where "valid" is black-and-white.</p>`,
  practice:[
   {q:'An argument is <b>valid</b> exactly when:',o:['It is impossible for the premises to be true and the conclusion false','Its premises are all true','Its conclusion is true','It is persuasive'],a:0,s:'Validity is purely structural: true premises could not lead to a false conclusion. Actual truth of the premises is a separate matter (soundness).'},
   {q:'A <b>sound</b> argument is one that is:',o:['Valid AND has all true premises','Valid OR has true premises','Just valid','Just persuasive'],a:0,s:'Soundness = validity + actually-true premises. Only then is the conclusion guaranteed true.'},
   {q:'"All fish can fly. A trout is a fish. So a trout can fly." This argument is:',o:['Valid but unsound','Invalid','Sound','Inductive'],a:0,s:'The form is perfect (All A are B; x is A; ∴ x is B) so it is valid — but the first premise is false, so it is unsound.'},
   {q:'Reasoning "every swan I have seen is white, so all swans are white" is:',o:['Inductive','Deductive and valid','A contradiction','Sound'],a:0,s:'It generalizes from observed cases to all cases — the premises make the conclusion probable, not certain. That is induction.'}
  ]},
 {id:'conn',n:'Statements & the Connectives',sub:'the five logical operators',learn:`
  <h2>Statements &amp; the Connectives</h2>
  <p>Propositional logic is built from <b>propositions</b> — declarative statements that are either true or false (never both, never neither).</p>
  <div class="def"><span class="l">Definition · Proposition</span>A sentence with a definite truth value. "Paris is in France" is a proposition; "Shut the door!" and "Is it raining?" are not.</div>
  <p>We label atomic propositions with letters: <b>P</b>, <b>Q</b>, <b>A</b>, <b>B</b>… Then we glue them with five <b>connectives</b>:</p>
  <h4>${S.not} Negation — "not"</h4>
  <p><span class="sym">¬P</span> ("not P") flips the truth value. If P is true, ¬P is false, and vice-versa.</p>
  <h4>${S.and} Conjunction — "and"</h4>
  <p><span class="sym">P ∧ Q</span> is true <b>only</b> when both P and Q are true. "It is cold and raining" needs both.</p>
  <h4>${S.or} Disjunction — "or"</h4>
  <p><span class="sym">P ∨ Q</span> is true when <b>at least one</b> holds. This is <b>inclusive</b> or: it's still true if both are true. (English "or" is sometimes exclusive — "soup or salad" — but logic's default ∨ is inclusive.)</p>
  <h4>${S.imp} Conditional — "if… then"</h4>
  <p><span class="sym">P → Q</span> ("if P then Q"). P is the <b>antecedent</b>, Q the <b>consequent</b>. The subtle one: P → Q is false in <b>only one</b> case — when P is true but Q is false. A promise "if it rains, I'll bring an umbrella" is broken only when it rains and you don't. If it doesn't rain, you kept the promise no matter what — this is called being <b>vacuously true</b>.</p>
  <h4>${S.iff} Biconditional — "if and only if"</h4>
  <p><span class="sym">P ↔ Q</span> is true when P and Q have the <b>same</b> truth value — both true or both false. It means P → Q <i>and</i> Q → P.</p>
  <div class="note"><span class="l">Translation traps</span>
   • "P unless Q" = <span class="sym">¬Q → P</span> = <span class="sym">P ∨ Q</span>.<br>
   • "P only if Q" = <span class="sym">P → Q</span> (Q is <b>necessary</b> for P).<br>
   • "P if Q" = <span class="sym">Q → P</span> (Q is <b>sufficient</b> for P).<br>
   • "Q is necessary for P" = <span class="sym">P → Q</span>; "Q is sufficient for P" = <span class="sym">Q → P</span>.</div>`,
  practice:[
   {q:'<span class="sym">P ∨ Q</span> (inclusive or) is <b>false</b> in which case?',o:['P false and Q false','P true and Q false','P true and Q true','P false and Q true'],a:0,s:'Inclusive disjunction fails only when both disjuncts are false. Any true disjunct makes it true.'},
   {q:'The conditional <span class="sym">P → Q</span> is <b>false</b> only when:',o:['P is true and Q is false','P is false and Q is true','both are false','both are true'],a:0,s:'A conditional is broken exactly when the antecedent holds but the consequent fails. Every other row is true.'},
   {q:'"You may enter only if you have a ticket" translates to:',o:['enter → ticket','ticket → enter','enter ↔ ticket','¬ticket'],a:0,s:'"P only if Q" makes Q necessary for P, i.e. P → Q. Having a ticket is necessary to enter.'},
   {q:'<span class="sym">P ↔ Q</span> is true when:',o:['P and Q have the same truth value','at least one is true','P is false','both are false'],a:0,s:'The biconditional asserts P and Q match — true together or false together.'},
   {q:'If it does not rain, the promise "if it rains, I bring an umbrella" is:',o:['Vacuously true','False','Undefined','A contradiction'],a:0,s:'When the antecedent (rain) is false, the conditional is automatically true regardless of the umbrella — vacuously true.'}
  ]},
 {id:'tt',n:'Truth Tables',sub:'compute meaning mechanically',learn:`
  <h2>Truth Tables</h2>
  <p>A <b>truth table</b> lists every possible assignment of truth values to the atoms and computes the value of the whole formula. With <b>n</b> distinct atoms there are <b>2<sup>n</sup></b> rows — the complete space of possibilities.</p>
  <p>The five connectives, as tables (T = true, F = false):</p>
  <div class="ttwrap"><table class="tt">
   <tr><th>P</th><th>Q</th><th class="res">¬P</th><th class="res">P∧Q</th><th class="res">P∨Q</th><th class="res">P→Q</th><th class="res">P↔Q</th></tr>
   <tr><td class="T">T</td><td class="T">T</td><td class="res F">F</td><td class="res T">T</td><td class="res T">T</td><td class="res T">T</td><td class="res T">T</td></tr>
   <tr><td class="T">T</td><td class="F">F</td><td class="res F">F</td><td class="res F">F</td><td class="res T">T</td><td class="res F">F</td><td class="res F">F</td></tr>
   <tr><td class="F">F</td><td class="T">T</td><td class="res T">T</td><td class="res F">F</td><td class="res T">T</td><td class="res T">T</td><td class="res F">F</td></tr>
   <tr><td class="F">F</td><td class="F">F</td><td class="res T">T</td><td class="res F">F</td><td class="res F">F</td><td class="res T">T</td><td class="res T">T</td></tr>
  </table></div>
  <h4>Building up a compound formula</h4>
  <p>Evaluate from the inside out, one connective at a time. For <span class="sym">(P ∧ Q) → ¬P</span> you'd add a column for <span class="sym">P∧Q</span>, a column for <span class="sym">¬P</span>, then combine them with →. The rightmost column is the formula's meaning.</p>
  <div class="note"><span class="l">Do it live</span>The <b>Lab</b> tab builds the full truth table for any formula you type — try <span class="sym">(P → Q) ↔ (¬Q → ¬P)</span> and watch every row come out true.</div>
  <h4>Precedence</h4>
  <p>To cut parentheses, connectives bind in this order (tightest first): <b>¬</b>, then <b>∧</b>, then <b>∨</b>, then <b>→</b>, then <b>↔</b>. So <span class="sym">¬P ∧ Q → R</span> means <span class="sym">((¬P) ∧ Q) → R</span>. When in doubt, add parentheses.</p>`,
  practice:[
   {q:'A formula with 3 distinct atoms has how many truth-table rows?',o:['8','6','3','9'],a:0,s:'Rows = 2ⁿ. With n = 3 atoms, 2³ = 8 rows cover every combination.'},
   {q:'In the row P = T, Q = F, the value of <span class="sym">P → Q</span> is:',o:['F','T','undefined','depends'],a:0,s:'True antecedent, false consequent — the single case where a conditional is false.'},
   {q:'In the row P = F, Q = F, the value of <span class="sym">¬P ∨ Q</span> is:',o:['T','F','undefined','T only if Q is T'],a:0,s:'¬P is T (since P is F), and T ∨ anything = T. Note ¬P ∨ Q is exactly P → Q.'},
   {q:'By precedence, <span class="sym">¬P ∧ Q</span> parses as:',o:['(¬P) ∧ Q','¬(P ∧ Q)','¬(P) ∧ ¬(Q)','P ∧ (¬Q)'],a:0,s:'Negation binds tighter than ∧, so it applies to P alone before the conjunction.'}
  ]},
 {id:'equiv',n:'Tautologies, Equivalence & the Laws',sub:'when two formulas mean the same',learn:`
  <h2>Tautologies, Equivalence &amp; the Laws</h2>
  <p>Classify any formula by its truth-table column:</p>
  <div class="def"><span class="l">Three kinds</span>
   <b>Tautology</b> — true in <i>every</i> row (e.g. <span class="sym">P ∨ ¬P</span>).<br>
   <b>Contradiction</b> — false in every row (e.g. <span class="sym">P ∧ ¬P</span>).<br>
   <b>Contingency</b> — true in some rows, false in others (most formulas).</div>
  <p>Tautologies are the <b>laws of logic</b>: they hold no matter what the atoms mean. Validity connects to them directly — an argument is valid <b>iff</b> "(all premises) → (conclusion)" is a tautology.</p>
  <h4>Logical equivalence</h4>
  <div class="def"><span class="l">Definition · Equivalence</span>Two formulas are <b>logically equivalent</b> (written <span class="sym">≡</span>) when they have identical truth tables — the same value in every row. Equivalently, <span class="sym">A ↔ B</span> is a tautology.</div>
  <p>The essential equivalences — memorize these, they're the algebra of logic:</p>
  <ul>
   <li><b>Double negation:</b> <span class="sym">¬¬P ≡ P</span></li>
   <li><b>Commutativity:</b> <span class="sym">P ∧ Q ≡ Q ∧ P</span>, &nbsp;<span class="sym">P ∨ Q ≡ Q ∨ P</span></li>
   <li><b>Associativity:</b> <span class="sym">(P ∧ Q) ∧ R ≡ P ∧ (Q ∧ R)</span></li>
   <li><b>Distribution:</b> <span class="sym">P ∧ (Q ∨ R) ≡ (P ∧ Q) ∨ (P ∧ R)</span></li>
   <li><b>De Morgan's laws:</b> <span class="sym">¬(P ∧ Q) ≡ ¬P ∨ ¬Q</span> &nbsp;and&nbsp; <span class="sym">¬(P ∨ Q) ≡ ¬P ∧ ¬Q</span></li>
   <li><b>Conditional as disjunction:</b> <span class="sym">P → Q ≡ ¬P ∨ Q</span></li>
   <li><b>Contrapositive:</b> <span class="sym">P → Q ≡ ¬Q → ¬P</span></li>
   <li><b>Biconditional:</b> <span class="sym">P ↔ Q ≡ (P → Q) ∧ (Q → P)</span></li>
  </ul>
  <div class="note"><span class="l">De Morgan in one breath</span>"Not (both)" = "at least one not." "Not (either)" = "neither." Pushing a negation inward flips ∧ ↔ ∨. This is the single most-used law in all of logic and programming.</div>
  <p>A common trap: the <b>converse</b> <span class="sym">Q → P</span> is <i>not</i> equivalent to <span class="sym">P → Q</span>. Only the <b>contrapositive</b> <span class="sym">¬Q → ¬P</span> is. "If rain then clouds" does not give "if clouds then rain."</p>`,
  practice:[
   {q:'<span class="sym">P ∨ ¬P</span> is a:',o:['Tautology','Contradiction','Contingency','Converse'],a:0,s:'Either P or its negation must hold, so the formula is true in every row — the law of excluded middle.'},
   {q:'<span class="sym">¬(P ∧ Q)</span> is equivalent to:',o:['¬P ∨ ¬Q','¬P ∧ ¬Q','P ∨ Q','¬P → Q'],a:0,s:"De Morgan: negating a conjunction distributes as a disjunction of negations. 'Not both' = 'at least one not.'"},
   {q:'<span class="sym">P → Q</span> is equivalent to:',o:['¬P ∨ Q','P ∨ ¬Q','Q → P','¬P ∧ Q'],a:0,s:'The conditional rewrites as ¬(antecedent) ∨ (consequent). Check the truth tables: they match in all four rows.'},
   {q:'The contrapositive of "if P then Q" is:',o:['¬Q → ¬P','Q → P','¬P → ¬Q','P → ¬Q'],a:0,s:'Contrapositive negates and swaps: ¬Q → ¬P. It is always equivalent to the original (unlike the converse Q → P).'},
   {q:'An argument is valid iff "(premises) → (conclusion)" is a:',o:['Tautology','Contradiction','Contingency','Converse'],a:0,s:'If that conditional is true in every row, then no row has true premises with a false conclusion — exactly validity.'}
  ]},
 {id:'rules',n:'Rules of Inference',sub:'the legal moves of proof',learn:`
  <h2>Rules of Inference</h2>
  <p>Truth tables always work but blow up (2<sup>n</sup> rows). <b>Rules of inference</b> are a faster path: small, pre-certified valid patterns you can chain into a proof. Each is a tautology in disguise.</p>
  <h4>The workhorses</h4>
  <div class="def"><span class="l">Modus Ponens (MP)</span>From <span class="sym">P → Q</span> and <span class="sym">P</span>, infer <span class="sym">Q</span>.<br><i>"If it rains the ground is wet; it's raining; so the ground is wet."</i></div>
  <div class="def"><span class="l">Modus Tollens (MT)</span>From <span class="sym">P → Q</span> and <span class="sym">¬Q</span>, infer <span class="sym">¬P</span>.<br><i>"If it rains the ground is wet; the ground is dry; so it isn't raining."</i></div>
  <div class="def"><span class="l">Hypothetical Syllogism (HS)</span>From <span class="sym">P → Q</span> and <span class="sym">Q → R</span>, infer <span class="sym">P → R</span>. (Chaining conditionals.)</div>
  <div class="def"><span class="l">Disjunctive Syllogism (DS)</span>From <span class="sym">P ∨ Q</span> and <span class="sym">¬P</span>, infer <span class="sym">Q</span>. (Eliminate a ruled-out option.)</div>
  <p>And the "bookkeeping" rules:</p>
  <ul>
   <li><b>Simplification:</b> from <span class="sym">P ∧ Q</span>, infer <span class="sym">P</span> (or <span class="sym">Q</span>).</li>
   <li><b>Conjunction:</b> from <span class="sym">P</span> and <span class="sym">Q</span>, infer <span class="sym">P ∧ Q</span>.</li>
   <li><b>Addition:</b> from <span class="sym">P</span>, infer <span class="sym">P ∨ Q</span> (for any Q — a true disjunct makes the disjunction true).</li>
   <li><b>Constructive Dilemma:</b> from <span class="sym">(P → Q) ∧ (R → S)</span> and <span class="sym">P ∨ R</span>, infer <span class="sym">Q ∨ S</span>.</li>
  </ul>
  <div class="note"><span class="l">Two famous traps (invalid!)</span>
   <b>Affirming the consequent:</b> from <span class="sym">P → Q</span> and <span class="sym">Q</span>, concluding <span class="sym">P</span>. ✗ (Wet ground doesn't prove rain — a sprinkler works too.)<br>
   <b>Denying the antecedent:</b> from <span class="sym">P → Q</span> and <span class="sym">¬P</span>, concluding <span class="sym">¬Q</span>. ✗</div>`,
  practice:[
   {q:'From <span class="sym">P → Q</span> and <span class="sym">P</span>, you may infer:',o:['Q','P','¬Q','P → Q'],a:0,s:'Modus ponens: assert the antecedent, detach the consequent.'},
   {q:'From <span class="sym">P → Q</span> and <span class="sym">¬Q</span>, you may infer:',o:['¬P','P','Q','¬Q → P'],a:0,s:'Modus tollens: deny the consequent, conclude the antecedent is false.'},
   {q:'From <span class="sym">P ∨ Q</span> and <span class="sym">¬P</span>, you may infer:',o:['Q','P','¬Q','P ∧ Q'],a:0,s:'Disjunctive syllogism: one disjunct is ruled out, so the other must hold.'},
   {q:'From <span class="sym">P → Q</span> and <span class="sym">Q</span>, concluding <span class="sym">P</span> is:',o:['Invalid — affirming the consequent','Modus ponens','Modus tollens','Valid'],a:0,s:'This is the classic fallacy of affirming the consequent. Q could be made true by something other than P.'},
   {q:'From <span class="sym">A → B</span> and <span class="sym">B → C</span>, you may infer:',o:['A → C','C → A','A ∧ C','B'],a:0,s:'Hypothetical syllogism chains the two conditionals into A → C.'}
  ]},
 {id:'proof',n:'Natural Deduction',sub:'chain rules into real proofs',learn:`
  <h2>Natural Deduction</h2>
  <p>A <b>proof</b> derives a conclusion from premises by a sequence of steps, each justified by a rule of inference or an earlier line. When you reach the conclusion, the argument is proven valid — no truth table needed.</p>
  <p>Notation: <span class="sym">P₁, P₂, … ⊢ C</span> means "from these premises, C is derivable." The <span class="sym">⊢</span> is the <b>turnstile</b>.</p>
  <h4>A worked proof</h4>
  <p>Show that <span class="sym">P → Q, &nbsp;Q → R, &nbsp;P &nbsp;⊢&nbsp; R</span>:</p>
  <div class="proof">
   <div class="line"><span class="ln">1</span><span class="fm">P → Q</span><span class="jf">premise</span></div>
   <div class="line"><span class="ln">2</span><span class="fm">Q → R</span><span class="jf">premise</span></div>
   <div class="line"><span class="ln">3</span><span class="fm">P</span><span class="jf">premise</span></div>
   <div class="line"><span class="ln">4</span><span class="fm">Q</span><span class="jf">MP 1,3</span></div>
   <div class="line"><span class="ln">5</span><span class="fm">R</span><span class="jf">MP 2,4</span></div>
  </div>
  <p>Each line is either a premise or follows from earlier lines by a named rule. Line 4 detaches Q from lines 1 and 3 (modus ponens); line 5 detaches R. Done.</p>
  <h4>Conditional proof (assumptions)</h4>
  <p>To prove a conditional <span class="sym">P → Q</span>, <b>assume</b> P, derive Q, then <b>discharge</b> the assumption to conclude P → Q. The assumption is temporary — it lives inside an indented sub-proof and is "paid off" the moment you form the conditional. This is how you prove "if…then" statements you weren't handed directly.</p>
  <div class="note"><span class="l">Strategy</span>Work <b>forwards</b> from premises (what can I detach?) and <b>backwards</b> from the goal (what would give me the conclusion — an MP? a conjunction?). Meet in the middle. The <b>Practice</b> tab has a step-by-step proof to build.</div>`,
  practice:[
   {q:'In a proof, the justification "MP 1,3" means line derived by:',o:['Modus ponens from lines 1 and 3','A premise','Modus tollens','Assumption'],a:0,s:'Rule name + the line numbers it uses. MP 1,3 = modus ponens applied to lines 1 and 3.'},
   {q:'To prove a conditional <span class="sym">P → Q</span> by conditional proof, you first:',o:['Assume P, then derive Q','Assume Q','Assume ¬P','Assert P → Q as a premise'],a:0,s:'Conditional proof: assume the antecedent, derive the consequent, discharge to get the conditional.'},
   {q:'Given premises <span class="sym">A → B</span>, <span class="sym">A</span>, and <span class="sym">B → C</span>, the shortest route to <span class="sym">C</span> is:',o:['MP to get B, then MP to get C','MT twice','Addition','Truth table'],a:0,s:'A→B with A gives B (MP); B→C with B gives C (MP). Two clean detachments.'},
   {q:'The turnstile <span class="sym">⊢</span> in "Γ ⊢ C" means:',o:['C is derivable from the premises Γ','C is true','C is false','C is a premise'],a:0,s:'It asserts provability: there is a proof of C using the premises in Γ.'}
  ]},
 {id:'pred',n:'Predicate Logic & Quantifiers',sub:'inside the atoms',learn:`
  <h2>Predicate Logic &amp; Quantifiers</h2>
  <p>Propositional logic can't see <i>inside</i> a statement. It treats "Socrates is mortal" as one blank atom, so it can't explain why "All humans are mortal; Socrates is human; ∴ Socrates is mortal" is valid. <b>Predicate (first-order) logic</b> opens the atom.</p>
  <div class="def"><span class="l">Predicates & objects</span>A <b>predicate</b> is a property or relation with slots: <span class="sym">Mortal(x)</span>, <span class="sym">Human(x)</span>, <span class="sym">Loves(x, y)</span>. Fill the slots with objects from a <b>domain</b> and you get a true-or-false proposition: <span class="sym">Human(socrates)</span>.</div>
  <h4>The two quantifiers</h4>
  <div class="def"><span class="l">Universal ∀</span><span class="sym">∀x P(x)</span> — "for <b>all</b> x, P(x)." True when every object in the domain satisfies P.</div>
  <div class="def"><span class="l">Existential ∃</span><span class="sym">∃x P(x)</span> — "there <b>exists</b> an x such that P(x)." True when at least one object satisfies P.</div>
  <h4>Translating "all" and "some"</h4>
  <p>The two canonical patterns — and their connectives are <i>not</i> interchangeable:</p>
  <div class="eq">"All A are B" &nbsp;=&nbsp; ∀x ( A(x) → B(x) )</div>
  <div class="eq">"Some A are B" &nbsp;=&nbsp; ∃x ( A(x) ∧ B(x) )</div>
  <p>Universal pairs with <b>→</b> (of everything, <i>if</i> it's an A then it's a B); existential pairs with <b>∧</b> (something that is <i>both</i> A and B). Using ∧ with ∀ or → with ∃ is the classic beginner error.</p>
  <h4>Negating quantifiers</h4>
  <p>Push a negation through a quantifier and it flips — the quantifier version of De Morgan:</p>
  <div class="eq">¬∀x P(x) &nbsp;≡&nbsp; ∃x ¬P(x) &nbsp;&nbsp;·&nbsp;&nbsp; ¬∃x P(x) &nbsp;≡&nbsp; ∀x ¬P(x)</div>
  <p>"Not everything is P" = "something is not P." "Nothing is P" = "everything is not P."</p>
  <div class="note"><span class="l">Order matters</span><span class="sym">∀x ∃y Loves(x,y)</span> ("everyone loves someone") is very different from <span class="sym">∃y ∀x Loves(x,y)</span> ("someone is loved by everyone"). Swapping ∀ and ∃ changes the meaning.</div>`,
  practice:[
   {q:'"All dogs are mammals" is best written:',o:['∀x (Dog(x) → Mammal(x))','∀x (Dog(x) ∧ Mammal(x))','∃x (Dog(x) → Mammal(x))','∃x (Dog(x) ∧ Mammal(x))'],a:0,s:'Universal + conditional: for everything, if it is a dog then it is a mammal. Using ∧ would claim everything is a dog.'},
   {q:'"Some students passed" is best written:',o:['∃x (Student(x) ∧ Passed(x))','∃x (Student(x) → Passed(x))','∀x (Student(x) ∧ Passed(x))','∀x (Student(x) → Passed(x))'],a:0,s:'Existential + conjunction: there is something that is both a student and passed. With → it would be trivially satisfied by any non-student.'},
   {q:'<span class="sym">¬∀x P(x)</span> is equivalent to:',o:['∃x ¬P(x)','∀x ¬P(x)','¬∃x P(x)','∃x P(x)'],a:0,s:'Negated universal becomes existential of the negation: "not all are P" = "some is not P."'},
   {q:'<span class="sym">∀x ∃y Loves(x,y)</span> says:',o:['Everyone loves someone (possibly different people)','Someone is loved by everyone','Everyone loves everyone','No one loves anyone'],a:0,s:'For each x there is some y they love — the y can vary with x. That differs from ∃y ∀x (one fixed beloved).'}
  ]},
 {id:'fall',n:'Fallacies',sub:'reasoning that only looks valid',learn:`
  <h2>Fallacies</h2>
  <p>A <b>fallacy</b> is an argument that persuades without being valid. Two families: <b>formal</b> fallacies (a broken logical form) and <b>informal</b> fallacies (the form is irrelevant — the flaw is in content, relevance, or language).</p>
  <h4>Formal fallacies</h4>
  <ul>
   <li><b>Affirming the consequent:</b> <span class="sym">P → Q</span>, <span class="sym">Q</span>, ∴ <span class="sym">P</span>. "If she studied she passed; she passed; so she studied." (She might have passed anyway.)</li>
   <li><b>Denying the antecedent:</b> <span class="sym">P → Q</span>, <span class="sym">¬P</span>, ∴ <span class="sym">¬Q</span>. "If it rains the game is cancelled; it didn't rain; so it wasn't cancelled." (Could be cancelled for another reason.)</li>
  </ul>
  <h4>Informal fallacies</h4>
  <ul>
   <li><b>Ad hominem:</b> attacking the person instead of their argument.</li>
   <li><b>Straw man:</b> refuting a distorted, weaker version of the opponent's claim.</li>
   <li><b>False dilemma:</b> presenting two options as exhaustive when more exist.</li>
   <li><b>Slippery slope:</b> claiming one step inevitably triggers an extreme chain, without support.</li>
   <li><b>Circular reasoning (begging the question):</b> the conclusion is smuggled into the premises.</li>
   <li><b>Appeal to authority:</b> "X said so" where X isn't a relevant expert (or experts disagree).</li>
   <li><b>Hasty generalization:</b> a sweeping claim from too few cases.</li>
   <li><b>Post hoc:</b> "after, therefore because of" — mistaking sequence for causation.</li>
   <li><b>Equivocation:</b> a key word shifts meaning mid-argument.</li>
  </ul>
  <div class="note"><span class="l">The test</span>For any persuasive argument, ask the two logic questions: <b>Is the form valid?</b> (attacks formal fallacies) and <b>Are the premises relevant and true?</b> (attacks informal ones). Most bad arguments fail one of these — now you can name exactly which.</div>`,
  practice:[
   {q:'"If he\'s guilty he\'ll be nervous. He\'s nervous. So he\'s guilty." This is:',o:['Affirming the consequent','Modus ponens','Denying the antecedent','Valid'],a:0,s:'Form is P→Q, Q, ∴ P — affirming the consequent. Nervousness has many causes.'},
   {q:'"You can\'t trust her argument about taxes — she\'s been divorced twice." This is:',o:['Ad hominem','Straw man','False dilemma','Equivocation'],a:0,s:'It attacks the person rather than engaging the argument — ad hominem.'},
   {q:'"Either we ban cars entirely or the planet dies." This is:',o:['False dilemma','Slippery slope','Post hoc','Circular reasoning'],a:0,s:'It presents only two options when many intermediate policies exist — a false dilemma.'},
   {q:'"The team lost right after I wore this shirt, so my shirt caused the loss." This is:',o:['Post hoc','Hasty generalization','Straw man','Appeal to authority'],a:0,s:'Post hoc ergo propter hoc: treating "after" as "because of." Sequence is not causation.'},
   {q:'"We should allow free speech because people should be able to say what they want." This is:',o:['Circular reasoning','Ad hominem','False dilemma','Slippery slope'],a:0,s:'The premise just restates the conclusion — it begs the question rather than supporting it.'}
  ]}
];

/* guided proof for the proof module practice-extra (shown in Learn) */

/* ============================ state ============================ */
const KEY='sh_logic';
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return{}}}
function save(s){localStorage.setItem(KEY,JSON.stringify(s))}
let P=load(); P.done=P.done||{}; P.xp=P.xp||0; P.pass=P.pass||{};
function persist(){save(P)}

const app=document.getElementById('app');
let view='home', curMod=null, curTab='learn';

/* ============================ views ============================ */
function render(){
  if(view==='home') return renderHome();
  if(view==='lab') return renderLab();
  if(view==='prog') return renderProg();
  if(view==='mod') return renderMod();
}
function renderHome(){
  const done=Object.keys(P.done).length;
  app.innerHTML=`
    <div class="eyebrow">Reasoning · propositional → predicate</div>
    <h1>Logic, <em>from the ground up</em></h1>
    <p class="lede">Eight modules from "what makes an argument valid" to quantifiers and fallacies — each with a lesson and graded practice. Plus a live <b>Truth-Table Lab</b> that evaluates any formula you type.</p>
    <button class="card labcard" style="width:100%;text-align:left;cursor:pointer" onclick="go('lab')">
      <h3>🔬 Truth-Table Lab</h3>
      <p style="color:var(--dim);margin:5px 0 0;font-size:.92em">Type a formula — get its full truth table, classification, and check argument validity. Open anytime.</p>
    </button>
    <div class="sec">The course · ${done}/${MODULES.length} complete</div>
    ${MODULES.map((m,i)=>`
      <button class="mod ${P.done[m.id]?'done':''}" onclick="openMod('${m.id}')">
        <span class="num">${P.done[m.id]?'✓':i+1}</span>
        <span class="mt"><b>${m.n}</b><small>${m.sub}</small></span>
        <span class="go">›</span>
      </button>`).join('')}
    <p style="color:var(--faint);font-size:.82em;text-align:center;margin-top:18px">Progress is saved on this device.</p>`;
}
function openMod(id){curMod=MODULES.find(m=>m.id===id);curTab='learn';view='mod';setNav('home');render();window.scrollTo(0,0);}
function renderMod(){
  const m=curMod;
  app.innerHTML=`
    <div class="backbar"><button class="b" onclick="go('home')">‹ All modules</button></div>
    <div class="tabs2">
      <button class="${curTab==='learn'?'on':''}" onclick="setTab('learn')">Learn</button>
      <button class="${curTab==='practice'?'on':''}" onclick="setTab('practice')">Practice</button>
    </div>
    <div id="modbody"></div>`;
  if(curTab==='learn'){
    document.getElementById('modbody').innerHTML=`<div class="reader">${m.learn}</div>
      <button class="btn" style="margin-top:8px" onclick="setTab('practice')">Practice this module ›</button>`;
  } else {
    renderPractice(m);
  }
}
function setTab(t){curTab=t;render();window.scrollTo(0,0);}

let answered={};
function renderPractice(m){
  answered={};
  const body=document.getElementById('modbody');
  body.innerHTML=`<div id="qs"></div>
    <div id="pfoot"></div>`;
  drawQs(m);
}
function drawQs(m){
  const qs=document.getElementById('qs');
  qs.innerHTML=m.practice.map((p,qi)=>`
    <div class="q" id="q${qi}">
      <div class="qn">QUESTION ${qi+1} / ${m.practice.length}</div>
      <div class="qt">${p.q}</div>
      <div id="opts${qi}">${p.o.map((o,oi)=>`<button class="opt" onclick="pick(${qi},${oi})">${o}</button>`).join('')}</div>
      <div class="sol" id="sol${qi}"><span class="l">Why</span>${p.s}</div>
    </div>`).join('');
  updateFoot(m);
}
function pick(qi,oi){
  const m=curMod, p=m.practice[qi];
  if(answered[qi]!==undefined) return;
  answered[qi]=oi;
  const opts=document.querySelectorAll(`#opts${qi} .opt`);
  opts.forEach((b,bi)=>{
    b.style.pointerEvents='none';
    if(bi===p.a){b.classList.add('correct');b.innerHTML+='<span class="mk">✓</span>';}
    else if(bi===oi){b.classList.add('wrong');b.innerHTML+='<span class="mk">✗</span>';}
  });
  document.getElementById('sol'+qi).classList.add('show');
  updateFoot(m);
}
function updateFoot(m){
  const total=m.practice.length;
  const ans=Object.keys(answered).length;
  const correct=Object.entries(answered).filter(([qi,oi])=>m.practice[qi].a===+oi).length;
  const foot=document.getElementById('pfoot');
  if(ans<total){
    foot.innerHTML=`<p style="text-align:center;color:var(--faint);font-size:.85em;margin:6px 0 16px">${ans}/${total} answered · ${correct} correct</p>`;
    return;
  }
  const passed=correct>=Math.ceil(total*0.75);
  if(passed && !P.done[m.id]){ P.done[m.id]=1; P.xp+=25; persist(); toast('Module complete · +25 XP'); }
  P.pass[m.id]=correct+'/'+total; persist();
  foot.innerHTML=`<div class="card" style="text-align:center">
    <div style="font-size:1.6em;font-weight:800;color:${passed?'var(--teal)':'var(--gold)'}">${correct}/${total}</div>
    <p style="color:var(--dim);margin:4px 0 12px">${passed?'Module complete — nicely reasoned. ✓':'Review the explanations and try again to pass (75%+).'}</p>
    <div style="display:flex;gap:9px">
      <button class="ghost" style="flex:1" onclick="setTab('learn')">Reread</button>
      ${passed?`<button class="btn" style="flex:1" onclick="nextMod()">Next module ›</button>`:`<button class="btn" style="flex:1" onclick="setTab('practice')">Retry</button>`}
    </div></div>`;
}
function nextMod(){
  const i=MODULES.findIndex(m=>m.id===curMod.id);
  if(i<MODULES.length-1){ openMod(MODULES[i+1].id); }
  else { go('home'); toast('You finished the course! 🎓'); }
}

/* ============================ TRUTH-TABLE LAB ============================ */
/* tokenizer → recursive-descent parser → evaluator over all assignments */
function tokenize(src){
  // map every operator to a non-letter sentinel so variable letters never collide
  const s=src.replace(/<->|↔|≡/g,'=').replace(/->|→|⊃/g,'>')
    .replace(/\band\b/gi,'&').replace(/\bor\b/gi,'|')
    .replace(/[~!¬]/g,'!').replace(/[∧·]/g,'&').replace(/[∨]/g,'|');
  const t=[];
  for(const ch of s){
    if(/[A-Za-z]/.test(ch)) t.push({v:ch.toUpperCase()});
    else if(ch==='!') t.push({op:'N'});
    else if(ch==='&') t.push({op:'A'});
    else if(ch==='|') t.push({op:'O'});
    else if(ch==='>') t.push({op:'I'});
    else if(ch==='=') t.push({op:'B'});
    else if(ch==='('||ch===')') t.push({p:ch});
    else if(/\s/.test(ch)) continue;
    else throw new Error('Unexpected "'+ch+'"');
  }
  return t;
}
function parse(tokens){
  let i=0;
  const peek=()=>tokens[i], next=()=>tokens[i++];
  function prim(){
    const t=next();
    if(!t) throw new Error('Unexpected end of formula');
    if(t.p==='('){ const e=iff(); const c=next(); if(!c||c.p!==')') throw new Error('Missing ")"'); return e; }
    if(t.v) return {v:t.v};
    if(t.op==='N') return {op:'N',a:prim()};
    throw new Error('Expected a variable or "("');
  }
  function unary(){ if(peek()&&peek().op==='N'){ next(); return {op:'N',a:unary()}; } return prim(); }
  function bin(sub,ops){ let l=sub(); while(peek()&&ops.includes(peek().op)){ const o=next().op; const r=sub(); l={op:o,a:l,b:r}; } return l; }
  const and=()=>bin(unary,['A']);
  const or =()=>bin(and,['O']);
  function imp(){ const l=or(); if(peek()&&peek().op==='I'){ next(); return {op:'I',a:l,b:imp()}; } return l; } // right-assoc
  function iff(){ return bin(imp,['B']); }
  const tree=iff();
  if(i<tokens.length) throw new Error('Unexpected extra input');
  return tree;
}
function vars(node,set){ if(node.v) set.add(node.v); if(node.a)vars(node.a,set); if(node.b)vars(node.b,set); return set; }
function evl(node,env){
  if(node.v) return env[node.v];
  switch(node.op){
    case 'N': return !evl(node.a,env);
    case 'A': return evl(node.a,env)&&evl(node.b,env);
    case 'O': return evl(node.a,env)||evl(node.b,env);
    case 'I': return !evl(node.a,env)||evl(node.b,env);
    case 'B': return evl(node.a,env)===evl(node.b,env);
  }
}
function buildTable(formula){
  const tree=parse(tokenize(formula));
  const vs=[...vars(tree,new Set())].sort();
  if(vs.length>5) throw new Error('Please use at most 5 distinct variables (A–Z).');
  const rows=[]; const n=vs.length;
  for(let m=(1<<n)-1;m>=0;m--){
    const env={}; vs.forEach((v,k)=>env[v]=!!(m&(1<<(n-1-k))));
    rows.push({env,val:evl(tree,env)});
  }
  const allT=rows.every(r=>r.val), allF=rows.every(r=>!r.val);
  return {vs,rows,cls:allT?'taut':allF?'contra':'cont'};
}
function niceFormula(f){
  return f.replace(/<->|↔/g,' ↔ ').replace(/->|→/g,' → ').replace(/[~!]/g,'¬').replace(/&/g,' ∧ ').replace(/\|/g,' ∨ ').replace(/\s+/g,' ').trim();
}
let labMode='formula';
function renderLab(){
  app.innerHTML=`
    <div class="eyebrow">Interactive</div>
    <h1>🔬 Truth-Table <em>Lab</em></h1>
    <div class="tabs2">
      <button class="${labMode==='formula'?'on':''}" onclick="setLabMode('formula')">Formula</button>
      <button class="${labMode==='arg'?'on':''}" onclick="setLabMode('arg')">Argument</button>
    </div>
    <div id="labbody"></div>`;
  if(labMode==='formula') labFormula(); else labArg();
}
function setLabMode(m){labMode=m;renderLab();}
function labFormula(){
  document.getElementById('labbody').innerHTML=`
    <div class="card">
      <p style="color:var(--dim);font-size:.9em;margin-bottom:9px">Type a formula. Use variables A–E and operators below (or type <span class="sym">~ &amp; | -&gt; &lt;-&gt;</span>).</p>
      <input class="labin" id="finput" value="(P -> Q) <-> (~Q -> ~P)" autocapitalize="characters" autocomplete="off" spellcheck="false">
      <div class="keys" id="keys"></div>
      <button class="btn" onclick="runFormula()">Build truth table</button>
    </div>
    <div id="fout"></div>`;
  const keys=[['A','A'],['B','B'],['C','C'],['P','P'],['Q','Q'],['R','R'],['¬','~'],['∧','&'],['∨','|'],['→','->'],['↔','<->'],['(','('],[')',')']];
  document.getElementById('keys').innerHTML=keys.map(([l,v])=>`<button onclick="ins('${v}')">${l}</button>`).join('')+
    `<button class="wide" onclick="clr()">clear</button>`;
  runFormula();
}
function ins(v){const el=document.getElementById('finput');el.value+=v;el.focus();}
function clr(){document.getElementById('finput').value='';document.getElementById('finput').focus();}
function runFormula(){
  const raw=document.getElementById('finput').value.trim();
  const out=document.getElementById('fout');
  if(!raw){out.innerHTML='';return;}
  let t; try{ t=buildTable(raw); }catch(e){ out.innerHTML=`<div class="verdict err">⚠ ${e.message}</div>`; return; }
  const label={taut:'Tautology — true in every row',contra:'Contradiction — false in every row',cont:'Contingency — true in some rows, false in others'}[t.cls];
  const head=t.vs.map(v=>`<th>${v}</th>`).join('')+`<th class="res">${niceFormula(raw)}</th>`;
  const body=t.rows.map(r=>`<tr>${t.vs.map(v=>`<td class="${r.env[v]?'T':'F'}">${r.env[v]?'T':'F'}</td>`).join('')}<td class="res ${r.val?'T':'F'}">${r.val?'T':'F'}</td></tr>`).join('');
  out.innerHTML=`<div class="verdict ${t.cls}">${label}</div>
    <div class="ttwrap"><table class="tt"><tr>${head}</tr>${body}</table></div>`;
}
function labArg(){
  document.getElementById('labbody').innerHTML=`
    <div class="card">
      <p style="color:var(--dim);font-size:.9em;margin-bottom:9px">Enter <b>premises</b> (one per line) and a <b>conclusion</b>. The Lab checks validity: is it impossible for every premise to be true while the conclusion is false?</p>
      <textarea class="labin" id="prem" rows="3" autocapitalize="characters" autocomplete="off" spellcheck="false" style="resize:vertical">P -> Q
P</textarea>
      <div style="color:var(--faint);font-size:.75em;margin:8px 2px 4px;font-family:ui-monospace,monospace">CONCLUSION</div>
      <input class="labin" id="concl" value="Q" autocapitalize="characters" autocomplete="off" spellcheck="false">
      <button class="btn" style="margin-top:11px" onclick="runArg()">Check validity</button>
    </div>
    <div id="aout"></div>`;
  runArg();
}
function runArg(){
  const prem=document.getElementById('prem').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const concl=document.getElementById('concl').value.trim();
  const out=document.getElementById('aout');
  if(!prem.length||!concl){out.innerHTML='';return;}
  let trees,ct,vs;
  try{
    trees=prem.map(p=>parse(tokenize(p)));
    ct=parse(tokenize(concl));
    const set=new Set(); trees.forEach(t=>vars(t,set)); vars(ct,set);
    vs=[...set].sort();
    if(vs.length>6) throw new Error('Too many distinct variables (max 6).');
  }catch(e){ out.innerHTML=`<div class="verdict err">⚠ ${e.message}</div>`; return; }
  const n=vs.length; let counter=null;
  for(let m=0;m<(1<<n);m++){
    const env={}; vs.forEach((v,k)=>env[v]=!!(m&(1<<(n-1-k))));
    const allPrem=trees.every(t=>evl(t,env));
    if(allPrem && !evl(ct,env)){ counter=env; break; }
  }
  if(!counter){
    out.innerHTML=`<div class="verdict taut">✓ Valid — no way to make all premises true and the conclusion false.</div>`;
  } else {
    const row=vs.map(v=>`${v} = <b>${counter[v]?'T':'F'}</b>`).join(' &nbsp; ');
    out.innerHTML=`<div class="verdict contra">✗ Invalid — counterexample found.</div>
      <div class="card" style="font-family:ui-monospace,monospace;font-size:.9em">Set ${row}<br><span style="color:var(--dim)">→ every premise is true, yet the conclusion is false.</span></div>`;
  }
}

/* ============================ progress ============================ */
function renderProg(){
  const done=Object.keys(P.done).length, total=MODULES.length;
  const pct=Math.round(done/total*100);
  app.innerHTML=`
    <div class="eyebrow">Your progress</div>
    <h1>Progress</h1>
    <div class="card" style="text-align:center">
      <div class="prog-ring" style="--p:${pct}"><i>${pct}%</i></div>
      <p style="margin-top:12px;color:var(--dim)">${done} of ${total} modules complete · <b style="color:var(--teal)">${P.xp} XP</b></p>
    </div>
    <div class="sec">Modules</div>
    ${MODULES.map(m=>`<div class="mod ${P.done[m.id]?'done':''}" onclick="openMod('${m.id}')">
      <span class="num">${P.done[m.id]?'✓':'·'}</span>
      <span class="mt"><b>${m.n}</b><small>${P.pass[m.id]?'best: '+P.pass[m.id]:'not yet attempted'}</small></span>
      <span class="go">›</span></div>`).join('')}
    <button class="ghost" style="width:100%;margin-top:14px" onclick="resetProg()">Reset progress</button>`;
}
function resetProg(){ if(confirm('Reset all logic progress?')){ P={done:{},xp:0,pass:{}}; persist(); render(); } }

/* ============================ nav ============================ */
function go(v){ view=v; setNav(v); render(); window.scrollTo(0,0); }
function setNav(v){ document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v)); }
document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>go(b.dataset.v));
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('on'),2000); }

render();
</script>
</body></html>
